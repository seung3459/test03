<script>
/* ===== 연료 데이터 ===== */
const FUELS = {
  LNG:   {lhv:9420, unit:"kcal/Nm\u00b3", frUnit:"Nm\u00b3/h", A2:0.66, B:0.009},
  LPG:   {lhv:24000,unit:"kcal/Nm\u00b3", frUnit:"Nm\u00b3/h", A2:0.63, B:0.008},
  diesel:{lhv:8950, unit:"kcal/kg",       frUnit:"kg/h",       A2:0.68, B:0.007},
  hfo:   {lhv:9460, unit:"kcal/kg",       frUnit:"kg/h",       A2:0.68, B:0.007}
};
const PRESET = {
  vacuum:  {flow:600, cp:1, tIn:50, tOut:70, tgas:120, tair:20, o2:4.5, co:40, rad:1.5, fuelRate:80},
  hotwater:{flow:600, cp:1, tIn:60, tOut:80, tgas:150, tair:20, o2:5.0, co:50, rad:1.5, fuelRate:90},
  steam:   {steamRate:2000, steamP:7, feedT:80, blow:2, tgas:180, tair:20, o2:4.0, co:60, rad:1.8, fuelRate:150}
};
const $=id=>document.getElementById(id);
const num=id=>{const e=$(id); if(!e) return 0; const v=parseFloat(e.value); return isNaN(v)?0:v;};
const fmt=n=>n.toLocaleString('en-US',{maximumFractionDigits:0});

function curType(){ return $("inp-type").value; }

function steamEnthalpy(pg){
  const tab=[[1.0,639],[2.0,646],[3.0,650],[4.0,653],[5.0,655],[6.0,657],[7.0,658.5],[8.0,660],[10.0,662],[12.0,663.5],[15.0,665]];
  const pa=pg+1.013;
  if(pa<=tab[0][0]) return tab[0][1];
  if(pa>=tab[tab.length-1][0]) return tab[tab.length-1][1];
  for(let i=0;i<tab.length-1;i++){ if(pa>=tab[i][0]&&pa<=tab[i+1][0]){ const r=(pa-tab[i][0])/(tab[i+1][0]-tab[i][0]); return tab[i][1]+r*(tab[i+1][1]-tab[i][1]); } }
  return 658;
}

function applyFuel(){
  const f=FUELS[$("inp-fuel").value];
  $("lhv").value=f.lhv; $("lhvU").innerHTML=f.unit; $("frU").innerHTML=f.frUnit;
}
function applyPreset(t){
  const p=PRESET[t]; for(const k in p){ if($(k)) $(k).value=p[k]; }
}
function onTypeChange(){
  const t=curType(); const steam=(t==="steam");
  $("steamInputs").style.display=steam?"":"none";
  $("waterInputs").style.display=steam?"none":"";
  applyPreset(t);
  recalc();
}
function toggleSec(){
  const i=$("tg-ind").checked, d=$("tg-dir").checked;
  $("sec-ind").style.display=i?"":"none";
  $("sec-dir").style.display=d?"":"none";
  $("box-ind").classList.toggle("on",i);
  $("box-dir").classList.toggle("on",d);
  fitCenter();
}

function recalc(){
  const f=FUELS[$("inp-fuel").value];
  const lhv=num("lhv"), fuelRate=num("fuelRate");
  const Qin=fuelRate*lhv;

  let Qout=0;
  if(curType()==="steam"){
    const sr=num("steamRate"), hg=steamEnthalpy(num("steamP")), hf=num("feedT")*1.0;
    Qout=sr*(hg-hf);
    $("steamEnth").innerHTML=`포화증기 엔탈피 hg \u2248 ${hg.toFixed(1)} kcal/kg (게이지 ${num("steamP")} bar)`;
  }else{
    const mdot=num("flow")*60;
    Qout=mdot*num("cp")*(num("tOut")-num("tIn"));
  }
  const effD=Qin>0?(Qout/Qin*100):0;

  const tg=num("tgas"), ta=num("tair"), o2=num("o2"), co=num("co"), rad=num("rad");
  const denom=21-o2;
  let Lflue=0, airRatio=0;
  if(denom>0){ Lflue=(tg-ta)*(f.A2/denom+f.B); airRatio=21/denom; }
  else { Lflue=NaN; airRatio=NaN; }
  const co_frac=co/1e6;
  const LcoCalc=isFinite(airRatio)?(65*co_frac*airRatio):0;
  const Lrad=rad;
  const lossSum=(isFinite(Lflue)?Lflue:0)+LcoCalc+Lrad;
  const effI=isFinite(Lflue)?(100-lossSum):NaN;
  const effC=isFinite(Lflue)?(100-Lflue-LcoCalc):NaN;

  /* metrics */
  $("m-effd").textContent=(Qin>0&&Qout>0)?effD.toFixed(1):'\u2013';
  $("m-effi").textContent=isFinite(effI)?effI.toFixed(1):'O\u2082오류';
  $("m-effc").textContent=isFinite(effC)?effC.toFixed(1):'\u2013';
  $("m-airr").textContent=isFinite(airRatio)?airRatio.toFixed(2):'오류';

  /* 간접 손실표 */
  $("v-lflue").textContent=isFinite(Lflue)?Lflue.toFixed(2):'\u2013';
  $("v-lco").textContent=LcoCalc.toFixed(2);
  $("v-lrad").textContent=Lrad.toFixed(2);
  $("v-lsum").textContent=isFinite(Lflue)?lossSum.toFixed(2)+' %':'\u2013';
  $("v-effi-ind").textContent=isFinite(effI)?effI.toFixed(2)+' %':'\u2013';

  /* 직접 입/출열표 */
  $("v-qin1").textContent=fmt(Qin);
  $("v-qin2").textContent=fmt(Qin);
  $("v-qout").textContent=fmt(Qout);
  const qoutp=Qin>0?(Qout/Qin*100):0;
  $("v-qoutp").textContent=qoutp.toFixed(2);
  $("v-qout2").textContent=fmt(Qout);
  $("v-qoutp2").textContent=qoutp.toFixed(1);
  $("v-effd-tbl").textContent=(Qin>0&&Qout>0)?effD.toFixed(1)+' %':'\u2013';
  $("v-effi-tbl").textContent=isFinite(effI)?effI.toFixed(1)+' %':'\u2013';

  /* 정산잔차 */
  if(Qin>0&&Qout>0&&isFinite(effI)){
    const gap=effI-effD;
    const ok=Math.abs(gap)<=2;
    $("residual").innerHTML=`정산잔차(미확인손실) = &eta;<sub>i</sub> &minus; &eta;<sub>d</sub> = <b>${gap.toFixed(2)}%p</b>. `+
      (ok?`이 값이 &plusmn;2%p 이내이면 직접&middot;간접 측정이 일관됨(KS B 6205 상호검증).`
         :`\u26a0 &plusmn;2%p 초과 \u2014 유량/증기량 측정 또는 방사손실 가정 재검토 필요.`);
  }else if(isFinite(effI)){
    $("residual").innerHTML=`간접법 효율 ${effI.toFixed(1)}% 는 배기 측정만으로 독립 산출됩니다. 직접법은 ${curType()==="steam"?"증기량":"유량&middot;온도차"} 입력 시 비교됩니다.`;
  }else{
    $("residual").innerHTML=`\u26a0 O\u2082가 21% 이상이면 (21&minus;O\u2082)\u22640 으로 간접법 계산 불가. O\u2082 값을 확인하세요.`;
  }

  drawDonut(isFinite(effI)?effI:0, isFinite(Lflue)?Lflue:0, LcoCalc, Lrad);
  diagnose(effD,effI,o2,airRatio,co,tg,ta,denom);
  fitCenter();
}

function fitCenter(){
  const card=document.querySelector('#center-panel .calc-card');
  if(!card) return;
  const tds=card.querySelectorAll('.calc-table td, .calc-table th');
  const BASE=8, MIN=1.5, MAX=22;
  tds.forEach(td=>{ td.style.paddingTop=''; td.style.paddingBottom=''; });
  requestAnimationFrame(()=>{
    // 화면에 보이는 표 행만 카운트
    const visTrs=[...card.querySelectorAll('.calc-table tr')].filter(tr=>tr.offsetParent!==null);
    const trCount=visTrs.length;
    if(trCount<=0) return;
    // 기준 패딩(BASE) 상태에서 콘텐츠가 실제 차지한 높이를 측정
    const cardTop=card.getBoundingClientRect().top;
    let contentBottom=cardTop;
    card.querySelectorAll(':scope > *').forEach(el=>{
      if(el.offsetParent===null) return; // 숨김 요소 제외
      const b=el.getBoundingClientRect().bottom;
      if(b>contentBottom) contentBottom=b;
    });
    const used=contentBottom-cardTop;
    const free=card.clientHeight-used;   // 남는 공간(+) 또는 넘침(-)
    let adj=free/trCount/2;
    let pad=BASE+adj;
    if(pad<MIN) pad=MIN;
    if(pad>MAX) pad=MAX;
    pad=Math.floor(pad*10)/10;
    tds.forEach(td=>{ td.style.paddingTop=pad+'px'; td.style.paddingBottom=pad+'px'; });
  });
}

function showSrcPopup(cat,curLv){
  const info=SRC_INFO[cat]; if(!info) return;
  const lvName={ok:"양호",warn:"주의",bad:"불량"};
  const rows=info.rows.map(r=>`<tr class="${r[0]===curLv?'cur':''}"><td class="rng">${r[1]}</td><td><span class="lv-${r[0]}">${lvName[r[0]]}</span></td><td>${r[2].split('—')[1]?r[2].split('—')[1].trim():r[2]}</td></tr>`).join("");
  $("srcModalTitle").textContent=cat+" 판정 기준";
  $("srcModalBody").innerHTML=
    `<div class="sm-std">출처: ${info.std}</div>`+
    `<div class="sm-desc">${info.desc}</div>`+
    `<table><thead><tr><th>${info.unit}</th><th>판정</th><th>의미</th></tr></thead><tbody>${rows}</tbody></table>`+
    `<div class="sm-desc" style="margin-top:8px;color:#999;">※ 음영 행은 현재 측정값의 판정 구간입니다.</div>`;
  $("srcModalMask").classList.add("on");
}

function drawDonut(eff,lf,lco,lr){
  const data=[
    {l:"유효열(효율)",v:Math.max(eff,0),c:"#00838f"},
    {l:"배기 손실",v:Math.max(lf,0),c:"#ff8c00"},
    {l:"불완전연소",v:Math.max(lco,0),c:"#d64545"},
    {l:"방사&middot;기타",v:Math.max(lr,0),c:"#9aa3b0"}
  ];
  const tot=data.reduce((s,d)=>s+d.v,0)||1;
  let a=-90, svg="";
  data.forEach(d=>{
    const ang=d.v/tot*360, a2=a+ang, r=54,cx=60,cy=60,R=Math.PI/180;
    const x1=cx+r*Math.cos(a*R),y1=cy+r*Math.sin(a*R);
    const x2=cx+r*Math.cos(a2*R),y2=cy+r*Math.sin(a2*R);
    const large=ang>180?1:0;
    svg+=`<path d="M${cx} ${cy} L${x1} ${y1} A${r} ${r} 0 ${large} 1 ${x2} ${y2} Z" fill="${d.c}"/>`;
    a=a2;
  });
  /* 중앙 % 텍스트: 안쪽 흰 원(지름72)을 넘칠 때만 글자크기 자동 축소 + textLength로 폭 고정 (Tool-12 차트형식) */
  const effTxt=(isFinite(eff)?eff.toFixed(1):'-')+'%';
  const HOLE_W=62, baseFS=20;
  let fsAttr=`font-size="${baseFS}"`, lenAttr='';
  const estW=effTxt.length*baseFS*0.6;
  if(estW>HOLE_W){
    const effFS=baseFS*HOLE_W/estW;
    fsAttr=`font-size="${effFS.toFixed(2)}"`;
    lenAttr=` textLength="${HOLE_W}" lengthAdjust="spacingAndGlyphs"`;
  }
  svg+=`<circle cx="60" cy="60" r="36" fill="#fff"/>
    <text x="60" y="54" text-anchor="middle" font-size="10" fill="#888">효율</text>
    <text x="60" y="72" text-anchor="middle" ${fsAttr} font-weight="800" fill="#00838f"${lenAttr}>${effTxt}</text>`;
  $("donut").innerHTML=svg;
  $("legend").innerHTML=data.map(d=>
    `<div class="li"><span class="sw" style="background:${d.c}"></span>${d.l}<span class="lv">${d.v.toFixed(1)}%</span></div>`).join("");
}

function diagnose(effD,effI,o2,air,co,tg,ta,denom){
  const D=[]; const dT=tg-ta;
  if(denom<=0) D.push(["bad","O\u2082 입력","오류","배기 O\u2082 21% 이상 \u2014 간접법 계산 불가.","입력 검증"]);
  if(dT>180) D.push(["bad","배기온도","과다","온도차 "+dT.toFixed(0)+"\u2103 \u2014 스케일/그을음, 청소 권장.","출처: US DOE Steam Tip #4"]);
  else if(dT>120) D.push(["warn","배기온도","다소 높음","온도차 "+dT.toFixed(0)+"\u2103 \u2014 전열면 점검 권장.","출처: Carbon Trust CTV008"]);
  else D.push(["ok","배기온도","양호","온도차 "+dT.toFixed(0)+"\u2103 \u2014 정상 범위.","출처: Carbon Trust CTG012"]);
  if(isFinite(air)){
    if(o2>7||air>1.5) D.push(["warn","공기비","과다","O\u2082 "+o2+"% \u2014 배기손실 증가, 공연비 재조정.","출처: US EPA / DOE \u2014 O\u2082 3~5%"]);
    else if(o2<2) D.push(["bad","공기비","부족","O\u2082 "+o2+"% \u2014 불완전연소 위험, 공기량 증대.","출처: US EPA 안전 연소"]);
    else D.push(["ok","공기비","적정","O\u2082 "+o2+"% (공기비 "+air.toFixed(2)+") \u2014 적정 범위(3~5%).","출처: US DOE Combustion"]);
  }
  if(co>400) D.push(["bad","CO","과다","CO "+co+"ppm \u2014 불완전연소, 버너 정비.","출처: EPA / EN 12953"]);
  else if(co>100) D.push(["warn","CO","주의","CO "+co+"ppm \u2014 연소상태 점검 권장.","출처: 연소관리 가이드"]);
  else D.push(["ok","CO","양호","CO "+co+"ppm \u2014 양호한 완전연소.","출처: 연소관리 가이드"]);
  if(isFinite(effI)){
    if(effI>=90) D.push(["ok","효율","우수","간접법 효율 "+effI.toFixed(1)+"% \u2014 우수, 현 운전 유지.","출처: Carbon Trust 효율 등급"]);
    else if(effI>=82) D.push(["warn","효율","보통","간접법 효율 "+effI.toFixed(1)+"% \u2014 배기손실 점검.","출처: US DOE 벤치마크"]);
    else D.push(["bad","효율","저조","간접법 효율 "+effI.toFixed(1)+"% \u2014 전열면·공연비 점검.","출처: US DOE / Carbon Trust"]);
  }
  $("diag").innerHTML=D.map(d=>{const has=!!SRC_INFO[d[1]];return `<div class="d ${d[0]}"><div class="dhead">${d[1]} : <span class="dstat">${d[2]}</span></div><div class="dbody">${d[3]}<span class="dsrc${has?' clk':''}"${has?` onclick="showSrcPopup('${d[1]}','${d[0]}')" title="클릭하면 판정 기준 보기"`:''}>${d[4]}</span></div></div>`}).join("");
}

/* ===== Tab Management (Tool-003 방식) ===== */
let tabCount=1, activeTab=1, nextTabId=2;
const FIELD_IDS=['inp-name','inp-type','inp-fuel','inp-note','lhv','fuelRate',
  'flow','cp','tIn','tOut','steamRate','steamP','feedT','blow','tgas','tair','o2','co','rad'];
const equipStore={};
function snapshot(){ const o={}; FIELD_IDS.forEach(id=>{const e=$(id); if(e) o[id]=e.value;}); return o; }
function saveCurrentTab(){ equipStore[activeTab]=snapshot(); }
function loadTab(id){
  const d=equipStore[id]||{};
  FIELD_IDS.forEach(k=>{ const e=$(k); if(e&&d[k]!==undefined) e.value=d[k]; });
  onTypeChange();
}
function updateTabName(){
  const name=$("inp-name").value||'장비';
  const btn=$("tab-"+activeTab);
  if(btn){ const c=btn.querySelector('.tab-close'); btn.textContent=name+' #'+String(activeTab).padStart(2,'0'); if(c) btn.appendChild(c); }
}
function switchTab(id){
  if(id===activeTab) return;
  saveCurrentTab(); updateTabName();
  document.querySelectorAll('.tab:not(.add)').forEach(t=>t.classList.remove('active'));
  const b=$("tab-"+id); if(b) b.classList.add('active');
  activeTab=id; loadTab(id); recalc();
}
function addTab(){
  saveCurrentTab(); updateTabName();
  const id=nextTabId++; tabCount++;
  equipStore[id]={'inp-name':'B-'+String(tabCount).padStart(2,'0'),'inp-type':'vacuum','inp-fuel':'LNG','inp-note':'정격부하',
    'lhv':9420,'fuelRate':80,'flow':600,'cp':1,'tIn':50,'tOut':70,'tgas':120,'tair':20,'o2':4.5,'co':40,'rad':1.5};
  const btn=document.createElement('button');
  btn.className='tab'; btn.id='tab-'+id; btn.textContent='B-'+String(id).padStart(2,'0')+' #'+String(id).padStart(2,'0');
  btn.onclick=()=>switchTab(id);
  const c=document.createElement('span'); c.className='tab-close'; c.innerHTML='&#10005;';
  c.onclick=e=>{e.stopPropagation();removeTab(id);}; btn.appendChild(c);
  const bar=document.querySelector('.tab-bar'); bar.insertBefore(btn,bar.lastElementChild);
  document.querySelectorAll('.tab:not(.add)').forEach(t=>t.classList.remove('active'));
  btn.classList.add('active'); activeTab=id; loadTab(id); updateTabName(); recalc();
}
function removeTab(id){
  const tabs=document.querySelectorAll('.tab:not(.add)');
  if(tabs.length<=1){ alert('최소 1개의 장비는 유지해야 합니다.'); return; }
  const b=$("tab-"+id); const nm=b?b.textContent.replace('\u2715','').trim():'장비';
  if(!confirm('"'+nm+'" 장비를 삭제하시겠습니까?')) return;
  if(b) b.remove(); delete equipStore[id];
  if(activeTab===id){ const r=document.querySelectorAll('.tab:not(.add)')[0]; const fid=parseInt(r.id.replace('tab-','')); r.classList.add('active'); activeTab=fid; loadTab(fid); recalc(); }
}
function saveData(){ saveCurrentTab(); updateTabName(); alert('데이터가 저장되었습니다.'); }
function exportFile(){ alert('파일 변환 기능'); }
function goMain(){ alert('메인 화면으로 이동합니다.'); }

window.addEventListener('DOMContentLoaded',function(){
  $("inp-name").addEventListener('input',updateTabName);
  applyFuel(); recalc();
  setTimeout(fitCenter,60);
});
window.addEventListener('resize',fitCenter);

<script>
/* === HIMEC 공통 헤더 기능 (Save / Export / Main) === */
(function(){
  function fields(){ return Array.prototype.slice.call(document.querySelectorAll('input, select, textarea')); }
  function fkey(el,i){ return el.id ? ('#'+el.id) : ('@'+i); }
  function storeKey(){ return 'HIMEC_SAVE::' + (location.pathname || document.title || 'tool') + '::' + (new URLSearchParams(location.search).get('projectId') || 'default'); }

  function himecSave(){
    try{
      var data={};
      fields().forEach(function(el,i){
        var k=fkey(el,i);
        if(el.type==='checkbox'||el.type==='radio'){ data[k]={t:'chk', v:el.checked}; }
        else { data[k]={t:'val', v:el.value}; }
      });
      localStorage.setItem(storeKey(), JSON.stringify(data));
      alert('현재 화면의 입력값이 저장되었습니다.');
    }catch(e){ alert('저장 중 오류가 발생했습니다: '+e.message); }
  }

  function himecRestore(){
    try{
      var raw=localStorage.getItem(storeKey()); if(!raw) return;
      var data=JSON.parse(raw);
      fields().forEach(function(el,i){
        var rec=data[fkey(el,i)]; if(!rec) return;
        if(rec.t==='chk'){ el.checked=!!rec.v; el.dispatchEvent(new Event('change',{bubbles:true})); }
        else { el.value=rec.v; el.dispatchEvent(new Event('input',{bubbles:true})); el.dispatchEvent(new Event('change',{bubbles:true})); }
      });
    }catch(e){}
  }

  function closeMenu(){ var m=document.getElementById('himecExportMenu'); if(m) m.parentNode.removeChild(m); document.removeEventListener('click', outside, true); }
  function outside(e){ var m=document.getElementById('himecExportMenu'); if(m && !m.contains(e.target)) closeMenu(); }

  function himecExport(btn){
    if(document.getElementById('himecExportMenu')){ closeMenu(); return; }
    var m=document.createElement('div'); m.className='himec-menu'; m.id='himecExportMenu';
    m.innerHTML =
      '<button data-x="pdf"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>PDF로 저장</button>'+
      '<button data-x="xls"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="2"/><line x1="9" y1="3" x2="9" y2="21"/><line x1="3" y1="9" x2="21" y2="9"/></svg>Excel로 내보내기</button>';
    document.body.appendChild(m);
    var r=btn.getBoundingClientRect();
    var left=window.scrollX+r.right-m.offsetWidth; if(left<6) left=6;
    m.style.top=(window.scrollY+r.bottom+6)+'px';
    m.style.left=left+'px';
    m.addEventListener('click', function(e){
      var t=e.target.closest('button'); if(!t) return;
      var x=t.getAttribute('data-x'); closeMenu();
      if(x==='pdf') himecPDF(); else himecExcel();
    });
    setTimeout(function(){ document.addEventListener('click', outside, true); }, 0);
  }

  function himecPDF(){
    /* 화면 비율 그대로 인쇄 → 브라우저 인쇄 대화상자에서 'PDF로 저장' 선택 */
    window.print();
  }
  function himecExcel(){
    alert('Excel 내보내기는 추후 별도 양식으로 제공될 예정입니다.');
  }

  function himecMain(){
    location.href = '../tool_dashboard.html';
  }

  window.himecSave=himecSave;
  window.himecExport=himecExport;
  window.himecMain=himecMain;

  if(document.readyState==='loading'){
    window.addEventListener('DOMContentLoaded', function(){ setTimeout(himecRestore, 60); });
  } else { setTimeout(himecRestore, 60); }
})();
</script>

<script>
/* === 센터 뷰 전환(운전 성능 <-> 현장 사진) + 사진 등록/촬영 === */
(function(){
  var PHOTO_LABELS = [
    "사진 1 (예: 보일러 외관)",
    "사진 2 (예: 명판 / 사양)",
    "사진 3 (예: 버너 / 연소부)",
    "사진 4 (예: 급수 / 배관)",
    "사진 5 (예: 배기 / 온도계)",
    "사진 6 (예: 제어반 / 기타)"
  ];

  /* === 사진: 탭별 저장 (탭마다 독립 보관) === */
  var photoStore = {};   /* key(탭 식별자) -> [{cap,img}, ...] */
  var slotRefs   = [];   /* 사진 슬롯 DOM 참조 */
  var lastKey    = null;

  function activeTabKey(){
    var el = document.querySelector('.tab.active');
    if(el && el.id) return el.id;
    var tabs = document.querySelectorAll('.tab:not(.add)');
    for(var i=0;i<tabs.length;i++){ if(tabs[i].classList.contains('active')) return 'tabpos-'+i; }
    return 'tab-default';
  }

  function ensureRec(key){
    if(!photoStore[key]){
      var arr = [];
      for(var i=0;i<PHOTO_LABELS.length;i++){ arr.push({ cap:null, img:'' }); }
      photoStore[key] = arr;
    }
    return photoStore[key];
  }

  function loadPhotosForTab(){
    var grid = document.getElementById('photoGrid');
    if(!grid || !grid.dataset.built) return;
    var key = activeTabKey();
    lastKey = key;
    var rec = ensureRec(key);
    for(var i=0;i<slotRefs.length;i++){
      var s = slotRefs[i], r = rec[i];
      s.cap.value = (r && r.cap != null) ? r.cap : PHOTO_LABELS[i];
      var old = s.drop.querySelector('img');
      if(old) old.remove();
      if(r && r.img){
        var img = document.createElement('img');
        img.src = r.img;
        s.drop.appendChild(img);
        s.drop.classList.add('has-img');
      } else {
        s.drop.classList.remove('has-img');
      }
      s.input.value = '';
    }
  }
  window.loadPhotosForTab = loadPhotosForTab;

  /* 탭 전환/추가/삭제 자동 감지 → 해당 탭 사진 로드 */
  function watchTabs(){
    var anchor = document.querySelector('.tab.add') || document.querySelector('.tab');
    var bar = anchor ? anchor.parentNode : document.body;
    try{
      var mo = new MutationObserver(function(){
        if(activeTabKey() !== lastKey) loadPhotosForTab();
      });
      mo.observe(bar, { childList:true, subtree:true, attributes:true, attributeFilter:['class'] });
    }catch(e){}
  }
  if(document.readyState === 'loading') document.addEventListener('DOMContentLoaded', watchTabs);
  else watchTabs();

  function buildPhotoGrid(){
    var grid = document.getElementById('photoGrid');
    if(!grid || grid.dataset.built) return;
    grid.dataset.built = "1";
    slotRefs = [];
    for(var i=0;i<PHOTO_LABELS.length;i++){
      (function(idx){
        var slot = document.createElement('div');
        slot.className = 'photo-slot';

        var cap = document.createElement('input');
        cap.type = 'text';
        cap.className = 'photo-cap';
        cap.title = '제목을 클릭하여 편집하세요';
        cap.placeholder = PHOTO_LABELS[idx];
        cap.value = PHOTO_LABELS[idx];
        cap.addEventListener('input', function(){
          ensureRec(activeTabKey())[idx].cap = cap.value;
        });
        /* 입력창 클릭이 사진 촬영/선택으로 전파되지 않도록 차단 */
        cap.addEventListener('click', function(e){ e.stopPropagation(); });

        var drop = document.createElement('div');
        drop.className = 'photo-drop';
        drop.innerHTML =
          '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"/><circle cx="12" cy="13" r="4"/></svg>' +
          '<div class="pd-title">사진 ' + (idx+1) + '</div>' +
          '<div class="pd-sub">클릭하여 촬영 / 선택</div>';

        var input = document.createElement('input');
        input.type = 'file';
        input.accept = 'image/*';
        input.setAttribute('capture','environment');
        input.style.display = 'none';

        var del = document.createElement('button');
        del.type = 'button';
        del.className = 'photo-del';
        del.title = '사진 삭제';
        del.innerHTML = '&times;';

        drop.appendChild(input);
        drop.appendChild(del);

        drop.addEventListener('click', function(e){
          if(e.target === del) return;
          input.click();
        });

        input.addEventListener('change', function(){
          var f = input.files && input.files[0];
          if(!f) return;
          var r = new FileReader();
          r.onload = function(ev){
            var old = drop.querySelector('img');
            if(old) old.remove();
            var img = document.createElement('img');
            img.src = ev.target.result;
            drop.appendChild(img);
            drop.classList.add('has-img');
            ensureRec(activeTabKey())[idx].img = ev.target.result;
          };
          r.readAsDataURL(f);
        });

        del.addEventListener('click', function(e){
          e.stopPropagation();
          var img = drop.querySelector('img');
          if(img) img.remove();
          drop.classList.remove('has-img');
          input.value = '';
          ensureRec(activeTabKey())[idx].img = '';
        });

        slot.appendChild(cap);
        slot.appendChild(drop);
        grid.appendChild(slot);
        slotRefs[idx] = { cap:cap, drop:drop, input:input, del:del };
      })(i);
    }
    loadPhotosForTab();
  }

  window.switchCenterView = function(view){
    var perf  = document.getElementById('perfView');
    var photo = document.getElementById('photoView');
    var title = document.getElementById('centerTitle');
    var bDoc  = document.getElementById('ciDoc');
    var bCam  = document.getElementById('ciCam');
    if(!perf || !photo) return;

    if(view === 'photo'){
      buildPhotoGrid();
      perf.style.display  = 'none';
      photo.style.display = 'flex';
      if(title) title.innerHTML = '&#9632; 현장 사진';
      bDoc.classList.remove('active');
      bCam.classList.add('active');
    } else {
      photo.style.display = 'none';
      perf.style.display  = 'flex';
      if(title) title.innerHTML = '&#9632; 열정산표';
      bCam.classList.remove('active');
      bDoc.classList.add('active');
      /* 숨김 상태에서 캔버스 크기가 0이 되므로 다시 그린다 */
      if(typeof drawChart === 'function'){ try{ drawChart(); }catch(e){} }
    }
  };
})();
</script>

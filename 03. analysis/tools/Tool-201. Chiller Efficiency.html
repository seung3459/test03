<!DOCTYPE html>
<html lang="ko">
<head>
	<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
	<script src="../../js/supabase-config.js"></script>
	<script src="../../js/auth-guard.js"></script>
	<script src="../../js/himec-supabase-sync.js"></script>
<meta charset="UTF-8">
<meta name="viewport" content="width=1920">

<script>
/* ===== 탭 (Tool-12 스타일) ===== */
function renderTabs(){
  const bar=$('eqTabs'); bar.innerHTML='';
  equips.forEach((e,i)=>{
    const b=document.createElement('button');
    b.className='tab'+(i===curIdx?' active':''); b.id='tab-'+i;
    b.textContent=(e.name||('CH-'+String(i+1).padStart(2,'0')));
    b.onclick=()=>selTab(i);
    if(equips.length>1){ const c=document.createElement('span'); c.className='tab-close'; c.innerHTML='&#10005;';
      c.onclick=ev=>{ev.stopPropagation();delTab(i);}; b.appendChild(c); }
    bar.appendChild(b);
  });
  const a=document.createElement('button'); a.className='tab add'; a.textContent='+'; a.onclick=addTab; bar.appendChild(a);
}
function selTab(i){ curIdx=i; renderAll(); }
function addTab(){ equips.push(defaultEq('CH-'+String(equips.length+1).padStart(2,'0'),curEq().kind)); curIdx=equips.length-1; renderAll(); }
function delTab(i){ if(equips.length<=1){ alert('최소 1개의 장비는 유지해야 합니다.'); return; }
  const nm=equips[i].name||'장비'; if(!confirm('"'+nm+'" 장비를 삭제하시겠습니까?'))return;
  equips.splice(i,1); if(curIdx>=equips.length)curIdx=equips.length-1; renderAll(); }

/* ===== 장비 개요 (종류별 자동 전환) ===== */
function renderOverview(){ const e=curEq();
  $('f_name').value=e.name; $('f_use').value=e.use; $('f_kind').value=e.kind;
  const mk=$('f_maker'); mk.innerHTML='<option value="" selected disabled>입력 해주세요</option>'; (MAKERS[e.kind]||[]).forEach(m=>{const o=document.createElement('option');o.value=m;o.textContent=m;if(m===e.maker)o.selected=true;mk.appendChild(o);});
  const tp=$('f_type'); tp.innerHTML='<option value="" selected disabled>입력 해주세요</option>'; (TYPES[e.kind]||[]).forEach(m=>{const o=document.createElement('option');o.value=m;o.textContent=m;if(m===e.type)o.selected=true;tp.appendChild(o);});
  $('f_plrmode').value=e.plrMode;
  /* 연료 발열량: 냉온수기(흡수식)만 노출 */
  const abs=e.kind==='냉온수기';
  $('th-fuel').style.display=abs?'':'none'; $('td-fuel').style.display=abs?'':'none';
  if(abs) $('f_gas').value=e.gasKcal;
  /* 모드 표시 chip */
  const seg=$('plrSeg');
  if(e.plrMode==='rated'){ seg.textContent='정격(수평)'; seg.className='seg-pill seg-auto'; }
  else if(e.plrMode==='general'){ seg.textContent='표준곡선'; seg.className='seg-pill seg-auto'; }
  else { seg.textContent='사용자 입력'; seg.className='seg-pill seg-user'; }
}

/* ===== 좌측 설계·운전 데이터표 (종류별 행 자동 변화) ===== */
function renderDataTable(){ const e=curEq(),o=calc(e),b=$('dataBody'); const abs=e.kind==='냉온수기'; let h='';
  h+=grp('냉수','공급온도 [℃]',inp('chw','sD'),inp('chw','sO'),3);
  h+=ln('환수온도 [℃]',inp('chw','rD'),inp('chw','rO'));
  h+=ln('유량 [LPM]',inp('chw','fD'),inp('chw','fO'));
  if(abs){ h+=grp('온수','공급온도 [℃]',inp('hw','sD'),inp('hw','sO'),3);
    h+=ln('환수온도 [℃]',inp('hw','rD'),inp('hw','rO')); h+=ln('유량 [LPM]',inp('hw','fD'),inp('hw','fO')); }
  h+=grp('냉각수','입구온도 [℃]',inp('cw','sD'),inp('cw','sO'),3);
  h+=ln('출구온도 [℃]',inp('cw','rD'),inp('cw','rO')); h+=ln('유량 [LPM]',inp('cw','fD'),inp('cw','fO'));
  h+=rw('소비전력 [kW]',rinp('powD'),rinp('powO'));
  if(abs){ h+=rw('냉방 연료 [N㎥/h]',rinp('fcD'),rinp('fcO'));
           h+=rw('난방 연료 [N㎥/h]',rinp('fhD'),rinp('fhO')); }
  h+=grp('압력','증발 [bar]','<span style="color:#bbb">-</span>',rinp('pEvap'),2);
  h+=ln('응축 [bar]','<span style="color:#bbb">-</span>',rinp('pCond'));
  b.innerHTML=h;
  function cr(n,kd,ko,o,mode){ return '<tr><td class="nm" colspan="2">'+n+'</td><td class="calc" id="c_'+kd+'">'+fmtCalc(o[kd],mode)+'</td><td class="calc" id="c_'+ko+'">'+fmtCalc(o[ko],mode)+'</td></tr>'; }
  function grp(g,n,c1,c2,s){ return '<tr><td class="grp" rowspan="'+s+'">'+g+'</td><td class="nm">'+n+'</td><td>'+c1+'</td><td>'+c2+'</td></tr>'; }
  function ln(n,c1,c2){ return '<tr><td class="nm">'+n+'</td><td>'+c1+'</td><td>'+c2+'</td></tr>'; }
  function rw(n,c1,c2){ return '<tr><td class="nm" colspan="2">'+n+'</td><td>'+c1+'</td><td>'+c2+'</td></tr>'; }
}
function fmtCalc(v,mode){ return mode==='pct'?(fmt(v*100,0)+'%'):(mode==='cop'?fmt(v,2):fmt(v,0)); }
const inp=(g,k)=>{const v=curEq()[g][k];return '<input placeholder="입력 해주세요" value="'+v+'" oninput="onSub(\''+g+'\',\''+k+'\',this.value)">';};
const rinp=(k)=>{const v=curEq()[k];return '<input placeholder="입력 해주세요" value="'+(v===''?'':v)+'" oninput="onRoot(\''+k+'\',this.value)">';};

/* ===== 중앙 : 성능표 / 온도·압력표 ===== */
function renderPerf(){ const e=curEq(),o=calc(e),abs=e.kind==='냉온수기';
  let h='<tr><th style="width:40%">항목</th><th style="text-align:right">설계</th><th style="text-align:right">운전</th></tr>';
  h+=row('냉방능력 [usRT]',fmt(o.coolD,0),fmt(o.coolO,0));
  if(abs) h+=row('난방능력 [Mcal/h]',fmt(o.heatD/1000,0),fmt(o.heatO/1000,0));
  h+=row('부하율 [%]',fmt(o.loadD*100,0),fmt(o.loadO*100,1));
  h+='<tr class="sub"><td>COP</td><td class="num" style="text-align:right">'+fmt(o.copD,2)+'</td><td class="num" style="text-align:right">'+fmt(o.copO,2)+'</td></tr>';
  h+=row('기준 COP (부하보정)','-',fmt(o.copRef,2));
  $('perfTable').innerHTML=h;
  function row(n,a,b){ return '<tr><td>'+n+'</td><td class="num" style="text-align:right">'+a+'</td><td class="num" style="text-align:right">'+b+'</td></tr>'; }
}
function renderTemp(){ const e=curEq(),o=calc(e),abs=e.kind==='냉온수기';
  let h='<tr><th style="width:28%">계통</th><th style="text-align:right">①</th><th style="text-align:right">②</th><th style="text-align:right">차이/비</th></tr>';
  h+=tr('냉수 CHW [℃]','공급 '+fmt(e.chw.sO,1),'환수 '+fmt(e.chw.rO,1),'ΔT '+fmt(o.dtO,1));
  if(abs) h+=tr('온수 HW [℃]','공급 '+fmt(e.hw.sO,1),'환수 '+fmt(e.hw.rO,1),'ΔT '+fmt(e.hw.sO-e.hw.rO,1));
  h+=tr('냉각수 CW [℃]','입구 '+fmt(e.cw.sO,1),'출구 '+fmt(e.cw.rO,1),'ΔT '+fmt(o.cwDtO,1));
  if(e.kind==='냉동기') h+=tr('압력 [bar]','증발 '+fmt(e.pEvap,2),'응축 '+fmt(e.pCond,2),'비 '+(e.pEvap>0?fmt(e.pCond/e.pEvap,2):'-'));
  $('tempTable').innerHTML=h;
  function tr(n,a,b,c){ return '<tr><td>'+n+'</td><td class="num" style="text-align:right">'+a+'</td><td class="num" style="text-align:right">'+b+'</td><td class="num" style="text-align:right">'+c+'</td></tr>'; }
}

/* ===== 우측 : 결과 카드 ===== */
function renderMetrics(){ const e=curEq(),o=calc(e),abs=e.kind==='냉온수기';
  const cd=o.copD>0?(o.copO/o.copD-1)*100:0;
  let c='';
  c+=mc('현재 COP', fmt(o.copO,2),'', (cd>=0?'▲':'▼')+' 설계대비 '+(cd>=0?'+':'')+fmt(cd,1)+'%', e.kind==='냉동기'?'AHRI 550/590':'KS B 6270');
  c+=mc('냉방능력', fmt(o.coolO,0),'RT','부하율 '+fmt(o.loadO*100,1)+'%','Q=m·c·ΔT');
  if(abs) c+=mc('난방능력', fmt(o.heatO/1000,0),'Mcal/h','설계 '+fmt(o.heatD/1000,0),'온수 공급-환수');
  else    c+=mc('소비전력', fmt(e.powO,0),'kW','설계 '+fmt(e.powD,0)+'kW','현장 계측');
  c+=mc('기준 COP', fmt(o.copRef,2),'','부하보정 산출', e.plrMode==='rated'?'정격(수평)':e.plrMode==='general'?'표준곡선':'직접입력');
  $('metricsArea').innerHTML=c;
  function mc(lbl,v,u,sub,src){ return '<div class="metric-card"><div class="ml"><div class="metric-label">&#10003; '+lbl+'</div><div class="metric-sub">'+src+' · '+sub+'</div></div><div><span class="metric-value">'+v+'</span><span class="metric-unit">'+u+'</span></div></div>'; }
}

/* ===== 우측 : COP 달성률 게이지 ===== */
function renderGauge(){ const e=curEq(),o=calc(e);
  const groups=[
    {t:'COP', d:o.copD, m:o.copO, dec:2},
    {t:'냉수 온도차', d:o.dtD, m:o.dtO, dec:1}
  ];
  const base=132, top=44, maxH=base-top, bw=30;
  const colD='#9fb4c9', colM='#00838f';
  let svg='';
  groups.forEach((g,gi)=>{
    const cx=80+gi*160;
    const mx=Math.max(g.d,g.m,1e-6);
    const xd=cx-38, xm=cx+8;
    const hd=Math.max(2,(g.d>0?g.d/mx*maxH:0)), hm=Math.max(2,(g.m>0?g.m/mx*maxH:0));
    svg+='<text x="'+cx+'" y="22" text-anchor="middle" font-size="10" font-weight="500" fill="#2f6f86">'+g.t+'</text>';
    svg+='<line x1="'+(cx-54)+'" y1="'+base+'" x2="'+(cx+54)+'" y2="'+base+'" stroke="#cfd6dc" stroke-width="1"/>';
    /* 설계 */
    svg+='<rect x="'+xd+'" y="'+(base-hd)+'" width="'+bw+'" height="'+hd+'" fill="'+colD+'"/>';
    svg+='<text x="'+(xd+bw/2)+'" y="'+(base-hd-6)+'" text-anchor="middle" font-size="10" font-weight="400" fill="#666">'+fmt(g.d,g.dec)+'</text>';
    svg+='<text x="'+(xd+bw/2)+'" y="'+(base+15)+'" text-anchor="middle" font-size="9" font-weight="400" fill="#888">설계</text>';
    /* 측정 */
    svg+='<rect x="'+xm+'" y="'+(base-hm)+'" width="'+bw+'" height="'+hm+'" fill="'+colM+'"/>';
    svg+='<text x="'+(xm+bw/2)+'" y="'+(base-hm-6)+'" text-anchor="middle" font-size="10" font-weight="400" fill="'+colM+'">'+fmt(g.m,g.dec)+'</text>';
    svg+='<text x="'+(xm+bw/2)+'" y="'+(base+15)+'" text-anchor="middle" font-size="9" font-weight="400" fill="#888">측정</text>';
  });
  $('donut').innerHTML=svg;
}

/* ===== 우측 : 진단 ===== */
function renderDiag(){ const e=curEq(),o=calc(e); const D=[];
  /* COP 성능 */
  { const lv=o.ratio>=0.95?'ok':(o.ratio>=0.85?'warn':'bad');
    const st={ok:'양호',warn:'점검 필요',bad:'불량'}[lv];
    const msg={ok:'기준 대비 양호, 정상.',warn:'응축기·냉각수·냉매 점검.',bad:'노후·오염·냉매부족 의심.'}[lv];
    D.push([lv,'COP성능',st,'운전 '+fmt(o.copO,2)+' / 기준 '+fmt(o.copRef,2)+' ('+fmt(o.ratio*100,0)+'%) &mdash; '+msg,'출처: AHRI 550/590 · 고효율기자재']); }
  /* 냉수 온도차 */
  { const d=Math.abs(o.dtO-o.dtD); const lv=d<=1?'ok':(d<=2?'warn':'bad');
    const st={ok:'양호',warn:'점검 필요',bad:'불량'}[lv];
    const msg={ok:'유량·부하 정상.',warn:'유량·밸런싱 점검.',bad:'Low ΔT, 유량과다 의심.'}[lv];
    D.push([lv,'냉수온도차',st,'운전 ΔT '+fmt(o.dtO,1)+'℃ / 설계 '+fmt(o.dtD,1)+'℃ &mdash; '+msg,'출처: 설계기준 · ASHRAE']); }
  /* 냉각수 온도차 (냉동기) */
  if(e.kind==='냉동기'){ const d=Math.abs(o.cwDtO-o.cwDtD); const lv=d<=1?'ok':(d<=2.5?'warn':'bad');
    const st={ok:'양호',warn:'점검 필요',bad:'불량'}[lv];
    const msg={ok:'응축 방열 양호.',warn:'냉각탑·유량 점검.',bad:'스케일·냉각능력 저하 의심.'}[lv];
    D.push([lv,'냉각수온도차',st,'운전 ΔT '+fmt(o.cwDtO,1)+'℃ / 설계 '+fmt(o.cwDtD,1)+'℃ &mdash; '+msg,'출처: 냉각탑 설계 · ASHRAE']);
    /* 압력비 */
    const pr=e.pEvap>0?e.pCond/e.pEvap:0; const lv2=(pr>=2.0&&pr<=3.5)?'ok':((pr>3.5&&pr<=4.2)?'warn':'bad');
    const st2={ok:'양호',warn:'점검 필요',bad:'불량'}[lv2];
    const msg2={ok:'압축비 정상.',warn:'응축압력·오염 점검.',bad:'냉매·응축기 진단.'}[lv2];
    D.push([lv2,'압력비',st2,'P비 '+fmt(pr,2)+' (응축 '+fmt(e.pCond,2)+'/증발 '+fmt(e.pEvap,2)+' bar) &mdash; '+msg2,'출처: 압축기 운전기준']);
  } else { /* 흡수식: 연료효율(COP) 기준 */
    const lv=o.copO>=1.2?'ok':(o.copO>=1.0?'warn':'bad'); const st={ok:'양호',warn:'점검 필요',bad:'불량'}[lv];
    const msg={ok:'COP 기준(≥1.2) 만족.',warn:'연소·진공도 점검.',bad:'결정·진공저하 의심.'}[lv];
    D.push([lv,'연료효율',st,'운전 COP '+fmt(o.copO,2)+' &mdash; '+msg,'출처: KS B 6270 · 고효율기자재']);
  }
  /* 부하율 */
  { const L=o.loadO*100; const lv=(L>=40&&L<=100)?'ok':(L>=25?'warn':'bad'); const st={ok:'양호',warn:'점검 필요',bad:'불량'}[lv];
    const msg={ok:'적정 부하대 운전.',warn:'저부하, 대수제어 검토.',bad:'용량 적정성 재검토.'}[lv];
    D.push([lv,'부하율',st,'운전 부하율 '+fmt(L,1)+'% &mdash; '+msg,'출처: AHRI 부분부하 가중']); }
  $('diag').innerHTML=D.map(d=>'<div class="d '+d[0]+'"><div class="dhead">'+d[1]+' : <span class="dstat">'+d[2]+'</span></div><div class="dbody">'+d[3]+'<span class="dsrc" onclick="showSrcPopup(\''+d[1]+'\',\''+d[0]+'\')" title="클릭하면 판정 기준 요약 보기">'+d[4]+'</span></div></div>').join('');
}

/* ===== 수식 박스 ===== */
function renderEqBox(){ const e=curEq(),o=calc(e);
  const lbl=e.plrMode==='rated'?'정격 COP (전 부하 일정)':(e.plrMode==='manual'?'직접입력 데이터 피팅 곡선식 (x=부하율 0~1)':'표준 부분부하 곡선식 (x=부하율 0~1)');
  $('eqBox').innerHTML='<div style="font-size:9.5px;color:#888;margin-bottom:2px;">'+lbl+'</div>'+
    '<div class="f">'+eqString(o.coeffs)+'</div>';
  $('curveSrc').innerHTML=(e.kind==='냉동기'?'AHRI 550/590 · ASHRAE 90.1':'ASHRAE Handbook · KS B 6270');
}
</script>

<script>
/* ===== 차트 (canvas) ===== */
function chartLegend(){ const l=$('chartLegend');
  l.innerHTML='<span><i class="lg-dash"></i> 부분부하 곡선식</span><span><i class="lg-dot"></i> 현재 운전점</span>';
}
function drawChart(){ chartLegend();
  const cv=$('chartCanvas'); if(!cv)return; const dpr=devicePixelRatio||1, W=cv.clientWidth, H=cv.clientHeight;
  if(W<=0||H<=0)return;
  cv.width=W*dpr; cv.height=H*dpr; const ctx=cv.getContext('2d'); ctx.scale(dpr,dpr); ctx.clearRect(0,0,W,H);
  const e=curEq(),o=calc(e), pad={l:42,r:12,t:10,b:26};
  const px=(t,a,b)=>pad.l+(t-a)/(b-a)*(W-pad.l-pad.r);
  const py=(v,a,b)=>H-pad.b-(v-a)/(b-a)*(H-pad.t-pad.b);
  const nice=s=>{const p=Math.pow(10,Math.floor(Math.log10(s)));const n=s/p;return (n<=1?1:n<=2?2:n<=5?5:10)*p;};
  function axes(xa,xb,xs,ya,yb,ys,xl,yl){ ctx.strokeStyle='#eaeaea';ctx.fillStyle='#999';ctx.font='9px sans-serif';ctx.lineWidth=1;
    for(let v=ya;v<=yb+1e-6;v+=ys){const y=py(v,ya,yb);ctx.beginPath();ctx.moveTo(pad.l,y);ctx.lineTo(W-pad.r,y);ctx.stroke();ctx.textAlign='right';ctx.fillText(Math.round(v*100)/100,pad.l-5,y+3);}
    for(let t=xa;t<=xb+1e-6;t+=xs){const x=px(t,xa,xb);ctx.textAlign='center';ctx.fillText(t,x,H-pad.b+13);}
    ctx.fillStyle='#888';ctx.textAlign='center';ctx.fillText(xl,pad.l+(W-pad.l-pad.r)/2,H-2);
    ctx.save();ctx.translate(10,pad.t+(H-pad.t-pad.b)/2);ctx.rotate(-Math.PI/2);ctx.fillText(yl,0,0);ctx.restore(); }
  function curve(fn,xa,xb,ya,yb,color){ ctx.save();ctx.strokeStyle=color;ctx.lineWidth=0.5;ctx.setLineDash([5,3]);ctx.beginPath();let f=true;
    for(let t=xa;t<=xb+1e-6;t+=(xb-xa)/80){const v=fn(t),x=px(t,xa,xb),y=py(v,ya,yb);f?ctx.moveTo(x,y):ctx.lineTo(x,y);f=false;}ctx.stroke();ctx.restore(); }
  function dots(arr,xa,xb,ya,yb,color){ ctx.fillStyle=color; arr.forEach(p=>{ctx.beginPath();ctx.arc(px(p.x,xa,xb),py(p.y,ya,yb),2.4,0,7);ctx.fill();}); }
  function dot(x,y,xa,xb,ya,yb){const cx=px(x,xa,xb),cy=py(y,ya,yb);
    ctx.save();ctx.strokeStyle='#00838f';ctx.lineWidth=0.8;ctx.setLineDash([4,3]);
    ctx.beginPath();ctx.moveTo(cx,cy);ctx.lineTo(pad.l,cy);ctx.stroke();
    ctx.beginPath();ctx.moveTo(cx,cy);ctx.lineTo(cx,H-pad.b);ctx.stroke();ctx.restore();
    ctx.fillStyle='rgba(0,131,143,.28)';ctx.beginPath();ctx.arc(cx,cy,8,0,7);ctx.fill();
    ctx.fillStyle='#00838f';ctx.beginPath();ctx.arc(cx,cy,5,0,7);ctx.fill();}
  function rng(vals){ let a=Math.min(...vals),b=Math.max(...vals); const pd=(b-a)*0.2||0.5; a=Math.max(0,a-pd);b+=pd; const st=nice((b-a)/5); return [Math.floor(a/st)*st,Math.ceil(b/st)*st,st]; }
  const samp=[]; for(let t=0.2;t<=1.0001;t+=0.1) samp.push(polyval(o.coeffs,t));
  const [ya,yb,st]=rng(samp.concat([o.copO,o.copRef]));
  axes(20,100,10,ya,yb,st,'부하율 (%)','COP');
  curve(t=>polyval(o.coeffs,t/100),20,100,ya,yb,'#ED7458');
  if(o.pts.length) dots(o.pts.map(p=>({x:p.x*100,y:p.cop})),20,100,ya,yb,'#ED7458');
  if(o.loadO>0) dot(o.loadO*100,o.copO,20,100,ya,yb);
}

/* ===== 핸들러 ===== */
function update(){ const o=calc(curEq()); renderDataTable(); renderPerf(); renderTemp(); renderMetrics(); renderGauge(); renderDiag(); renderEqBox(); drawChart(); }
function recalcOut(){ const o=calc(curEq()); renderPerf(); renderTemp(); renderMetrics(); renderGauge(); renderDiag(); renderEqBox(); drawChart(); }
function onField(k,v){ const e=curEq(); e[k]=v;
  if(k==='name'){ renderTabs(); return; }
  if(k==='use') return;
  if(k==='type'){ update(); if($('srcModalMask').classList.contains('on'))showPlrSrc(); return; }
  renderAll();
}
function onKindSel(kind){ const e=curEq(); if(e.kind===kind)return; e.kind=kind;
  e.type=(TYPES[kind]||[])[0]; e.maker=(MAKERS[kind]||[])[0];
  if(kind==='냉동기'){ const cD=coolRT(e.chw.sD,e.chw.rD,e.chw.fD),cO=coolRT(e.chw.sO,e.chw.rO,e.chw.fO);
    if(cD>0)e.powD=Math.round(cD*RT_KW/5.5); if(cO>0)e.powO=Math.round(cO*RT_KW/6.0); }
  else { e.gasKcal=e.gasKcal||GAS_DEFAULT; if(e.fcO===''||e.fcO==null)e.fcO=56; if(e.fcD===''||e.fcD==null)e.fcD=88; }
  renderAll();
}
function onPlrMode(v){ curEq().plrMode=v; renderAll(); }
function onSub(g,k,v){ curEq()[g][k]= v===''?'':(+v); recalcOut(); }
function onRoot(k,v){ curEq()[k]= v===''?'':(+v); recalcOut(); }
function onRated(v){ curEq().ratedCOP= v===''?'':(+v); update(); }
function onManual(i,k,v){ curEq().manual[i][k]= v===''?'':(+v); update(); }
function addManual(){ curEq().manual.push({plr:'',cop:''}); update(); showPlrSrc(); }
function delManual(i){ curEq().manual.splice(i,1); update(); showPlrSrc(); }

function renderAll(){ renderTabs(); renderOverview(); renderDataTable(); renderPerf(); renderTemp(); renderMetrics(); renderGauge(); renderDiag(); renderEqBox(); drawChart(); }

  function outside(e){ var m=document.getElementById('himecExportMenu'); if(m && !m.contains(e.target)) closeMenu(); }
  function himecExport(btn){
    if(document.getElementById('himecExportMenu')){ closeMenu(); return; }
    var m=document.createElement('div'); m.className='himec-menu'; m.id='himecExportMenu';
    m.innerHTML =
      '<button data-x="pdf"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>PDF로 저장</button>'+
      '<button data-x="xls"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="2"/><line x1="9" y1="3" x2="9" y2="21"/><line x1="3" y1="9" x2="21" y2="9"/></svg>JSON 내보내기</button>';
    document.body.appendChild(m);
    var r=btn.getBoundingClientRect();
    var left=window.scrollX+r.right-m.offsetWidth; if(left<6) left=6;
    m.style.top=(window.scrollY+r.bottom+6)+'px'; m.style.left=left+'px';
    m.addEventListener('click', function(e){
      var t=e.target.closest('button'); if(!t) return;
      var x=t.getAttribute('data-x'); closeMenu();
      if(x==='pdf') window.print();
      else { try{ var b=new Blob([JSON.stringify({curIdx:curIdx,equips:equips},null,2)],{type:'application/json'}); var a=document.createElement('a'); a.href=URL.createObjectURL(b); a.download='냉동기_성능분석.json'; a.click(); }catch(err){ alert('내보내기 오류: '+err.message); } }
    });
    setTimeout(function(){ document.addEventListener('click', outside, true); }, 0);
  }
  window.himecExport=himecExport;
})();
</script>

<script>
/* === 센터 뷰 전환(운전 성능 <-> 현장 사진) + 사진 등록/촬영 === */
(function(){
  var PHOTO_LABELS = [
    "사진 1 (예: 장비 외관)",
    "사진 2 (예: 명판 / 사양)",
    "사진 3 (예: 냉수 배관)",
    "사진 4 (예: 냉각수 배관)",
    "사진 5 (예: 압력계 / 계측)",
    "사진 6 (예: 제어반 / 기타)"
  ];

  /* === 사진: 탭별 저장 (탭마다 독립 보관) === */
  var photoStore = {};   /* key(탭 식별자) -> [{cap,img}, ...] */
  var slotRefs   = [];   /* 사진 슬롯 DOM 참조 */
  var lastKey    = null;

  function activeTabKey(){
    var el = document.querySelector('.tab.active');
    if(el && el.id) return el.id;
    var tabs = document.querySelectorAll('.tab:not(.add)');
    for(var i=0;i<tabs.length;i++){ if(tabs[i].classList.contains('active')) return 'tabpos-'+i; }
    return 'tab-default';
  }

  function ensureRec(key){
    if(!photoStore[key]){
      var arr = [];
      for(var i=0;i<PHOTO_LABELS.length;i++){ arr.push({ cap:null, img:'' }); }
      photoStore[key] = arr;
    }
    return photoStore[key];
  }

  function loadPhotosForTab(){
    var grid = document.getElementById('photoGrid');
    if(!grid || !grid.dataset.built) return;
    var key = activeTabKey();
    lastKey = key;
    var rec = ensureRec(key);
    for(var i=0;i<slotRefs.length;i++){
      var s = slotRefs[i], r = rec[i];
      s.cap.value = (r && r.cap != null) ? r.cap : PHOTO_LABELS[i];
      var old = s.drop.querySelector('img');
      if(old) old.remove();
      if(r && r.img){
        var img = document.createElement('img');
        img.src = r.img;
        s.drop.appendChild(img);
        s.drop.classList.add('has-img');
      } else {
        s.drop.classList.remove('has-img');
      }
      s.input.value = '';
    }
  }
  window.loadPhotosForTab = loadPhotosForTab;

  /* 탭 전환/추가/삭제 자동 감지 → 해당 탭 사진 로드 */
  function watchTabs(){
    var anchor = document.querySelector('.tab.add') || document.querySelector('.tab');
    var bar = anchor ? anchor.parentNode : document.body;
    try{
      var mo = new MutationObserver(function(){
        if(activeTabKey() !== lastKey) loadPhotosForTab();
      });
      mo.observe(bar, { childList:true, subtree:true, attributes:true, attributeFilter:['class'] });
    }catch(e){}
  }
  if(document.readyState === 'loading') document.addEventListener('DOMContentLoaded', watchTabs);
  else watchTabs();

  function buildPhotoGrid(){
    var grid = document.getElementById('photoGrid');
    if(!grid || grid.dataset.built) return;
    grid.dataset.built = "1";
    slotRefs = [];
    for(var i=0;i<PHOTO_LABELS.length;i++){
      (function(idx){
        var slot = document.createElement('div');
        slot.className = 'photo-slot';

        var cap = document.createElement('input');
        cap.type = 'text';
        cap.className = 'photo-cap';
        cap.title = '제목을 클릭하여 편집하세요';
        cap.placeholder = PHOTO_LABELS[idx];
        cap.value = PHOTO_LABELS[idx];
        cap.addEventListener('input', function(){
          ensureRec(activeTabKey())[idx].cap = cap.value;
        });
        /* 입력창 클릭이 사진 촬영/선택으로 전파되지 않도록 차단 */
        cap.addEventListener('click', function(e){ e.stopPropagation(); });

        var drop = document.createElement('div');
        drop.className = 'photo-drop';
        drop.innerHTML =
          '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"/><circle cx="12" cy="13" r="4"/></svg>' +
          '<div class="pd-title">사진 ' + (idx+1) + '</div>' +
          '<div class="pd-sub">클릭하여 촬영 / 선택</div>';

        var input = document.createElement('input');
        input.type = 'file';
        input.accept = 'image/*';
        input.setAttribute('capture','environment');
        input.style.display = 'none';

        var del = document.createElement('button');
        del.type = 'button';
        del.className = 'photo-del';
        del.title = '사진 삭제';
        del.innerHTML = '&times;';

        drop.appendChild(input);
        drop.appendChild(del);

        drop.addEventListener('click', function(e){
          if(e.target === del) return;
          input.click();
        });

        input.addEventListener('change', function(){
          var f = input.files && input.files[0];
          if(!f) return;
          var r = new FileReader();
          r.onload = function(ev){
            var old = drop.querySelector('img');
            if(old) old.remove();
            var img = document.createElement('img');
            img.src = ev.target.result;
            drop.appendChild(img);
            drop.classList.add('has-img');
            ensureRec(activeTabKey())[idx].img = ev.target.result;
          };
          r.readAsDataURL(f);
        });

        del.addEventListener('click', function(e){
          e.stopPropagation();
          var img = drop.querySelector('img');
          if(img) img.remove();
          drop.classList.remove('has-img');
          input.value = '';
          ensureRec(activeTabKey())[idx].img = '';
        });

        slot.appendChild(cap);
        slot.appendChild(drop);
        grid.appendChild(slot);
        slotRefs[idx] = { cap:cap, drop:drop, input:input, del:del };
      })(i);
    }
    loadPhotosForTab();
  }

  window.switchCenterView = function(view){
    var perf  = document.getElementById('perfView');
    var photo = document.getElementById('photoView');
    var title = document.getElementById('centerTitle');
    var bDoc  = document.getElementById('ciDoc');
    var bCam  = document.getElementById('ciCam');
    if(!perf || !photo) return;

    if(view === 'photo'){
      buildPhotoGrid();
      perf.style.display  = 'none';
      photo.style.display = 'flex';
      if(title) title.innerHTML = '&#9632; 현장 사진';
      bDoc.classList.remove('active');
      bCam.classList.add('active');
    } else {
      photo.style.display = 'none';
      perf.style.display  = 'flex';
      if(title) title.innerHTML = '&#9632; 운전 성능 분석표';
      bCam.classList.remove('active');
      bDoc.classList.add('active');
      /* 숨김 상태에서 캔버스 크기가 0이 되므로 다시 그린다 */
      if(typeof drawChart === 'function'){ try{ drawChart(); }catch(e){} }
    }
  };
})();
</script>

</body>

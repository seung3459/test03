<!DOCTYPE html>
<html lang="ko">
<head>
	<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
	<script src="../../js/supabase-config.js"></script>
	<script src="../../js/auth-guard.js"></script>
	<script src="../../js/himec-supabase-sync.js"></script>
<meta charset="UTF-8">
<meta name="viewport" content="width=1920">
<script>
/* ============================================================
   HIMEC Cooling Tower Performance
   (Tool-303 디자인 틀 / Tool-203 냉각탑 로직 이식)
   냉각능력 = 환산수온레인지 TLC ÷ 설계 레인지 × 100 [%]
   ============================================================ */
const $=id=>document.getElementById(id);

function parseNum(v){ if(typeof v==='number') return v; if(!v) return 0;
  return parseFloat(String(v).replace(/,/g,''))||0; }
function fmt(n,d){ if(n===''||n==null||isNaN(n)) return '-';
  return (typeof d==='number') ? (+n).toFixed(d) : (''+n); }

const NUMERIC_IDS=['inp-design-wb','inp-design-in','inp-design-out','inp-out-temp','inp-rh','inp-cw-in','inp-cw-out'];

function recalc(){
  var designWb=parseNum($('inp-design-wb').value);
  var designIn=parseNum($('inp-design-in').value);
  var designOut=parseNum($('inp-design-out').value);
  var outTemp=parseNum($('inp-out-temp').value);
  var rh=parseNum($('inp-rh').value);
  var cwIn=parseNum($('inp-cw-in').value);
  var cwOut=parseNum($('inp-cw-out').value);

  var wb=calcWetBulbCarrier(outTemp,rh);          // 습구온도(자동)
  var dtlA=cwIn-cwOut;                              // 측정 수온레인지
  var N=wb, O=cwIn, M=dtlA;
  var denom=(45*(O-N)-(M*M)/3);
  var dtlB= denom!==0 ? M*(1+((O-N+45-M)/denom)*(37-O)) : M;   // 37℃ 환산 레인지
  var tlc=calcTLC(wb,dtlB,designWb);               // 환산수온레인지 TLC
  var designRange=designIn-designOut;              // 설계 레인지
  var perf= designRange>0 ? (tlc/designRange)*100 : 0;   // 냉각능력
  var designApp=designOut-designWb;                // 설계 어프로치
  var measApp=cwOut-wb;                             // 측정 어프로치

  // 좌측 자동 계산 셀
  $('calc-wb').textContent=fmt(wb,1);
  $('calc-tlc').textContent=fmt(tlc,1);
  $('calc-design-range').textContent=fmt(designRange,1);

  // 계통도 오버레이 (CS=냉각탑 출구수온 / CR=응축기 복귀=입구수온)
  var ovDash=function(v){ return isFinite(v)&&v!==0 ? fmt(v,1) : '-'; };
  $('ov-oat-v').textContent = isFinite(outTemp)&&outTemp!==0 ? fmt(outTemp,1) : '-';
  $('ov-rh-v').textContent  = isFinite(rh)&&rh!==0 ? fmt(rh,0) : '-';
  $('ov-cs-v').textContent  = ovDash(cwOut);   // 출구수온(CS)
  $('ov-cr-v').textContent  = ovDash(cwIn);    // 입구수온(CR)

  var V={ designWb:designWb,designIn:designIn,designOut:designOut,outTemp:outTemp,rh:rh,cwIn:cwIn,cwOut:cwOut,
    wb:wb,dtlA:dtlA,dtlB:dtlB,tlc:tlc,designRange:designRange,perf:perf,designApp:designApp,measApp:measApp,
    inR: designIn>0?cwIn/designIn*100:0, outR: designOut>0?cwOut/designOut*100:0,
    wbR: designWb>0?wb/designWb*100:0, rangeR: designRange>0?dtlA/designRange*100:0,
    appR: designApp>0?measApp/designApp*100:0 };

  renderPerf(V); renderMetrics(V); renderGauge(V); renderTempBar(V); renderDiag(V);
  drawChart();
  updateChartOverlay(wb,dtlB,designWb,tlc);
}

/* ===== 중앙 : 운전 성능 분석표 ===== */
function renderPerf(V){
  function r(n,d,m,cls){ return '<tr'+(cls?' class="'+cls+'"':'')+'><td>'+n+'</td><td class="num" style="text-align:right">'+d+'</td><td class="num" style="text-align:right">'+m+'</td></tr>'; }
  var h='<tr><th style="width:40%">항목</th><th style="text-align:right">설계</th><th style="text-align:right">측정</th></tr>';
  h+=r('입구수온 [℃]',fmt(V.designIn,1),fmt(V.cwIn,1));
  h+=r('출구수온 [℃]',fmt(V.designOut,1),fmt(V.cwOut,1));
  h+=r('수온레인지 [℃]',fmt(V.designRange,1),fmt(V.dtlA,1));
  h+=r('어프로치 [℃]',fmt(V.designApp,1),fmt(V.measApp,1));
  h+=r('냉각능력 [%]','100.0',fmt(V.perf,1),'eff');
  $('perfTable').innerHTML=h;
}

/* ===== 우측 : 결과 카드 ===== */
function renderMetrics(V){
  function mc(lbl,val,u,sub){
    return '<div class="metric-card"><div class="ml"><div class="metric-label">&#10003; '+lbl+'</div><div class="metric-sub">'+sub+'</div></div>'+
      '<div><span class="metric-value">'+val+'</span><span class="metric-unit">'+u+'</span></div></div>'; }
  var c='';
  c+=mc('표준 냉각능력',fmt(V.perf,0),'%','환산 TLC &divide; 설계 레인지');
  c+=mc('측정 수온레인지 &Delta;tlA',fmt(V.dtlA,1),'℃','냉각수 입구 &minus; 출구');
  c+=mc('환산 수온레인지 TLC',fmt(V.tlc,1),'℃','입구 37℃&middot;설계습구 환산');
  c+=mc('측정 어프로치',fmt(V.measApp,1),'℃','출구수온 &minus; 습구온도 (설계 '+fmt(V.designApp,1)+'℃)');
  c+=mc('측정 습구온도',fmt(V.wb,1),'℃','외기 '+fmt(V.outTemp,1)+'℃ &middot; RH '+fmt(V.rh,0)+'%');
  $('metricsArea').innerHTML=c;
}

/* ===== 우측 : 냉각능력 비교 막대 (Tool-303 게이지 톤) ===== */
function barSVG(groups,fmtd,fmtm){
  var base=132, top=44, maxH=base-top, bw=30, colD='#9fb4c9', colM='#00838f';
  var svg='';
  groups.forEach(function(g,gi){
    var cx=80+gi*160, mx=Math.max(g.d,g.m,1e-6), xd=cx-38, xm=cx+8;
    var hd=Math.max(2,g.d>0?g.d/mx*maxH:0), hm=Math.max(2,g.m>0?g.m/mx*maxH:0);
    svg+='<text x="'+cx+'" y="22" text-anchor="middle" font-size="10" font-weight="500" fill="#2f6f86">'+g.t+'</text>';
    svg+='<line x1="'+(cx-54)+'" y1="'+base+'" x2="'+(cx+54)+'" y2="'+base+'" stroke="#cfd6dc" stroke-width="1"/>';
    svg+='<rect x="'+xd+'" y="'+(base-hd)+'" width="'+bw+'" height="'+hd+'" fill="'+colD+'"/>';
    svg+='<text x="'+(xd+bw/2)+'" y="'+(base-hd-6)+'" text-anchor="middle" font-size="10" fill="#666">'+fmt(g.d,fmtd)+'</text>';
    svg+='<text x="'+(xd+bw/2)+'" y="'+(base+15)+'" text-anchor="middle" font-size="9" fill="#888">설계</text>';
    svg+='<rect x="'+xm+'" y="'+(base-hm)+'" width="'+bw+'" height="'+hm+'" fill="'+colM+'"/>';
    svg+='<text x="'+(xm+bw/2)+'" y="'+(base-hm-6)+'" text-anchor="middle" font-size="10" fill="'+colM+'">'+fmt(g.m,fmtm)+'</text>';
    svg+='<text x="'+(xm+bw/2)+'" y="'+(base+15)+'" text-anchor="middle" font-size="9" fill="#888">측정</text>';
  });
  return svg;
}
function renderGauge(V){
  $('donut').innerHTML=barSVG([ {t:'수온레인지 [℃]', d:V.designRange, m:V.tlc}, {t:'냉각능력 [%]', d:100, m:V.perf} ],1,1);
}
function renderTempBar(V){
}

/* ===== 우측 : 진단 (판정 기준 · 대한설비공학회 편람 / CTI / ASHRAE) ===== */
function renderDiag(V){
  function lvCap(p){ return p>=95?'ok':(p>=85?'warn':'bad'); }
  function lvApp(r){ if(!isFinite(r)||r<=0) return 'warn'; return r<=110?'ok':(r<=140?'warn':'bad'); }
  function lvRange(r){ var d=Math.abs(r-100); return d<=15?'ok':(d<=30?'warn':'bad'); }
  var ST={ok:'양호',warn:'점검 필요',bad:'불량'};
  var D=[];
  { var lv=lvCap(V.perf);
    var msg={ok:'정상 운전.',warn:'충전재·살수·통풍 점검.',bad:'충전재 폐색·성능 저하, 정비·교체.'}[lv];
    D.push([lv,'냉각능력',ST[lv],'환산능력 '+fmt(V.perf,1)+'% (TLC '+fmt(V.tlc,1)+'℃ / 설계레인지 '+fmt(V.designRange,1)+'℃) &mdash; '+msg,'출처: 설비공학편람 · CTI ATC-105 · KS B 6364']); }
  { var lv=lvApp(V.appR);
    var msg={ok:'접근온도 양호.',warn:'어프로치 확대, 충전재·풍량 점검.',bad:'어프로치 과대, 열교환 저하.'}[lv];
    D.push([lv,'어프로치',ST[lv],'측정 '+fmt(V.measApp,1)+'℃ / 설계 '+fmt(V.designApp,1)+'℃ ('+fmt(V.appR,0)+'%) &mdash; '+msg,'출처: CTI ATC-105 · ASHRAE Handbook(Cooling Towers)']); }
  { var lv=lvRange(V.rangeR);
    var msg={ok:'순환수량·열부하 정상.',warn:'레인지 편차, 순환수량·부하 점검.',bad:'레인지 이상, 순환수량·부하 불일치.'}[lv];
    D.push([lv,'레인지',ST[lv],'측정 '+fmt(V.dtlA,1)+'℃ / 설계 '+fmt(V.designRange,1)+'℃ ('+fmt(V.rangeR,0)+'%) &mdash; '+msg,'출처: 설비공학편람 · ASHRAE Handbook']); }
  { var worst='ok'; [lvCap(V.perf),lvApp(V.appR),lvRange(V.rangeR)].forEach(function(l){ if(l==='bad')worst='bad'; else if(l==='warn'&&worst==='ok')worst='warn'; });
    var msg={ok:'열성능 전반 양호.',warn:'일부 저하, 충전재·통풍 점검.',bad:'열성능 저하, 충전재 세정·정비.'}[worst];
    D.push([worst,'종합 평가',ST[worst],'냉각능력 '+fmt(V.perf,0)+'% · 어프로치 '+fmt(V.measApp,1)+'℃ · 레인지 '+fmt(V.dtlA,1)+'℃ &mdash; '+msg,'출처: 종합 진단']); }
  $('diag').innerHTML=D.map(function(d){ return '<div class="d '+d[0]+'"><div class="dhead">'+d[1]+' : <span class="dstat">'+d[2]+'</span></div><div class="dbody">'+d[3]+'<span class="dsrc" onclick="showSrcPopup(\''+d[1]+'\',\''+d[0]+'\')" title="클릭하면 판정 기준 요약 보기">'+d[4]+'</span></div></div>'; }).join('');
}

/* ===== 진단 출처 팝업 (Tool-303 동일 디자인) ===== */
const SRC_INFO={
  '냉각능력':{ std:'대한설비공학회 설비공학편람(제5판) · CTI ATC-105(Acceptance Test Code for Water-Cooling Towers) · KS B 6364(냉각탑) · ASHRAE Handbook(HVAC Systems & Equipment, Cooling Towers)', unit:'환산냉각능력비 (TLC/설계레인지)',
    desc:'환산수온레인지(TLC)를 설계 수온레인지로 나눈 냉각능력비입니다. TLC는 측정 수온레인지(ΔtlA)를 표준 입구수온 37℃로 보정(ΔtlB)한 뒤, 냉각탑 성능선도(습구온도–수온레인지 곡선)에서 설계 습구온도로 환산한 값입니다. ▸근거: CTI ATC-105는 실측 조건을 성능선도로 보정해 「Thermal Capability(냉각능력)」를 설계 대비 %로 평가하며 100%가 계약보증 기준입니다. 95/85% 임계는 설비공학편람·CTI 성능관리 관점의 현장 열화(충전재 오염·비산·통풍 저하) 관리값입니다.',
    rows:[['ok','≥ 95%','양호 — 설계능력 충족(CTI 인수기준 근접)'],['warn','85 ~ 95%','점검 — 충전재·살수·통풍 저하'],['bad','< 85%','불량 — 충전재 폐색·성능 현저 저하']] },
  '어프로치':{ std:'CTI ATC-105 · ASHRAE Handbook(Cooling Towers) · 대한설비공학회 설비공학편람 — 어프로치(냉각수 출구온도 − 입구 습구온도)', unit:'측정/설계 어프로치비',
    desc:'어프로치 = 냉각수 출구온도 − 입구 습구온도. 냉각탑이 습구온도에 얼마나 근접시켰는지를 나타내는 핵심 성능지표로 작을수록 우수합니다. ▸근거: CTI/ASHRAE는 어프로치를 냉각탑 능력의 1차 지표로 규정하며, 측정 어프로치가 설계 대비 커질수록 충전재 폐색·살수 불균일·통풍 부족을 시사합니다. 110/140% 임계는 CTI 성능관리 실무 편차값입니다.',
    rows:[['ok','≤ 110%','양호 — 접근온도 정상'],['warn','110 ~ 140%','점검 — 충전재·살수·풍량 저하 초기'],['bad','> 140%','불량 — 열교환 성능 저하']] },
  '레인지':{ std:'대한설비공학회 설비공학편람 · ASHRAE Handbook(Cooling Towers) — 레인지(냉각수 입구온도 − 출구온도)', unit:'측정/설계 레인지비',
    desc:'레인지 = 냉각수 입구온도 − 출구온도. 냉각탑을 통과하는 순환수량과 열부하를 반영하는 운전조건 지표입니다(레인지 자체는 능력이 아님). ▸근거: ASHRAE/설비공학편람은 레인지를 순환수량·부하 진단에 사용하며, 능력 판정은 어프로치·환산능력으로 수행합니다. ±15/±30% 밴드는 설계 대비 순환수량 허용편차 관행값입니다.',
    rows:[['ok','85 ~ 115%','양호 — 순환수량·부하 정상'],['warn','70~85% 또는 115~130%','점검 — 수량 과부족·부하 변동'],['bad','< 70% 또는 > 130%','불량 — 수량 이상·바이패스 의심']] },
  '습구온도':{ std:'CTI ATC-105(입구 습구온도 기준 성능평가) · 대한설비공학회 설비공학편람 · ASHRAE Handbook', unit:'측정 − 설계 습구온도',
    desc:'냉각탑 능력은 입구 습구온도를 기준으로 정의됩니다(CTI). 측정 습구온도가 설계값 이하이면 능력 판정 신뢰도가 높고, 크게 높으면 혹서 조건으로 능력 여유가 줄어듭니다. ▸습구온도는 외기 건구온도·상대습도로부터 Carrier(습공기) 방정식을 Magnus 포화수증기압과 Newton-Raphson 반복으로 수렴시켜 산출합니다.',
    rows:[['ok','≤ 설계 +1℃','양호 — 판정 신뢰도 높음'],['warn','설계 +1 ~ +3℃','점검 — 고온다습, 능력 여유 감소'],['bad','> 설계 +3℃','불량 — 혹서 조건, 능력확보 유의']] },
  '종합 평가':{ std:'대한설비공학회 설비공학편람 · CTI ATC-105 · ASHRAE Handbook · KS B 6364', unit:'냉각능력 · 어프로치 · 레인지 종합',
    desc:'냉각능력(환산 %)·어프로치·레인지를 종합 판정합니다. 냉각능력비와 어프로치가 능력의 직접 지표이며, 레인지·습구온도는 운전조건·판정 신뢰도를 보조합니다. ▸판정 우선순위: 냉각능력비(CTI Thermal Capability) → 어프로치 → 레인지. 저하 시 충전재 세정/교체·살수노즐 점검·통풍(팬·루버) 정비를 권고합니다.',
    rows:[['bad','능력<85% 또는 어프로치>140%','충전재 폐색·비산·통풍 부족 — 정비·교체'],['warn','능력 85~95% 또는 어프로치 110~140%','충전재 오염·살수 불균일 초기 — 세정·점검'],['ok','능력≥95% 그리고 어프로치≤110%','열성능 양호 — 정상 운전']] }
};
function showSrcPopup(cat,curLv){ var info=SRC_INFO[cat]; if(!info)return;
  var lvName={ok:'양호',warn:'점검 필요',bad:'불량'};
  var rows=info.rows.map(function(r){ return '<tr class="'+(r[0]===curLv?'cur':'')+'"><td class="rng">'+r[1]+'</td><td><span class="lv-'+r[0]+'">'+lvName[r[0]]+'</span></td><td>'+(r[2].split('—')[1]?r[2].split('—')[1].trim():r[2])+'</td></tr>'; }).join('');
  $('srcModalTitle').textContent=cat+' 판정 기준';
  $('srcModalBody').innerHTML='<div class="sm-std">출처: '+info.std+'</div><div class="sm-desc">'+info.desc+'</div>'+
    '<table><thead><tr><th>'+info.unit+'</th><th>판정</th><th>의미</th></tr></thead><tbody>'+rows+'</tbody></table>'+
    '<div class="sm-desc" style="margin-top:8px;color:#999;">※ 음영 행은 현재 측정값의 판정 구간입니다.</div>';
  $('srcModalMask').classList.add('on');
}
function showRefsSrc(){
  var stds=[
    ['설비공학편람 제5판 〔한국〕','대한설비공학회(SAREK) — 냉각탑 성능·냉각능력 시험, 어프로치·레인지·성능선도(습구온도–수온레인지) 해석'],

// Convert data coordinates to canvas pixel coordinates
function dataToCanvas(canvas, xVal, yVal) {
  // CSS 픽셀 기준 (padLeft 등도 CSS 픽셀이므로 단위 일치 필수)
  const w = canvas.clientWidth || (canvas.width / (window.devicePixelRatio || 1));
  const h = canvas.clientHeight || (canvas.height / (window.devicePixelRatio || 1));
  const plotW = w - CHART.padLeft - CHART.padRight;
  const plotH = h - CHART.padTop - CHART.padBottom;
  const px = CHART.padLeft + (xVal - CHART.xMin) / (CHART.xMax - CHART.xMin) * plotW;
  const py = CHART.padTop + (1 - (yVal - CHART.yMin) / (CHART.yMax - CHART.yMin)) * plotH;
  return { x: px, y: py };
}

// Convert data coordinates to % position (for overlay)
function dataToPercent(xVal, yVal) {
  const canvas = document.getElementById('chartCanvas');
  const w = canvas.clientWidth || (canvas.width / (window.devicePixelRatio || 1)) || 1;
  const h = canvas.clientHeight || (canvas.height / (window.devicePixelRatio || 1)) || 1;
  const p = dataToCanvas(canvas, xVal, yVal);
  return { x: (p.x / w) * 100, y: (p.y / h) * 100 };
}

/* ========== 습구온도 자동 계산 (Carrier 근사공식) ========== */
function calcWetBulbCarrier(Tdb, RH) {
  // Magnus 공식으로 포화수증기압 계산 (kPa)
  function satVaporPressure(T) {
    return 0.6105 * Math.exp((17.27 * T) / (T + 237.3));
  }
  // 절대습도 계산
  function humidityRatio(Ps, P) {
    return 0.62198 * Ps / (P - Ps);
  }
  var P = 101.325; // 대기압 kPa
  var Ps_db = satVaporPressure(Tdb);
  var Pw = (RH / 100.0) * Ps_db;
  var W = 0.62198 * Pw / (P - Pw); // 실제 절대습도

  // Newton-Raphson 반복법으로 습구온도 수렴
  var Tw = Tdb * Math.atan(0.151977 * Math.sqrt(RH + 8.313659))
         + Math.atan(Tdb + RH) - Math.atan(RH - 1.676331)
         + 0.00391838 * Math.pow(RH, 1.5) * Math.atan(0.023101 * RH)
         - 4.686035; // Stull 초기값

  for (var iter = 0; iter < 50; iter++) {
    var Ps_w = satVaporPressure(Tw);
    var Ws_w = humidityRatio(Ps_w, P);
    // Carrier 방정식: W = ((2501 - 2.326*Tw)*Ws_w - 1.006*(Tdb - Tw)) / (2501 + 1.86*Tdb - 4.186*Tw)
    var W_calc = ((2501 - 2.326 * Tw) * Ws_w - 1.006 * (Tdb - Tw)) / (2501 + 1.86 * Tdb - 4.186 * Tw);
    var err = W_calc - W;
    if (Math.abs(err) < 1e-6) break;
    // 수치 미분
    var dTw = 0.01;
    var Ps_w2 = satVaporPressure(Tw + dTw);
    var Ws_w2 = humidityRatio(Ps_w2, P);
    var W_calc2 = ((2501 - 2.326 * (Tw + dTw)) * Ws_w2 - 1.006 * (Tdb - (Tw + dTw))) / (2501 + 1.86 * Tdb - 4.186 * (Tw + dTw));
    var dErr = (W_calc2 - W - err) / dTw;
    if (Math.abs(dErr) < 1e-12) break;
    Tw = Tw - err / dErr;
  }
  return Math.round(Tw * 10) / 10;
}

/* ========== 환산수온레인지 TLC 자동 계산 (성능선도 보간) ========== */
function calcTLC(wb, dtlB, designWb) {
  const xArr = CURVE_DATA.x;
  const curveNames = Object.keys(CURVE_DATA.curves);

  // 1. wb에서 각 곡선의 y값을 보간하여 구한다
  function getYatX(curveName, xVal) {
    const yArr = CURVE_DATA.curves[curveName];
    // xVal이 범위 밖이면 외삽
    if (xVal <= xArr[0]) return yArr[0];
    if (xVal >= xArr[xArr.length - 1]) return yArr[yArr.length - 1];
    // 선형 보간
    for (let i = 0; i < xArr.length - 1; i++) {
      if (xVal >= xArr[i] && xVal <= xArr[i + 1]) {
        const t = (xVal - xArr[i]) / (xArr[i + 1] - xArr[i]);
        return yArr[i] + t * (yArr[i + 1] - yArr[i]);
      }
    }
    return yArr[yArr.length - 1];
  }

  // 2. 측정 습구온도(wb)에서 각 곡선의 y값 배열
  const yAtWb = curveNames.map(name => getYatX(name, wb));

  // 3. dtlB가 어느 두 곡선 사이에 있는지 찾기
  //    곡선은 C1(가장 아래)~C17(가장 위) 순서이므로 y값이 오름차순
  let lowerIdx = -1;
  let upperIdx = -1;

  // dtlB가 모든 곡선 아래인 경우
  if (dtlB <= yAtWb[0]) {
    // 가장 아래 두 곡선으로 외삽
    lowerIdx = 0;
    upperIdx = 1;
  }
  // dtlB가 모든 곡선 위인 경우
  else if (dtlB >= yAtWb[yAtWb.length - 1]) {
    // 가장 위 두 곡선으로 외삽
    lowerIdx = yAtWb.length - 2;
    upperIdx = yAtWb.length - 1;
  }
  else {
    // 사이에 있는 경우
    for (let i = 0; i < yAtWb.length - 1; i++) {
      if (dtlB >= yAtWb[i] && dtlB <= yAtWb[i + 1]) {
        lowerIdx = i;
        upperIdx = i + 1;
        break;
      }
    }
  }

  if (lowerIdx < 0 || upperIdx < 0) return dtlB; // fallback

  // 4. 두 곡선 사이에서의 비율 (fractional position)
  const range = yAtWb[upperIdx] - yAtWb[lowerIdx];
  const fraction = range !== 0 ? (dtlB - yAtWb[lowerIdx]) / range : 0;

  // 5. 설계습구온도(designWb)에서 같은 두 곡선의 y값
  const yLowerAtDesign = getYatX(curveNames[lowerIdx], designWb);
  const yUpperAtDesign = getYatX(curveNames[upperIdx], designWb);

  // 6. 같은 비율로 보간 → TLC
  const tlc = yLowerAtDesign + fraction * (yUpperAtDesign - yLowerAtDesign);

  return Math.round(tlc * 100) / 100; // 소수점 2자리
}

  g1h.style.left = leftPct + '%';
  g1h.style.width = (p1.x - leftPct) + '%';
  overlay.appendChild(g1h);

  // P1 → X axis (vertical guide)
  const g1v = document.createElement('div');
  g1v.style.cssText = 'position:absolute;border-left:0.7px dashed rgba(255,0,0,0.3);pointer-events:none;z-index:3;';
  g1v.style.left = p1.x + '%';
  g1v.style.top = p1.y + '%';
  g1v.style.height = (bottomPct - p1.y) + '%';
  overlay.appendChild(g1v);

  // P2 → Y axis (horizontal guide)
  const g2h = document.createElement('div');
  g2h.style.cssText = 'position:absolute;border-top:0.7px dashed rgba(0,102,255,0.3);pointer-events:none;z-index:3;';
  g2h.style.top = p2.y + '%';
  g2h.style.left = leftPct + '%';
  g2h.style.width = (p2.x - leftPct) + '%';
  overlay.appendChild(g2h);

  // P2 → X axis (vertical guide) - not needed, already covered by red vertical line

  // 5.5. Curve-following dashed line from TLB to TLC along C-curve slope
  // Uses same interpolation logic as calcTLC to trace the path between curves
  {
    const xArr = CURVE_DATA.x;
    const curveNames = Object.keys(CURVE_DATA.curves);

    function getYatX_overlay(curveName, xVal) {
      const yArr = CURVE_DATA.curves[curveName];
      if (xVal <= xArr[0]) return yArr[0];
      if (xVal >= xArr[xArr.length - 1]) return yArr[yArr.length - 1];
      for (let i = 0; i < xArr.length - 1; i++) {
        if (xVal >= xArr[i] && xVal <= xArr[i + 1]) {
          const t = (xVal - xArr[i]) / (xArr[i + 1] - xArr[i]);
          return yArr[i] + t * (yArr[i + 1] - yArr[i]);
        }
      }
      return yArr[yArr.length - 1];
    }

    // Find which two C curves TLB sits between at wbTemp
    const yAtWb = curveNames.map(name => getYatX_overlay(name, wbTemp));
    let lowerIdx = -1, upperIdx = -1;

    if (dtlB <= yAtWb[0]) {
      lowerIdx = 0; upperIdx = 1;
    } else if (dtlB >= yAtWb[yAtWb.length - 1]) {
      lowerIdx = yAtWb.length - 2; upperIdx = yAtWb.length - 1;
    } else {
      for (let i = 0; i < yAtWb.length - 1; i++) {
        if (dtlB >= yAtWb[i] && dtlB <= yAtWb[i + 1]) {
          lowerIdx = i; upperIdx = i + 1; break;
        }
      }
    }

    if (lowerIdx >= 0 && upperIdx >= 0) {
      const range = yAtWb[upperIdx] - yAtWb[lowerIdx];
      const fraction = range !== 0 ? (dtlB - yAtWb[lowerIdx]) / range : 0;

      // Generate points along the curve from wbTemp to designWb
      const numSteps = 40;
      const xStart = wbTemp;
      const xEnd = designWb;
      const pathPoints = [];

      for (let s = 0; s <= numSteps; s++) {
        const xVal = xStart + (xEnd - xStart) * (s / numSteps);
        const yLower = getYatX_overlay(curveNames[lowerIdx], xVal);
        const yUpper = getYatX_overlay(curveNames[upperIdx], xVal);
        const yVal = yLower + fraction * (yUpper - yLower);
        const pct = dataToPercent(xVal, yVal);
        pathPoints.push(pct);
      }

      // Draw SVG polyline
      const svgNS = 'http://www.w3.org/2000/svg';
      const svgLine = document.createElementNS(svgNS, 'svg');
      svgLine.setAttribute('style', 'position:absolute;left:0;top:0;width:100%;height:100%;pointer-events:none;z-index:6;overflow:visible;');
      svgLine.setAttribute('viewBox', '0 0 100 100');
      svgLine.setAttribute('preserveAspectRatio', 'none');

      // Define arrowhead marker
      const defs = document.createElementNS(svgNS, 'defs');
      const marker = document.createElementNS(svgNS, 'marker');
      marker.setAttribute('id', 'arrowhead-tlc');
      marker.setAttribute('markerWidth', '16');
      marker.setAttribute('markerHeight', '8');
      marker.setAttribute('refX', '10');
      marker.setAttribute('refY', '3.5');
      marker.setAttribute('orient', 'auto');
      marker.setAttribute('markerUnits', 'strokeWidth');
      const arrowPath = document.createElementNS(svgNS, 'polygon');
      arrowPath.setAttribute('points', '0 0, 10 3.5, 0 7');
      arrowPath.setAttribute('fill', '#00838f');
      marker.appendChild(arrowPath);
      defs.appendChild(marker);
      svgLine.appendChild(defs);

      // Build polyline points string
      const pointsStr = pathPoints.map(p => p.x + ',' + p.y).join(' ');
      const polyline = document.createElementNS(svgNS, 'polyline');
      polyline.setAttribute('points', pointsStr);
      polyline.setAttribute('fill', 'none');
      polyline.setAttribute('stroke', '#00838f');
      polyline.setAttribute('stroke-width', '1.1');
      polyline.setAttribute('stroke-dasharray', '5,3');
      polyline.setAttribute('vector-effect', 'non-scaling-stroke');
      polyline.setAttribute('marker-end', 'url(#arrowhead-tlc)');
      svgLine.appendChild(polyline);
      overlay.appendChild(svgLine);
    }
  }

  // 5. Point markers (축 범위를 벗어나면 경계에 고정하여 표시)
  addPoint(overlay, clampX(p1.x), clampY(p1.y), '#ff0000',
    '측정: 습구 ' + wbTemp.toFixed(1) + '℃, ΔtlB ' + dtlB.toFixed(1) + '℃');
  addPoint(overlay, clampX(p2.x), clampY(p2.y), '#00838f',
    '환산: 설계습구 ' + designWb.toFixed(0) + '℃, tlC ' + tlc.toFixed(1) + '℃');
}

function addPoint(overlay, xPct, yPct, color, labelText) {
  const point = document.createElement('div');
  point.className = 'chart-point';
  point.style.left = xPct + '%';
  point.style.top = yPct + '%';
  point.style.background = color;
  point.style.boxShadow = '0 0 8px ' + color + '88';

  const label = document.createElement('div');
  label.className = 'chart-point-label';
  label.style.left = xPct + '%';
  label.style.top = (yPct - 2) + '%';
  label.textContent = labelText;
  label.style.display = 'none';

  point.addEventListener('mouseenter', function() { label.style.display = 'block'; });
  point.addEventListener('mouseleave', function() { label.style.display = 'none'; });
  point.addEventListener('touchstart', function(e) {
    e.preventDefault();
    label.style.display = label.style.display === 'none' ? 'block' : 'none';
  });

  // Always-visible mini label
  const miniLabel = document.createElement('div');
  miniLabel.style.cssText = 'position:absolute;left:' + (xPct + 1.5) + '%;top:' + (yPct - 0.5) + '%;font-size:11px;font-weight:700;color:' + color + ';pointer-events:none;white-space:nowrap;z-index:12;text-shadow:1px 1px 2px #fff,-1px -1px 2px #fff,1px -1px 2px #fff,-1px 1px 2px #fff;';
  const parts = labelText.split(',');
  miniLabel.textContent = parts[parts.length - 1].trim();

  overlay.appendChild(point);
  overlay.appendChild(label);
  overlay.appendChild(miniLabel);
}


/* ========== Tab Management (Tool-303 동일 방식) ========== */
let tabCount=1, activeTab=1, nextTabId=2;
const FIELD_IDS=['inp-name','inp-no','inp-use','inp-note','inp-design-wb','inp-design-in','inp-design-out','inp-out-temp','inp-rh','inp-cw-in','inp-cw-out'];
const DEFAULT_VALUES={'inp-name':'CT-01','inp-no':'#1','inp-use':'냉동기 응축기 냉각용','inp-note':'개방형 대향류',
 'inp-design-wb':'27','inp-design-in':'37','inp-design-out':'32',
 'inp-out-temp':'27.8','inp-rh':'59','inp-cw-in':'32.2','inp-cw-out':'28.3'};
const EMPTY_VALUES={}; FIELD_IDS.forEach(id=>{EMPTY_VALUES[id]='';});
const equipStore={};
function initStore(){ equipStore[1]={}; FIELD_IDS.forEach(id=>{ var el=$(id); equipStore[1][id]=el?el.value:(DEFAULT_VALUES[id]||''); }); }
function saveCurrentTab(){ if(!equipStore[activeTab])equipStore[activeTab]={}; FIELD_IDS.forEach(id=>{ var el=$(id); if(el)equipStore[activeTab][id]=el.value; }); }
function loadTab(tabId){ var data=equipStore[tabId]||EMPTY_VALUES; FIELD_IDS.forEach(id=>{ var el=$(id); if(el){ el.value=data[id]||''; el.placeholder=(!data[id])?'입력하세요':''; } }); }
function updateTabName(){ var name=$('inp-name').value||'장비', no=$('inp-no').value||('#'+activeTab); var tb=$('tab-'+activeTab);
  if(tb){ var cb=tb.querySelector('.tab-close'); tb.textContent=name+' '+no; if(cb)tb.appendChild(cb); } }
function switchTab(tabId){ if(tabId===activeTab)return; saveCurrentTab(); updateTabName();
  document.querySelectorAll('.tab:not(.add)').forEach(t=>t.classList.remove('active'));
  var t=$('tab-'+tabId); if(t)t.classList.add('active'); activeTab=tabId; loadTab(tabId); recalc(); }
function addTab(){ saveCurrentTab(); updateTabName(); var newId=nextTabId++; tabCount++;
  equipStore[newId]={}; FIELD_IDS.forEach(id=>{ equipStore[newId][id]=''; });
  var btn=document.createElement('button'); btn.className='tab'; btn.id='tab-'+newId; btn.textContent='장비 #'+tabCount;
  btn.onclick=function(){ switchTab(newId); };
  var cs=document.createElement('span'); cs.className='tab-close'; cs.innerHTML='&#10005;';
  cs.onclick=function(e){ e.stopPropagation(); removeTab(newId); }; btn.appendChild(cs);
  var bar=document.querySelector('.tab-bar'); bar.insertBefore(btn, bar.lastElementChild);
  document.querySelectorAll('.tab:not(.add)').forEach(t=>t.classList.remove('active'));
  btn.classList.add('active'); activeTab=newId; loadTab(newId); recalc(); }
function removeTab(tabId){ var tabs=document.querySelectorAll('.tab:not(.add)');
  if(tabs.length<=1){ alert('최소 1개의 장비는 유지해야 합니다.'); return; }
  var tb=$('tab-'+tabId); var nm=tb?tb.textContent.replace('\u2715','').trim():'장비';
  if(!confirm('"'+nm+'" 장비를 삭제하시겠습니까?'))return;
  if(tb)tb.remove(); delete equipStore[tabId];
  if(activeTab===tabId){ var rem=document.querySelectorAll('.tab:not(.add)');
    if(rem.length>0){ var f=rem[0]; var fid=parseInt(f.id.replace('tab-','')); f.classList.add('active'); activeTab=fid; loadTab(fid); recalc(); } } }

window.addEventListener('DOMContentLoaded', function(){
  initStore();
  ['inp-name','inp-no'].forEach(id=>{ var el=$(id); if(el)el.addEventListener('input', updateTabName); });
  recalc();
});
window.addEventListener('resize', function(){ recalc(); });
</script>

<script>
/* === HIMEC 공통 헤더 기능 (Save / Export / Main) === */
(function(){
  function fields(){ return Array.prototype.slice.call(document.querySelectorAll('input, select, textarea')); }
  function fkey(el,i){ return el.id?('#'+el.id):('@'+i); }
  function storeKey(){ return 'HIMEC_SAVE::'+(location.pathname||document.title||'tool') + '::' + (new URLSearchParams(location.search).get('projectId') || 'default'); }
  function himecSave(){ try{ var data={}; fields().forEach(function(el,i){ var k=fkey(el,i);
    if(el.type==='checkbox'||el.type==='radio'){ data[k]={t:'chk',v:el.checked}; } else { data[k]={t:'val',v:el.value}; } });
    localStorage.setItem(storeKey(), JSON.stringify(data)); alert('현재 화면의 입력값이 저장되었습니다.');
    }catch(e){ alert('저장 중 오류가 발생했습니다: '+e.message); } }
  function himecRestore(){ try{ var raw=localStorage.getItem(storeKey()); if(!raw)return; var data=JSON.parse(raw);
    fields().forEach(function(el,i){ var rec=data[fkey(el,i)]; if(!rec)return;
      if(rec.t==='chk'){ el.checked=!!rec.v; el.dispatchEvent(new Event('change',{bubbles:true})); }
      else { el.value=rec.v; el.dispatchEvent(new Event('input',{bubbles:true})); el.dispatchEvent(new Event('change',{bubbles:true})); } });
    }catch(e){} }
  function closeMenu(){ var m=document.getElementById('himecExportMenu'); if(m)m.parentNode.removeChild(m); document.removeEventListener('click', outside, true); }
  function outside(e){ var m=document.getElementById('himecExportMenu'); if(m&&!m.contains(e.target))closeMenu(); }
  function himecExport(btn){ if(document.getElementById('himecExportMenu')){ closeMenu(); return; }
    var m=document.createElement('div'); m.className='himec-menu'; m.id='himecExportMenu';
    m.innerHTML='<button data-x="pdf"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>PDF로 저장</button>'+
      '<button data-x="xls"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="2"/><line x1="9" y1="3" x2="9" y2="21"/><line x1="3" y1="9" x2="21" y2="9"/></svg>Excel로 내보내기</button>';
    document.body.appendChild(m); var r=btn.getBoundingClientRect(); var left=window.scrollX+r.right-m.offsetWidth; if(left<6)left=6;
    m.style.top=(window.scrollY+r.bottom+6)+'px'; m.style.left=left+'px';
    m.addEventListener('click', function(e){ var t=e.target.closest('button'); if(!t)return; var x=t.getAttribute('data-x'); closeMenu(); if(x==='pdf')himecPDF(); else himecExcel(); });
    setTimeout(function(){ document.addEventListener('click', outside, true); }, 0); }
  function himecPDF(){ window.print(); }
  function himecExcel(){ alert('Excel 내보내기는 추후 별도 양식으로 제공될 예정입니다.'); }
  function himecMain(){
    location.href = '../tool_dashboard.html';
  }
  window.himecSave=himecSave; window.himecExport=himecExport; window.himecMain=himecMain;
  if(document.readyState==='loading'){ window.addEventListener('DOMContentLoaded', function(){ setTimeout(himecRestore,60); }); }
  else { setTimeout(himecRestore,60); }
})();
</script>

<script>
/* 방향 전환/리사이즈 시 레이더 캔버스 재드로 */
(function(){
  function poke(){ try{ window.dispatchEvent(new Event('resize')); }catch(e){} }
  function pokeAll(){ poke(); requestAnimationFrame(poke); setTimeout(poke,120); setTimeout(poke,400); }
  window.addEventListener('load', pokeAll);
  window.addEventListener('orientationchange', pokeAll);
  if(window.matchMedia){ try{ window.matchMedia('(orientation: portrait)').addEventListener('change', pokeAll); }
    catch(e){ try{ window.matchMedia('(orientation: portrait)').addListener(pokeAll); }catch(_){} } }
  if('ResizeObserver' in window){ var ro=new ResizeObserver(function(){ pokeAll(); });
    function obs(){ ['#chartWrapper','.chart-wrap'].forEach(function(sel){ document.querySelectorAll(sel).forEach(function(el){ try{ ro.observe(el); }catch(e){} }); }); }
    if(document.readyState!=='loading')obs(); else document.addEventListener('DOMContentLoaded',obs); }
})();
</script>

<!-- 출처/판정 기준 팝업 (Tool-201 동일) -->
<div class="src-modal-mask" id="srcModalMask" onclick="if(event.target===this)closeSrcPopup()">
  <div class="src-modal">
    <div class="sm-head"><h3 id="srcModalTitle">판정 기준</h3><button class="sm-close" onclick="closeSrcPopup()">&times;</button></div>
    <div class="sm-body" id="srcModalBody"></div>
  </div>
</div>
<script>
/* === 센터 뷰 전환(운전 성능 <-> 현장 사진) + 사진 등록/촬영 === */
(function(){
  var PHOTO_LABELS = [
    "사진 1 (예: 장비 외관)",
    "사진 2 (예: 명판 / 사양)",
    "사진 3 (예: 흡입/입구측)",
    "사진 4 (예: 토출/출구측)",
    "사진 5 (예: 계측기 / 게이지)",
    "사진 6 (예: 제어반 / 기타)"
  ];

  /* === 사진: 탭별 저장 (탭마다 독립 보관) === */
  var photoStore = {};   /* key(탭 식별자) -> [{cap,img}, ...] */
  var slotRefs   = [];   /* 사진 슬롯 DOM 참조 */
  var lastKey    = null;

  function activeTabKey(){
    var el = document.querySelector('.tab.active');
    if(el && el.id) return el.id;
    var tabs = document.querySelectorAll('.tab:not(.add)');
    for(var i=0;i<tabs.length;i++){ if(tabs[i].classList.contains('active')) return 'tabpos-'+i; }
    return 'tab-default';
  }

  function ensureRec(key){
    if(!photoStore[key]){
      var arr = [];
      for(var i=0;i<PHOTO_LABELS.length;i++){ arr.push({ cap:null, img:'' }); }
      photoStore[key] = arr;
    }
    return photoStore[key];
  }

  function loadPhotosForTab(){
    var grid = document.getElementById('photoGrid');
    if(!grid || !grid.dataset.built) return;
    var key = activeTabKey();
    lastKey = key;
    var rec = ensureRec(key);
    for(var i=0;i<slotRefs.length;i++){
      var s = slotRefs[i], r = rec[i];
      s.cap.value = (r && r.cap != null) ? r.cap : PHOTO_LABELS[i];
      var old = s.drop.querySelector('img');
      if(old) old.remove();
      if(r && r.img){
        var img = document.createElement('img');
        img.src = r.img;
        s.drop.appendChild(img);
        s.drop.classList.add('has-img');
      } else {
        s.drop.classList.remove('has-img');
      }
      s.input.value = '';
    }
  }
  window.loadPhotosForTab = loadPhotosForTab;

  /* 탭 전환/추가/삭제 자동 감지 → 해당 탭 사진 로드 */
  function watchTabs(){
    var anchor = document.querySelector('.tab.add') || document.querySelector('.tab');
    var bar = anchor ? anchor.parentNode : document.body;
    try{
      var mo = new MutationObserver(function(){
        if(activeTabKey() !== lastKey) loadPhotosForTab();
      });
      mo.observe(bar, { childList:true, subtree:true, attributes:true, attributeFilter:['class'] });
    }catch(e){}
  }
  if(document.readyState === 'loading') document.addEventListener('DOMContentLoaded', watchTabs);
  else watchTabs();

  function buildPhotoGrid(){
    var grid = document.getElementById('photoGrid');
    if(!grid || grid.dataset.built) return;
    grid.dataset.built = "1";
    slotRefs = [];
    for(var i=0;i<PHOTO_LABELS.length;i++){
      (function(idx){
        var slot = document.createElement('div');
        slot.className = 'photo-slot';

        var cap = document.createElement('input');
        cap.type = 'text';
        cap.className = 'photo-cap';
        cap.title = '제목을 클릭하여 편집하세요';
        cap.placeholder = PHOTO_LABELS[idx];
        cap.value = PHOTO_LABELS[idx];
        cap.addEventListener('input', function(){
          ensureRec(activeTabKey())[idx].cap = cap.value;
        });
        /* 입력창 클릭이 사진 촬영/선택으로 전파되지 않도록 차단 */
        cap.addEventListener('click', function(e){ e.stopPropagation(); });

        var drop = document.createElement('div');
        drop.className = 'photo-drop';
        drop.innerHTML =
          '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"/><circle cx="12" cy="13" r="4"/></svg>' +
          '<div class="pd-title">사진 ' + (idx+1) + '</div>' +
          '<div class="pd-sub">클릭하여 촬영 / 선택</div>';

        var input = document.createElement('input');
        input.type = 'file';
        input.accept = 'image/*';
        input.setAttribute('capture','environment');
        input.style.display = 'none';

        var del = document.createElement('button');
        del.type = 'button';
        del.className = 'photo-del';
        del.title = '사진 삭제';
        del.innerHTML = '&times;';

        drop.appendChild(input);
        drop.appendChild(del);

        drop.addEventListener('click', function(e){
          if(e.target === del) return;
          input.click();
        });

        input.addEventListener('change', function(){
          var f = input.files && input.files[0];
          if(!f) return;
          var r = new FileReader();
          r.onload = function(ev){
            var old = drop.querySelector('img');
            if(old) old.remove();
            var img = document.createElement('img');
            img.src = ev.target.result;
            drop.appendChild(img);
            drop.classList.add('has-img');
            ensureRec(activeTabKey())[idx].img = ev.target.result;
          };
          r.readAsDataURL(f);
        });

        del.addEventListener('click', function(e){
          e.stopPropagation();
          var img = drop.querySelector('img');
          if(img) img.remove();
          drop.classList.remove('has-img');
          input.value = '';
          ensureRec(activeTabKey())[idx].img = '';
        });

        slot.appendChild(cap);
        slot.appendChild(drop);
        grid.appendChild(slot);
        slotRefs[idx] = { cap:cap, drop:drop, input:input, del:del };
      })(i);
    }
    loadPhotosForTab();
  }

  window.switchCenterView = function(view){
    var perf  = document.getElementById('perfView');
    var photo = document.getElementById('photoView');
    var title = document.getElementById('centerTitle');
    var bDoc  = document.getElementById('ciDoc');
    var bCam  = document.getElementById('ciCam');
    if(!perf || !photo) return;

    if(view === 'photo'){
      buildPhotoGrid();
      perf.style.display  = 'none';
      photo.style.display = 'flex';
      if(title) title.innerHTML = '&#9632; 현장 사진';
      bDoc.classList.remove('active');
      bCam.classList.add('active');
    } else {
      photo.style.display = 'none';
      perf.style.display  = 'flex';
      if(title) title.innerHTML = '&#9632; 운전 성능 분석표';
      bCam.classList.remove('active');
      bDoc.classList.add('active');
      /* 숨김 상태에서 캔버스 크기가 0이 되므로 다시 그린다 */
      if(typeof recalc === 'function'){ try{ recalc(); }catch(e){} }
    }
  };
})();
</script>

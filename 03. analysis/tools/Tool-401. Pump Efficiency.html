<script>
/* === HIMEC 공통 헤더 기능 (Save / Export / Main) === */
(function(){
  function fields(){ return Array.prototype.slice.call(document.querySelectorAll('input, select, textarea')); }
  function fkey(el,i){ return el.id ? ('#'+el.id) : ('@'+i); }
  function storeKey(){ return 'HIMEC_SAVE::' + (location.pathname || document.title || 'tool') + '::' + (new URLSearchParams(location.search).get('projectId') || 'default'); }

  function himecSave(){
    try{
      var data={};
      fields().forEach(function(el,i){
        var k=fkey(el,i);
        if(el.type==='checkbox'||el.type==='radio'){ data[k]={t:'chk', v:el.checked}; }
        else { data[k]={t:'val', v:el.value}; }
      });
      localStorage.setItem(storeKey(), JSON.stringify(data));
      alert('현재 화면의 입력값이 저장되었습니다.');
    }catch(e){ alert('저장 중 오류가 발생했습니다: '+e.message); }
  }

  function himecRestore(){
    try{
      var raw=localStorage.getItem(storeKey()); if(!raw) return;
      var data=JSON.parse(raw);
      fields().forEach(function(el,i){
        var rec=data[fkey(el,i)]; if(!rec) return;
        if(rec.t==='chk'){ el.checked=!!rec.v; el.dispatchEvent(new Event('change',{bubbles:true})); }
        else { el.value=rec.v; el.dispatchEvent(new Event('input',{bubbles:true})); el.dispatchEvent(new Event('change',{bubbles:true})); }
      });
    }catch(e){}
  }

  function closeMenu(){ var m=document.getElementById('himecExportMenu'); if(m) m.parentNode.removeChild(m); document.removeEventListener('click', outside, true); }
  function outside(e){ var m=document.getElementById('himecExportMenu'); if(m && !m.contains(e.target)) closeMenu(); }

  function himecExport(btn){
    if(document.getElementById('himecExportMenu')){ closeMenu(); return; }
    var m=document.createElement('div'); m.className='himec-menu'; m.id='himecExportMenu';
    m.innerHTML =
      '<button data-x="pdf"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>PDF로 저장</button>'+
      '<button data-x="xls"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="2"/><line x1="9" y1="3" x2="9" y2="21"/><line x1="3" y1="9" x2="21" y2="9"/></svg>Excel로 내보내기</button>';
    document.body.appendChild(m);
    var r=btn.getBoundingClientRect();
    var left=window.scrollX+r.right-m.offsetWidth; if(left<6) left=6;
    m.style.top=(window.scrollY+r.bottom+6)+'px';
    m.style.left=left+'px';
    m.addEventListener('click', function(e){
      var t=e.target.closest('button'); if(!t) return;
      var x=t.getAttribute('data-x'); closeMenu();
      if(x==='pdf') himecPDF(); else himecExcel();
    });
    setTimeout(function(){ document.addEventListener('click', outside, true); }, 0);
  }

  function himecPDF(){
    /* 화면 비율 그대로 인쇄 → 브라우저 인쇄 대화상자에서 'PDF로 저장' 선택 */
    window.print();
  }
  function himecExcel(){
    alert('Excel 내보내기는 추후 별도 양식으로 제공될 예정입니다.');
  }

  function himecMain(){
    location.href = '../tool_dashboard.html';
  }

  window.himecSave=himecSave;
  window.himecExport=himecExport;
  window.himecMain=himecMain;

  if(document.readyState==='loading'){
    window.addEventListener('DOMContentLoaded', function(){ setTimeout(himecRestore, 60); });
  } else { setTimeout(himecRestore, 60); }
})();
</script>

<script>
(function(){
  // 캔버스형 차트(레이더/도넛 SVG 제외)는 방향전환 시 다시 그려야 하므로 resize 이벤트를 강제 발생
  function poke(){ try{ window.dispatchEvent(new Event('resize')); }catch(e){} }
  function pokeAll(){ poke(); requestAnimationFrame(poke); setTimeout(poke,120); setTimeout(poke,400); }
  window.addEventListener('load', pokeAll);
  window.addEventListener('orientationchange', pokeAll);
  if(window.matchMedia){
    try{ window.matchMedia('(orientation: portrait)').addEventListener('change', pokeAll); }
    catch(e){ try{ window.matchMedia('(orientation: portrait)').addListener(pokeAll); }catch(_){} }
  }
  // 차트 래퍼 박스 크기 변화 감지
  if('ResizeObserver' in window){
    var ro=new ResizeObserver(function(){ pokeAll(); });
    function obs(){
      ['#chartWrapper','.chart-wrapper','.chart-canvas-container','#barChartArea',
       '.bar-chart-area','#cvwrap','.chart-area'].forEach(function(sel){
        document.querySelectorAll(sel).forEach(function(el){ try{ ro.observe(el); }catch(e){} });
      });
    }
    if(document.readyState!=='loading') obs(); else document.addEventListener('DOMContentLoaded',obs);
  }
})();
</script>

    height:auto !important; min-height:0 !important; overflow:visible !important;

  body .main{
    display:block !important; flex:none !important;      /* grid/flex -> DOM 순서대로 세로 스택 */
    height:auto !important; min-height:0 !important; overflow:visible !important;
  }
  body .main > .panel{
    display:flex !important; flex-direction:column !important;
    width:100% !important; height:auto !important;
    min-height:0 !important; max-height:none !important; overflow:visible !important;
  }

  /* ★핵심: 패널 내부 flex 채움(flex:1 / min-height:0) 자식들이 높이 0으로
     붕괴하는 것을 막는다 -> 콘텐츠 자연 높이 + 내부 스크롤 박스 개방 */

  /* 레이더 차트: 화면폭 기준 정사각 확보 (세로 모드) */

    flex:none !important; width:100% !important;
    height:65vw !important; min-height:200px !important; max-height:400px !important;
    overflow:visible !important;
  }
  body .main .chart-canvas-container{ width:100% !important; height:100% !important; }
  /* 막대그래프 컨테이너 */

    flex:none !important; height:auto !important; min-height:220px !important; overflow:visible !important;
  }
  /* 도넛 게이지(원/파이): 세로 모드에서 지름을 화면폭 기준 40vw로 제한(약 50% 축소) */

  /* 진단 결과: 내부 스크롤 제거 -> 전체 목록을 페이지 흐름으로 펼침 */

  }

  /* 저작권 등 하단 요소 항상 노출 */

<script>
/* === 센터 뷰 전환(운전 성능 <-> 현장 사진) + 사진 등록/촬영 === */
(function(){
  var PHOTO_LABELS = [
    "사진 1 (예: 장비 외관)",
    "사진 2 (예: 명판 / 사양)",
    "사진 3 (예: 흡입/입구측)",
    "사진 4 (예: 토출/출구측)",
    "사진 5 (예: 계측기 / 게이지)",
    "사진 6 (예: 제어반 / 기타)"
  ];

  /* === 사진: 탭별 저장 (탭마다 독립 보관) === */
  var photoStore = {};   /* key(탭 식별자) -> [{cap,img}, ...] */
  var slotRefs   = [];   /* 사진 슬롯 DOM 참조 */
  var lastKey    = null;

  function activeTabKey(){
    var el = document.querySelector('.tab.active');
    if(el && el.id) return el.id;
    var tabs = document.querySelectorAll('.tab:not(.add)');
    for(var i=0;i<tabs.length;i++){ if(tabs[i].classList.contains('active')) return 'tabpos-'+i; }
    return 'tab-default';
  }

  function ensureRec(key){
    if(!photoStore[key]){
      var arr = [];
      for(var i=0;i<PHOTO_LABELS.length;i++){ arr.push({ cap:null, img:'' }); }
      photoStore[key] = arr;
    }
    return photoStore[key];
  }

  function loadPhotosForTab(){
    var grid = document.getElementById('photoGrid');
    if(!grid || !grid.dataset.built) return;
    var key = activeTabKey();
    lastKey = key;
    var rec = ensureRec(key);
    for(var i=0;i<slotRefs.length;i++){
      var s = slotRefs[i], r = rec[i];
      s.cap.value = (r && r.cap != null) ? r.cap : PHOTO_LABELS[i];
      var old = s.drop.querySelector('img');
      if(old) old.remove();
      if(r && r.img){
        var img = document.createElement('img');
        img.src = r.img;
        s.drop.appendChild(img);
        s.drop.classList.add('has-img');
      } else {
        s.drop.classList.remove('has-img');
      }
      s.input.value = '';
    }
  }
  window.loadPhotosForTab = loadPhotosForTab;

  /* 탭 전환/추가/삭제 자동 감지 → 해당 탭 사진 로드 */
  function watchTabs(){
    var anchor = document.querySelector('.tab.add') || document.querySelector('.tab');
    var bar = anchor ? anchor.parentNode : document.body;
    try{
      var mo = new MutationObserver(function(){
        if(activeTabKey() !== lastKey) loadPhotosForTab();
      });
      mo.observe(bar, { childList:true, subtree:true, attributes:true, attributeFilter:['class'] });
    }catch(e){}
  }
  if(document.readyState === 'loading') document.addEventListener('DOMContentLoaded', watchTabs);
  else watchTabs();

  function buildPhotoGrid(){
    var grid = document.getElementById('photoGrid');
    if(!grid || grid.dataset.built) return;
    grid.dataset.built = "1";
    slotRefs = [];
    for(var i=0;i<PHOTO_LABELS.length;i++){
      (function(idx){
        var slot = document.createElement('div');
        slot.className = 'photo-slot';

        var cap = document.createElement('input');
        cap.type = 'text';
        cap.className = 'photo-cap';
        cap.title = '제목을 클릭하여 편집하세요';
        cap.placeholder = PHOTO_LABELS[idx];
        cap.value = PHOTO_LABELS[idx];
        cap.addEventListener('input', function(){
          ensureRec(activeTabKey())[idx].cap = cap.value;
        });
        /* 입력창 클릭이 사진 촬영/선택으로 전파되지 않도록 차단 */
        cap.addEventListener('click', function(e){ e.stopPropagation(); });

        var drop = document.createElement('div');
        drop.className = 'photo-drop';
        drop.innerHTML =
          '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"/><circle cx="12" cy="13" r="4"/></svg>' +
          '<div class="pd-title">사진 ' + (idx+1) + '</div>' +
          '<div class="pd-sub">클릭하여 촬영 / 선택</div>';

        var input = document.createElement('input');
        input.type = 'file';
        input.accept = 'image/*';
        input.setAttribute('capture','environment');
        input.style.display = 'none';

        var del = document.createElement('button');
        del.type = 'button';
        del.className = 'photo-del';
        del.title = '사진 삭제';
        del.innerHTML = '&times;';

        drop.appendChild(input);
        drop.appendChild(del);

        drop.addEventListener('click', function(e){
          if(e.target === del) return;
          input.click();
        });

        input.addEventListener('change', function(){
          var f = input.files && input.files[0];
          if(!f) return;
          var r = new FileReader();
          r.onload = function(ev){
            var old = drop.querySelector('img');
            if(old) old.remove();
            var img = document.createElement('img');
            img.src = ev.target.result;
            drop.appendChild(img);
            drop.classList.add('has-img');
            ensureRec(activeTabKey())[idx].img = ev.target.result;
          };
          r.readAsDataURL(f);
        });

        del.addEventListener('click', function(e){
          e.stopPropagation();
          var img = drop.querySelector('img');
          if(img) img.remove();
          drop.classList.remove('has-img');
          input.value = '';
          ensureRec(activeTabKey())[idx].img = '';
        });

        slot.appendChild(cap);
        slot.appendChild(drop);
        grid.appendChild(slot);
        slotRefs[idx] = { cap:cap, drop:drop, input:input, del:del };
      })(i);
    }
    loadPhotosForTab();
  }

  window.switchCenterView = function(view){
    var perf  = document.getElementById('perfView');
    var photo = document.getElementById('photoView');
    var title = document.getElementById('centerTitle');
    var bDoc  = document.getElementById('ciDoc');
    var bCam  = document.getElementById('ciCam');
    if(!perf || !photo) return;

    if(view === 'photo'){
      buildPhotoGrid();
      perf.style.display  = 'none';
      photo.style.display = 'flex';
      if(title) title.innerHTML = '&#9632; 현장 사진';
      bDoc.classList.remove('active');
      bCam.classList.add('active');
    } else {
      photo.style.display = 'none';
      perf.style.display  = 'flex';
      if(title) title.innerHTML = '■ 설계 대비 측정 성능 비교 (레이더 차트)';
      bCam.classList.remove('active');
      bDoc.classList.add('active');
      /* 숨김 상태에서 캔버스 크기가 0이 되므로 다시 그린다 */
      if(typeof recalc === 'function'){ try{ recalc(); }catch(e){} }
    }
  };
})();
</script>

<!DOCTYPE html>
<html lang="ko">
<head>
	<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
	<script src="../../js/supabase-config.js"></script>
	<script src="../../js/auth-guard.js"></script>
	<script src="../../js/himec-supabase-sync.js"></script>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HIMEC - 2nd Diagnosis Piping</title>
<style>
/* ===== Reset & Base ===== */
*{ margin: 0; padding: 0; box-sizing: border-box; }
html, body{
  height: 100%;
  font-family: 'Pretendard', 'Noto Sans KR', -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
  background: #f4f4f4;
  display: flex;
  flex-direction: column;
}
/* ===== Page Container ===== */
.page-container{
  padding: 0 100px;
  background: #fff;
  flex: 1;
  display: flex;
  flex-direction: column;
  overflow: hidden;
  min-height: 0;
}
/* ===== HEADER ===== */
.header{
  background: #fff;
  padding: 8px 20px;
  border-bottom: 1px solid #ddd;
  flex-shrink: 0;
  margin-left: -100px;
  margin-right: -100px;
  padding-left: 120px;
  padding-right: 120px;
  position: relative;
}
.header h1{ font-size: 20px; font-weight: 700; color: #222; }
.header .sub{ font-size: 11px; color: #888; margin-top: 2px; }
.header h2{ font-size: 15px; font-weight: 600; color: #333; margin-top: 4px; }
.header-right{
  position: absolute;
  bottom: 8px;
  right: 20px;
  display: flex;
  gap: 8px;
}
.header-right button{
  padding: 8px 0;
  width: 90px;
  border: none;
  border-radius: 4px;
  font-size: 10px;
  font-weight: 600;
  cursor: pointer;
  text-align: center;
}
.btn-save{ background: #e85d24; color: #fff; }
.btn-file{ background: #e85d24; color: #fff; }
.btn-main{ background: #555f; color: #fff; }
.btn-save:hover, .btn-file:hover{ opacity: 0.85; }
.btn-main:hover{ opacity: 0.85; }
/* ===== FOOTER COPYRIGHT ===== */
.footer-copyright{
  flex-shrink: 0;
  background: #f8fafc;
  border-top: none;
  padding: 8px 100px;
  text-align: center;
}
.footer-inner{
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 8px;
  font-size: 10px;
  color: #e0e0e0;
  letter-spacing: 0.01em;
}
.footer-divider{
  color: var(--border);
}

/* ===== CONTENT AREA ===== */
.content-area{
  flex: 1;
  overflow-y: auto;
  padding: 16px 0;
  min-height: 0;
}
/* ===== Main Panel ===== */
.main-panel{ display: flex; flex-direction: column; flex: 1; min-height: 0; overflow: hidden; }

/* ===== diag2-tab styles ===== */
.diag2-tab-bar{
  display: flex;
  align-items: center;
  margin: 8px 0 4px;
  padding: 4px 20px 0;
  background: #fff;
  gap: 4px;
  flex-shrink: 0;
}
.diag2-tab-list{
  display: flex;
  gap: 6px;
  flex-wrap: wrap;
}
.diag2-tab{
  position: relative;
  display: inline-flex;
  align-items: center;
  gap: 4px;
  padding: 6px 28px 6px 14px;
  border-radius: 6px 6px 0 0;
  font-size: 12px;
  font-weight: 600;
  cursor: pointer;
  border: none;
  background: #bbb;
  color: #fff;
  white-space: nowrap;
  user-select: none;
  transition: background .15s;
}
.diag2-tab:hover{ background: #999; }
.diag2-tab.active{ background: #00838f; color: #fff; }
.diag2-tab-close{
  position: absolute;
  right: 6px;
  top: 50%;
  transform: translateY(-50%);
  width: 16px;
  height: 16px;
  border-radius: 50%;
  border: none;
  background: transparent;
  color: rgba(255,255,255,0.7);
  font-size: 13px;
  line-height: 16px;
  text-align: center;
  cursor: pointer;
  padding: 0;
}
.diag2-tab-close:hover{ background: rgba(255,0,0,0.6); color: #fff; }

/* ===== FanEff Panel Styles ===== */
.fanEff-unit-panel{
  margin: 8px 20px;
  border: 1px solid #e0e0e0;
  border-radius: 4px;
  background: #fff;
  overflow: hidden;
}
.fanEff-main{
  display: grid;
  grid-template-columns: 1fr 1.1fr 0.9fr;
  gap: 0;
  padding: 0;
  min-height: 780px;
}
.fanEff-panel{
  background: #fff;
  border: 1px solid transparent;
  padding: 10px;
  display: flex;
  flex-direction: column;
  overflow-y: auto;
  min-height: 0;
}
.fanEff-section-title{
  font-size: 12px;
  font-weight: 700;
  margin-bottom: 4px;
  color: #222;
  flex-shrink: 0;
}
@media (max-width: 1600px) {
  .page-container { padding: 0 60px; }
  .header { margin-left: -60px; margin-right: -60px; padding-left: 80px; padding-right: 80px; }
  .footer-copyright { padding: 6px 80px; margin-left: -60px; margin-right: -60px; }
}
@media (max-width: 1300px) {
  .page-container { padding: 0 30px; }
  .header { margin-left: -30px; margin-right: -30px; padding-left: 50px; padding-right: 50px; }
  .footer-copyright { padding: 6px 50px; margin-left: -30px; margin-right: -30px; }
}
@media (max-width: 1100px) {
  .page-container { padding: 0 15px; }
  .header { margin-left: -15px; margin-right: -15px; padding-left: 35px; padding-right: 35px; }
  .footer-copyright { padding: 6px 35px; margin-left: -15px; margin-right: -15px; }
  .fanEff-main{ grid-template-columns: 1fr 1fr; }
  .fanEff-center-panel{ grid-column: 1 / -1; grid-row: 1; }
}
@media (max-width: 700px) {
  .page-container { padding: 0 10px; }
  .header { margin-left: -10px; margin-right: -10px; padding-left: 30px; padding-right: 30px; }
  .footer-copyright { padding: 6px 30px; margin-left: -10px; margin-right: -10px; }
  .fanEff-main{ grid-template-columns: 1fr; }
  .fanEff-center-panel{ grid-column: 1; }
}

/* Table styles */
.fanEff-unit-panel .info-table{
  width: 100%;
  border-collapse: separate;
  border-spacing: 0;
  table-layout: fixed;
  margin-bottom: 6px;
  font-size: 10px;
  flex-shrink: 0;
}
.fanEff-unit-panel .info-table th, .fanEff-unit-panel .info-table td{
  border: 1px solid #ffffff;
  padding: 5px 4px;
  border-bottom: 1.5px solid #ccc;
  text-align: center;
}
.fanEff-unit-panel .info-table th{
  background: #e8e8e8;
  color: #555;
  font-weight: 600;
  font-size: 10px;
}
.fanEff-unit-panel .info-table tr:first-child th:first-child{ border-top-left-radius: 8px; }
.fanEff-unit-panel .info-table tr:first-child th:last-child{ border-top-right-radius: 8px; }
.fanEff-unit-panel .info-table td{ background: #fff; }
.fanEff-unit-panel .info-table .row-header{
  background: #f0f0f0;
  font-weight: 600;
  color: #00838f;
  font-size: 11px;
  width: 40px;
}
.fanEff-unit-panel .info-table input{
  width: 100%;
  border: none;
  text-align: center;
  font-size: 11px;
  background: transparent;
  outline: none;
  padding: 3px 2px;
}
.fanEff-unit-panel .info-table .highlight-cell{
  background: #e0f7fa;
  color: #00838f;
  font-weight: 700;
}
.fanEff-unit-panel .info-table input::placeholder{
  color: #aaa;
  font-style: italic;
  font-size: 10px;
}
.fanEff-unit-panel .note{
  font-size: 9px;
  color: #888;
  margin: 4px 0 6px;
  text-align: right;
  flex-shrink: 0;
}

/* Photo Grid */
.fanEff-unit-panel .fanEff-photo-grid{
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  grid-template-rows: repeat(3, 1fr);
  gap: 6px;
  flex: 1;
  min-height: 0;
  overflow: hidden;
  padding: 4px 0;
}
.fanEff-unit-panel .fanEff-photo-slot{
  display: flex;
  flex-direction: column;
  border: 1.5px solid #e0e0e0;
  border-radius: 4px;
  overflow: hidden;
  background: #fafafa;
  min-height: 0;
}
.fanEff-unit-panel .fanEff-photo-desc{ flex-shrink: 0; border-bottom: 1px solid #e8e8e8; }
.fanEff-unit-panel .fanEff-photo-desc input{
  width: 100%; border: none; outline: none; padding: 3px 6px; font-size: 9px; background: #f5f5f5; color: #333;
}
.fanEff-unit-panel .fanEff-photo-desc input::placeholder{ color: #aaa; font-style: italic; }
.fanEff-unit-panel .fanEff-photo-display{
  flex: 1; position: relative; cursor: pointer; display: flex; align-items: center; justify-content: center; min-height: 80px; overflow: hidden;
}
.fanEff-unit-panel .fanEff-photo-num{
  position: absolute; top: 3px; left: 3px; width: 16px; height: 16px; border-radius: 50%;
  background: #00838f; color: #fff; font-size: 9px; font-weight: 700; display: flex; align-items: center; justify-content: center; z-index: 2;
}
.fanEff-unit-panel .fanEff-photo-empty{ display: flex; flex-direction: column; align-items: center; gap: 2px; padding: 6px; }
.fanEff-unit-panel .fanEff-cam-icon{ font-size: 20px; opacity: 0.4; }
.fanEff-unit-panel .fanEff-cam-text{ font-size: 10px; color: #999; font-weight: 600; }
.fanEff-unit-panel .fanEff-cam-sub{ font-size: 8px; color: #bbb; }
.fanEff-unit-panel .fanEff-photo-preview{ position: absolute; top: 0; left: 0; right: 0; bottom: 0; overflow: hidden; }
.fanEff-unit-panel .fanEff-photo-preview img{ width: 100%; height: 100%; object-fit: cover; }
.fanEff-unit-panel .fanEff-photo-actions{
  position: absolute; bottom: 0; left: 0; right: 0; display: flex; justify-content: center; gap: 4px; padding: 3px; background: rgba(0,0,0,0.5); opacity: 0; transition: opacity 0.2s ease;
}
.fanEff-unit-panel .fanEff-photo-display:hover .fanEff-photo-actions{ opacity: 1; }
.fanEff-unit-panel .fanEff-photo-btn{
  border: none; background: rgba(255,255,255,0.9); color: #333; font-size: 10px; padding: 2px 6px; border-radius: 3px; cursor: pointer;
}
.fanEff-unit-panel .fanEff-photo-btn:hover{ background: #fff; }
.fanEff-unit-panel .fanEff-photo-btn.del{ color: #e53e3e; font-weight: 700; }

/* Data Input Section */
.fanEff-unit-panel .data-input-section{ border: none; background: transparent; margin-top: 4px; flex-shrink: 0; }
.fanEff-unit-panel .data-input-header{ display: flex; align-items: center; justify-content: space-between; padding: 0 0 4px 0; }
.fanEff-unit-panel .data-input-body{}

/* Meas Grid Table */
.fanEff-unit-panel .meas-grid-table{
  margin-bottom: 4px !important;
  flex: 1;
  table-layout: fixed;
}
.fanEff-unit-panel .meas-grid-table th{
  font-size: 10px !important;
  padding: 8px 4px !important;
  background: #f0f0f0 !important;
  text-align: center;
}
.fanEff-unit-panel .meas-grid-table td{
  padding: 4px 2px !important;
}
.fanEff-unit-panel .meas-grid-table input{
  font-size: 11px !important;
  padding: 6px 2px !important;
  text-align: center;
}
.fanEff-unit-panel .meas-grid-table input[readonly]{
  font-weight: 700;
  color: #00838f;
  background: #e0f7fa;
  cursor: default;
}
.fanEff-unit-panel .meas-grid-table .row-header{
  white-space: nowrap;
  font-weight: 600;
  background: #f7f7f7;
}

/* Meas Summary Table */
.fanEff-unit-panel .meas-summary-table{
  table-layout: fixed;
  margin-bottom: 2px !important;
}
.fanEff-unit-panel .meas-summary-table th{
  background: #e8e8e8;
  color: #555;
  font-weight: 600;
  font-size: 10px;
  white-space: nowrap;
  padding: 8px 4px !important;
  text-align: center;
  vertical-align: middle;
}
.fanEff-unit-panel .meas-summary-table td{
  background: #ffffff;
  min-width: 50px;
  padding: 8px 4px !important;
  text-align: center;
  vertical-align: middle;
}
.fanEff-unit-panel .meas-sum-val{
  width: 100%;
  border: none;
  background: transparent;
  text-align: center;
  font-weight: 700;
  font-size: 12px;
  color: #222;
  cursor: default;
  padding: 0;
  outline: none;
}

/* Analysis Result */
.fanEff-unit-panel .analysis-row{
  border: none; border-radius: 6px; padding: 6px 8px; margin-bottom: 6px; background: #fafbfc; flex: 1; min-height: 0; display: flex; flex-direction: column;
}
.fanEff-unit-panel .analysis-row-header{ display: flex; align-items: center; gap: 6px; margin-bottom: 6px; }
.fanEff-unit-panel .analysis-row-label{
  display: inline-block; background: #00838f; color: #fff; font-size: 10px; font-weight: 700; padding: 2px 8px; border-radius: 3px; min-width: 28px; text-align: center;
}
.fanEff-unit-panel .analysis-row-label.result{ background: #555; }
.fanEff-unit-panel .analysis-row-sub{ font-size: 10px; color: #888; font-weight: 500; }
.fanEff-unit-panel .analysis-row-result{ flex: 1; display: flex; flex-direction: column; min-height: 0; }
.fanEff-unit-panel .analysis-result-text{
  width: 100%; flex: 1; min-height: 50px; border: 1px solid #ddd; border-radius: 4px; padding: 6px 8px;
  font-size: 10px; font-family: 'Noto Sans KR', sans-serif; color: #333; background: #fff; resize: none; outline: none; line-height: 1.5;
}
.fanEff-unit-panel .analysis-result-text:focus{ border-color: #00838f; }
.fanEff-unit-panel .analysis-result-text::placeholder{ color: #aaa; font-style: italic; }

/* Check Group */
.fanEff-unit-panel .analysis-check-group{ display: flex; gap: 4px; margin-top: 6px; flex-shrink: 0; }
.fanEff-unit-panel .analysis-check-item{
  flex: 1; display: flex; align-items: center; gap: 4px; padding: 5px 6px; border-radius: 4px;
  font-size: 9px; font-weight: 600; color: #555; cursor: pointer; transition: all 0.15s; background: #fff;
}
.fanEff-unit-panel .analysis-check-item input[type="checkbox"]{ display: none; }
.fanEff-unit-panel .analysis-check-dot{
  width: 12px; height: 12px; border: 1.5px solid #ccc; border-radius: 3px; flex-shrink: 0; position: relative; transition: all 0.15s;
}
.fanEff-unit-panel .analysis-check-item.good input:checked ~ .analysis-check-dot.good{ background: #00838f; border-color: #00838f; }
.fanEff-unit-panel .analysis-check-item.good input:checked ~ .analysis-check-dot.good::after{
  content: ''; position: absolute; top: 1px; left: 3px; width: 4px; height: 6px; border: solid #fff; border-width: 0 1.5px 1.5px 0; transform: rotate(45deg);
}
.fanEff-unit-panel .analysis-check-item.good input:checked ~ span:last-child{ color: #00838f; }
.fanEff-unit-panel .analysis-check-item.maint input:checked ~ .analysis-check-dot.maint{ background: #ff8c00; border-color: #ff8c00; }
.fanEff-unit-panel .analysis-check-item.maint input:checked ~ .analysis-check-dot.maint::after{
  content: ''; position: absolute; top: 1px; left: 3px; width: 4px; height: 6px; border: solid #fff; border-width: 0 1.5px 1.5px 0; transform: rotate(45deg);
}
.fanEff-unit-panel .analysis-check-item.maint input:checked ~ span:last-child{ color: #ff8c00; }
.fanEff-unit-panel .analysis-check-item.replace input:checked ~ .analysis-check-dot.replace{ background: #e53e3e; border-color: #e53e3e; }
.fanEff-unit-panel .analysis-check-item.replace input:checked ~ .analysis-check-dot.replace::after{
  content: ''; position: absolute; top: 1px; left: 3px; width: 4px; height: 6px; border: solid #fff; border-width: 0 1.5px 1.5px 0; transform: rotate(45deg);
}
.fanEff-unit-panel .analysis-check-item.replace input:checked ~ span:last-child{ color: #e53e3e; }
.fanEff-unit-panel .analysis-check-item.good:has(input:checked){ background: #e0f7fa; }
.fanEff-unit-panel .analysis-check-item.maint:has(input:checked){ background: #fff8e1; }
.fanEff-unit-panel .analysis-check-item.replace:has(input:checked){ background: #ffebee; }

/* Photo Viewer */
.fanEff-photo-viewer{
  display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0;
  background: rgba(0,0,0,0.85); z-index: 10000; align-items: center; justify-content: center; cursor: pointer;
}
.fanEff-photo-viewer.active{ display: flex; }
.fanEff-photo-viewer img{ max-width: 90%; max-height: 90%; object-fit: contain; border-radius: 4px; }
.fanEff-photo-viewer-close{
  position: absolute; top: 16px; right: 24px; background: none; border: none; color: #fff; font-size: 32px; cursor: pointer; z-index: 10001;
}

/* ===== PIPE Specific Styles ===== */
.pipe-help-btn{
  display: inline-flex; align-items: center; justify-content: center;
  width: 18px; height: 18px; border: none; border-radius: 50%;
  background: #e8e8e8; color: #555; font-size: 12px; font-weight: 700;
  cursor: pointer; vertical-align: middle; line-height: 1; padding: 0;
}
.pipe-help-btn:hover{ background: #d6d6d6; }

.pipe-chart-area{
  display: flex; justify-content: space-around; align-items: flex-end;
  gap: 10px; padding: 14px 8px 8px; height: 300px;
  background: #fafafa; border: 1px solid #eee; border-radius: 6px;
}
.pipe-bar-group{
  display: flex; flex-direction: column; align-items: center;
  justify-content: flex-end; flex: 1; height: 100%;
}
.pipe-bar-value{ font-size: 15px; font-weight: 700; color: #333; margin-bottom: 4px; }
.pipe-bar-track{ width: 46px; height: 210px; display: flex; flex-direction: column-reverse; }
.pipe-bar-fill{ width: 100%; border-radius: 3px 3px 0 0; transition: height .25s; min-height: 0; }
.pipe-bar-tag{ margin-top: 6px; font-size: 12px; font-weight: 600; color: #444; text-align: center; }

/* Pipe Modal */
.pipe-modal-overlay{
  display: none; position: fixed; inset: 0;
  background: rgba(0,0,0,.5); z-index: 99999;
  align-items: center; justify-content: center;
}
.pipe-modal-box{
  background: #e9ecef; width: 560px; max-width: 92vw; max-height: 86vh;
  border-radius: 10px; display: flex; flex-direction: column; overflow: hidden;
  box-shadow: 0 12px 40px rgba(0,0,0,.3);
}
.pipe-modal-head{
  display: flex; align-items: center; justify-content: space-between;
  padding: 12px 16px; background: #e8e8e8; color: #555;
  font-size: 15px; font-weight: 700;
}
.pipe-modal-close{ background: none; border: none; color: #555; font-size: 18px; cursor: pointer; line-height: 1; }
.pipe-modal-body{ padding: 14px 16px; overflow-y: auto; background: #fff; }
.pipe-modal-group{
  font-size: 13px; font-weight: 700; color: #2563eb;
  margin: 14px 0 4px; padding-bottom: 3px; border-bottom: 2px solid #2563eb;
}
.pipe-modal-group:first-child{ margin-top: 0; }
.pipe-modal-mat{ font-size: 12px; font-weight: 600; color: #333; margin: 10px 0 3px; }
.pipe-modal-table{ width: 100%; border-collapse: collapse; font-size: 11px; margin-bottom: 4px; }
.pipe-modal-table th{ background: #f0f4ff; border: 1px solid #d6deeb; padding: 4px 6px; text-align: center; }
.pipe-modal-table td{ border: 1px solid #e2e2e2; padding: 3px 6px; text-align: center; }
.pipe-modal-table tr:nth-child(even) td{ background: #fafbfd; }

/* Equipment Add Button */
.diag-summary-header{
  display: flex; align-items: center; justify-content: space-between;
  padding: 8px 20px; border-bottom: 1px solid #e5e7eb;
}
.diag-summary-actions{ display: flex; gap: 8px; }
/* .diag2-tab.add - 탭 추가 버튼 */
.diag2-tab.add{
  background: #999; color: #fff; font-size: 14px;
  padding: 6px 16px; padding-right: 16px !important;
}
.diag2-tab.add:hover{ background: #777; }

/* Confirm Modal */
.confirm-modal-overlay{
  display: none; position: fixed; inset: 0;
  background: rgba(0,0,0,0.4); z-index: 10001;
  align-items: center; justify-content: center;
}
.confirm-modal-overlay.active{ display: flex; }
.confirm-modal-box{
  background: #fff; border-radius: 10px; width: 360px; max-width: 90vw;
  padding: 20px; text-align: center;
}
.confirm-modal-title{ font-size: 15px; font-weight: 700; color: #333; margin-bottom: 8px; }
.confirm-modal-desc{ font-size: 12px; color: #666; margin-bottom: 16px; }
.confirm-modal-actions{ display: flex; gap: 8px; justify-content: center; }
.confirm-modal-btn{
  padding: 8px 20px; border: none; border-radius: 4px;
  font-size: 12px; font-weight: 600; cursor: pointer;
}
.confirm-modal-btn.cancel{ background: #e5e7eb; color: #333; }
.confirm-modal-btn.confirm{ background: #e53e3e; color: #fff; }
.confirm-modal-btn:hover{ opacity: 0.85; }

/* Toast */
.toast-container{
  position: fixed; bottom: 20px; right: 20px; z-index: 10002;
}
.toast{
  background: #333; color: #fff; padding: 10px 16px;
  border-radius: 6px; font-size: 12px; margin-top: 8px;
  animation: toastFadeIn 0.3s ease;
}
@keyframes toastFadeIn{
  from{ opacity: 0; transform: translateY(10px); }
  to{ opacity: 1; transform: translateY(0); }
}
</style>
<style id="himec-iconbtn-style">
/* === HIMEC 아이콘 버튼 (Tool-304 통일 스타일) === */
.header-right{ gap:6px !important; }
.header-right button{
  width:34px !important; height:34px !important; padding:0 !important;
  background:#ffffff !important; color:#555 !important;
  border:1px solid #d0d0d0 !important; border-radius:8px !important;
  display:inline-flex !important; align-items:center; justify-content:center;
  box-sizing:border-box;
}

// ========== URL Parameters ==========
const _urlParams = new URLSearchParams(window.location.search);
const _projectId = _urlParams.get('projectId') || '';
const _projectName = _urlParams.get('projectName') || '';

// localStorage 키
function _getStorageKey() {
  return _projectId ? 'tool_pipe_' + _projectId : '';
}

// 프로젝트명 헤더에 표시
function _showProjectLabel() {
  var el = document.getElementById('projectLabel');
  if (el && _projectName) {
    el.textContent = '[' + decodeURIComponent(_projectName) + '] ';
  }
}

// ===== 토스트 알림 =====
function _showToast(message, type) {
  var toast = document.getElementById('saveToast');
  if (!toast) {
    toast = document.createElement('div');
    toast.id = 'saveToast';
    toast.style.cssText = 'position:fixed;top:24px;left:50%;transform:translateX(-50%);padding:10px 28px;border-radius:8px;color:#fff;font-size:14px;font-weight:600;z-index:9999;opacity:0;transition:opacity 0.3s;pointer-events:none;';
    document.body.appendChild(toast);
  }
  toast.textContent = message;
  toast.style.background = type === 'success' ? '#27ae60' :
                            type === 'warn' ? '#f39c12' : '#e74c3c';
  toast.style.opacity = '1';
  setTimeout(function() { toast.style.opacity = '0'; }, 2500);
}

// ===== Save 버튼 플래시 =====
function _flashSaveButton() {
  var btn = document.getElementById('btnSave');
  if (!btn) return;
  var orig = btn.textContent;
  btn.textContent = 'Saved!';
  btn.classList.add('saved');
  setTimeout(function() {
    btn.classList.remove('saved');
    btn.textContent = orig;
  }, 1200);
}

// ===== 프로젝트별 데이터 저장 (localStorage) =====
function saveData() {
  if (!_projectId) {
    _showToast('프로젝트 정보가 없습니다. 대시보드에서 프로젝트를 선택해주세요.', 'warn');
    return;
  }

  // 현재 활성 탭 데이터 저장
  var st = diag2State['d2Pipe'];
  if (st && st.activeTab) {
    pipeEffSaveTabData('d2Pipe', st.activeTab);
  }

  // 전체 diag2State 직렬화
  var stateSnapshot = {};
  for (var type in diag2State) {
    var s = diag2State[type];
    stateSnapshot[type] = {
      nextId: s.nextId,
      activeTab: s.activeTab,
      tabData: s.tabData
    };
  }

  var payload = {
    projectId: _projectId,
    projectName: decodeURIComponent(_projectName),
    savedAt: new Date().toISOString(),
    diag2State: stateSnapshot,
    photoStore: _photoStore || {}
  };

  try {
    localStorage.setItem(_getStorageKey(), JSON.stringify(payload));
    _showToast('저장되었습니다.', 'success');
    _flashSaveButton();
  } catch (e) {
    _showToast('저장 실패: ' + e.message, 'error');
  }
}

// ===== 프로젝트별 데이터 로드 (localStorage) =====
function _loadProjectData() {
  var key = _getStorageKey();
  if (!key) return false;

  try {
    var raw = localStorage.getItem(key);
    if (!raw) return false;
    var payload = JSON.parse(raw);

    // photoStore 복원
    if (payload.photoStore) {
      _photoStore = payload.photoStore;
    }

    // diag2State 복원
    if (payload.diag2State) {
      var stateData = payload.diag2State;

      for (var type in stateData) {
        var savedState = stateData[type];
        if (!savedState || !savedState.tabData) continue;

        // 탭 데이터 순회하여 탭 생성
        var tabIds = Object.keys(savedState.tabData).map(Number).sort(function(a,b){return a-b;});

        for (var i = 0; i < tabIds.length; i++) {
          var tabId = tabIds[i];
          var tabData = savedState.tabData[tabId];
          if (!tabData) continue;

          // 탭 추가 (첫 번째 탭은 DOMContentLoaded에서 이미 생성됨)
          var createdId;
          if (i === 0 && diag2State[type] && diag2State[type].activeTab) {
            createdId = diag2State[type].activeTab;
          } else {
            createdId = window.addUnit(type);
          }

          if (createdId) {
            diag2State[type].tabData[createdId] = tabData;
            pipeEffRestoreTabData(type, createdId);

            // 탭 라벨 업데이트
            if (tabData['inp-equip']) {
              var st = diag2State[type];
              var btn = st.tabsEl.querySelector('.diag2-tab[data-tab-id="' + createdId + '"]');
              if (btn) {
                var labelEl = btn.querySelector('.diag2-tab-label');
                if (labelEl) labelEl.textContent = tabData['inp-equip'];
              }
            }
          }
        }

        // nextId 복원
        if (savedState.nextId) {
          diag2State[type].nextId = savedState.nextId;
        }
      }
    }

    return true;
  } catch (e) {
    console.warn('프로젝트 데이터 로드 실패:', e);
    return false;
  }
}

function _fc(v, dec) {
  if (v === '' || v === null || v === undefined) return '';
  var n = typeof v === 'number' ? v : parseFloat(String(v).replace(/,/g,''));
  if (isNaN(n)) return String(v);
  if (typeof dec === 'number') n = parseFloat(n.toFixed(dec));
  var parts = String(n).split('.');
  parts[0] = parts[0].replace(/\B(?=(\d{3})+(?!\d))/g, ',');

    parts[1] = (parts[1] || '').padEnd(dec, '0').substring(0, dec);

  return (typeof dec === 'number' && dec === 0) ? parts[0] : parts.join('.');
}

/* ===== Toast / Confirm Modal ===== */
function showToast(msg) {
  var container = document.getElementById('toastContainer');
  var toast = document.createElement('div');
  toast.className = 'toast';
  toast.textContent = msg;
  container.appendChild(toast);
  setTimeout(function() { toast.remove(); }, 3000);
}

var _confirmCallback = null;
function showConfirmModal(title, desc, callback) {
  var overlay = document.getElementById('confirmModalOverlay');
  var titleEl = document.getElementById('confirmModalTitle');
  var descEl = document.getElementById('confirmModalDesc');
  var btnEl = document.getElementById('confirmModalBtn');

  titleEl.textContent = title;
  descEl.textContent = desc;
  _confirmCallback = callback;

  if (callback) {
    btnEl.style.display = '';
    btnEl.onclick = function() {
      hideConfirmModal();
      if (_confirmCallback) _confirmCallback();
    };
  } else {
    btnEl.style.display = 'none';
  }

  overlay.classList.add('active');
}

function hideConfirmModal() {
  var overlay = document.getElementById('confirmModalOverlay');
  overlay.classList.remove('active');
  _confirmCallback = null;
}

  var viewer = document.getElementById('fanefPhotoViewer');

}

  /* ===== PIPE Calculations ===== */
  function pipeEffGetMeasMin(p) {
    var vals = [];
    for (var a = 0; a < PIPE_ANGLES.length; a++) {
      for (var c = 1; c <= PIPE_COLS; c++) {
        var el = document.getElementById(p + 'g-' + PIPE_ANGLES[a] + '-' + c);
        if (el) { var v = _pn(el.value); if (el.value !== '' && v > 0) vals.push(v); }
      }
    }
    if (!vals.length) return null;
    return Math.min.apply(null, vals);
  }

  function pipeEffRecalc(p) {
    var gv = function(id) { var el = document.getElementById(p + id); return el ? _pn(el.value) : 0; };
    var sv = function(id, v) { var el = document.getElementById(p + id); if (el) el.value = v; };

    var od = gv('inp-od');
    var nt = gv('inp-nt');
    var press = gv('inp-press');
    var stress = gv('inp-stress');
    var years = gv('inp-years');

    var measMin = pipeEffGetMeasMin(p);

    var matEl = document.getElementById(p + 'inp-material');
    var matStr = matEl ? String(matEl.value) : '';
    var corrAllow = (/SCH/i.test(matStr) || /Copper/i.test(matStr) || matStr.indexOf('동관') !== -1) ? 1 : 2.54;

    var denom = 2 * stress + press;
    var minAllow = (denom > 0 ? (press * od) / denom / 100 : 0) + corrAllow;
    sv('calc-min-allow', _fc(minAllow, 2));

    sv('calc-meas-min', measMin !== null ? _fc(measMin, 2) : '');

    var corr = (nt > 0 && measMin !== null) ? (nt - measMin) : null;
    sv('calc-corr', corr !== null ? _fc(corr, 2) : '');

    var corrRate = (corr !== null && years > 0) ? (corr / years) : null;
    sv('calc-corr-rate', corrRate !== null ? _fc(corrRate, 4) : '');

    var lifeVal = null, lifeText = '';
    if (measMin !== null && years > 0) {
      if (corrRate !== null && corrRate > 0) {
        lifeVal = (measMin - minAllow) / corrRate;
      } else {
        lifeVal = 999;
      }
      lifeText = lifeVal > 10 ? '10년이상' : _fc(lifeVal, 1);
    }
    sv('calc-life', lifeText);

    var nominalV = nt > 0 ? nt : 0;
    var allowV = minAllow;
    var measV = measMin !== null ? measMin : 0;
    pipeEffSetBars(p, nominalV, allowV, measV);

    pipeEffAutoJudge(p, measMin, minAllow, lifeVal);
  }
  window.pipeEffRecalc = pipeEffRecalc;

  function pipeEffSetBars(p, nominalV, allowV, measV) {
    var maxV = Math.max(nominalV, allowV, measV, 0.01);
    var set = function(key, val) {
      var fill = document.getElementById(p + 'pb-' + key);
      var lab = document.getElementById(p + 'pbv-' + key);
      if (fill) fill.style.height = ((val / maxV) * 100).toFixed(1) + '%';
      if (lab) lab.textContent = val > 0 ? _fc(val, 2) : '-';
    };
    set('nominal', nominalV);
    set('allow', allowV);
    set('measmin', measV);
  }

  function pipeEffAutoJudge(p, measMin, minAllow, lifeVal) {
    var gradeEl = document.getElementById(p + 'calc-grade');
    var textEl = document.getElementById(p + 'inp-performance-result');
    if (measMin === null || lifeVal === null) {
      if (gradeEl) { gradeEl.value = ''; gradeEl.style.color = ''; }
      if (!textEl || !textEl._userJudged) {
        var cbs0 = document.querySelectorAll('input[name="' + p + 'perf-check"]');
        cbs0.forEach(function(cb) { cb.checked = false; });
      }
      return;
    }

    var judge, gradeKor;
    if (measMin <= minAllow) { judge = 'replace'; gradeKor = '즉시 교체'; }
    else if (lifeVal >= 10) { judge = 'good'; gradeKor = '양호'; }
    else if (lifeVal >= 5) { judge = 'maintenance'; gradeKor = '교체 권고'; }
    else { judge = 'replace'; gradeKor = '즉시 교체'; }

    if (gradeEl) {
      gradeEl.value = gradeKor;
      gradeEl.style.color = judge === 'replace' ? '#e53e3e' : (judge === 'maintenance' ? '#ff8c00' : '#00838f');
    }

    var cbs = document.querySelectorAll('input[name="' + p + 'perf-check"]');
    var anyChecked = false;
    cbs.forEach(function(cb) { if (cb.checked) anyChecked = true; });
    if (!anyChecked || !textEl || !textEl._userJudged) {
      cbs.forEach(function(cb) { cb.checked = (cb.value === judge); });
    }
    if (textEl && !textEl._userEdited) {
      textEl.value = '측정최소 ' + _fc(measMin, 2) + 'mm / 최소허용 ' + _fc(minAllow, 2) + 'mm — ' + gradeKor;
    }
  }

  /* ===== Tab Data Save/Restore ===== */
  var ALL_PIPE_FIELDS = [
    'inp-equip','inp-use','inp-note','inp-loc','inp-material','inp-dia',
    'inp-nominal','inp-od','inp-nt','inp-press','inp-stress','inp-years',
    'calc-min-allow','calc-meas-min','calc-corr','calc-corr-rate','calc-life','calc-grade',
    'inp-performance-result'
  ];

  function pipeEffSaveTabData(type, tabId) {
    var st = diag2State[type];
    if (!st) return;
    var p = type + '-' + tabId + '-';
    var data = {};
    ALL_PIPE_FIELDS.forEach(function(suf) {
      var el = document.getElementById(p + suf);
      data[suf] = el ? el.value : '';
    });
    data['_grid'] = pipeEffSaveGrid(p);
    data['_photos'] = _getPhotoStore(p).map(function(item, idx) {
      var descEl = document.getElementById(p + 'photoDesc' + idx);
      return { img: item.img, desc: descEl ? descEl.value : '' };
    });
    var cbs = document.querySelectorAll('input[name="' + p + 'perf-check"]');
    cbs.forEach(function(cb) { if (cb.checked) data['_perfCheck'] = cb.value; });
    st.tabData[tabId] = data;
  }

  function pipeEffRestoreTabData(type, tabId) {
    var st = diag2State[type];
    if (!st || !st.tabData[tabId]) return;
    var p = type + '-' + tabId + '-';
    var data = st.tabData[tabId];
    ALL_PIPE_FIELDS.forEach(function(suf) {
      var el = document.getElementById(p + suf);
      if (el && data[suf] !== undefined) el.value = data[suf];
    });
    if (data['_grid']) pipeEffRestoreGrid(p, data['_grid']);
    if (data['_photos']) {
      var store = _getPhotoStore(p);
      data['_photos'].forEach(function(item, idx) {
        store[idx] = { img: item.img, desc: item.desc };
        var descEl = document.getElementById(p + 'photoDesc' + idx);
        if (descEl) descEl.value = item.desc || '';
        var emptyEl = document.getElementById(p + 'photoEmpty' + idx);
        var prevEl = document.getElementById(p + 'photoPreview' + idx);
        var imgEl = document.getElementById(p + 'photoImg' + idx);
        if (item.img) {
          if (emptyEl) emptyEl.style.display = 'none';
          if (prevEl) prevEl.style.display = '';
          if (imgEl) imgEl.src = item.img;
        }
      });
    }
    if (data['_perfCheck']) {
      var cbs = document.querySelectorAll('input[name="' + p + 'perf-check"]');
      cbs.forEach(function(cb) { cb.checked = (cb.value === data['_perfCheck']); });
    }
    pipeEffRecalc(p);
  }

  function pipeEffSaveGrid(p) {
    var data = {};
    for (var a = 0; a < PIPE_ANGLES.length; a++) {
      for (var c = 1; c <= PIPE_COLS; c++) {
        var id = 'g-' + PIPE_ANGLES[a] + '-' + c;
        var el = document.getElementById(p + id);
        data[id] = el ? el.value : '';
      }
    }
    return data;
  }

  function pipeEffRestoreGrid(p, data) {
    if (!data) return;
    for (var k in data) {
      var el = document.getElementById(p + k);
      if (el) el.value = data[k];
    }
  }

  function pipeEffInitMeasGrid(p) { /* Fixed grid - no init needed */ }

  function pipeEffBindEvents(p, type, tabId) {
    var equipEl = document.getElementById(p + 'inp-equip');
    if (equipEl) {
      equipEl.addEventListener('input', function() {
        var st = diag2State[type];
        if (!st) return;
        var btn = st.tabsEl.querySelector('.diag2-tab[data-tab-id="' + tabId + '"]');
        if (btn) {
          var labelEl = btn.querySelector('.diag2-tab-label');
          if (labelEl) {
            var abbr = PREFIX_MAP[type] || 'EQ';
            labelEl.textContent = equipEl.value || (abbr + ' #' + String(tabId).padStart(2, '0'));
          }
        }
      });
    }
    var textEl = document.getElementById(p + 'inp-performance-result');
    if (textEl) textEl.addEventListener('input', function() { textEl._userEdited = true; });
  }

  window.pipeEffOnChange = function(p) { pipeEffRecalc(p); };
  window.pipeEffOnLookupChange = function(p) { pipeApplyLookup(p); pipeEffRecalc(p); };
  window.pipeEffOnPerfCheck = function(p, el) {
    var cbs = document.querySelectorAll('input[name="' + p + 'perf-check"]');
    cbs.forEach(function(cb) { if (cb !== el) cb.checked = false; });
    var textEl = document.getElementById(p + 'inp-performance-result');
    if (textEl) textEl._userJudged = true;
  };

  /* ===== Pipe Table Modal ===== */
  window.pipeShowTable = function() {
    var ov = document.getElementById('pipeTableModal');
    if (!ov) {
      ov = document.createElement('div');
      ov.id = 'pipeTableModal';
      ov.className = 'pipe-modal-overlay';
      ov.onclick = function(e) { if (e.target === ov) window.pipeHideTable(); };
      ov.innerHTML = pipeBuildTableHTML();
      document.body.appendChild(ov);
    }
    ov.style.display = 'flex';
  };

  window.pipeHideTable = function() {
    var ov = document.getElementById('pipeTableModal');
    if (ov) ov.style.display = 'none';
  };

  function pipeBuildTableHTML() {
    var h = '<div class="pipe-modal-box">';
    h += '<div class="pipe-modal-head"><span>배관 관경표</span><button class="pipe-modal-close" onclick="window.pipeHideTable()">✕</button></div>';
    h += '<div class="pipe-modal-body">';
    var lastGroup = '';
    for (var i = 0; i < PIPE_BLOCKS.length; i++) {
      var blk = PIPE_BLOCKS[i];
      if (blk.group !== lastGroup) { h += '<div class="pipe-modal-group">' + blk.group + '</div>'; lastGroup = blk.group; }
      var d = PIPE_TABLE[blk.mat] || {};
      h += '<div class="pipe-modal-mat">' + blk.mat + '</div>';
      h += '<table class="pipe-modal-table"><thead><tr><th>호칭경</th><th>외경(mm)</th><th>공칭두께(mm)</th></tr></thead><tbody>';
      var keys = Object.keys(d).map(Number).sort(function(a,b){return a-b;});
      for (var k = 0; k < keys.length; k++) {
        var r = d[String(keys[k])];
        h += '<tr><td>' + keys[k] + '</td><td>' + r.od + '</td><td>' + r.nt + '</td></tr>';
      }
      h += '</tbody></table>';
    }
    h += '</div></div>';
    return h;
  }

  /* ===== Photo Handling ===== */
  var _photoStore = {};

  function _getPhotoStore(p) {
    if (!_photoStore[p]) {
      _photoStore[p] = [];
      for (var i = 0; i < FANEF_PHOTO_COUNT; i++) _photoStore[p].push({ img: null, desc: '' });
    }
    return _photoStore[p];
  }

  window.fanEffTriggerPhoto = function(p, idx) {
    var inp = document.getElementById(p + 'photoInput' + idx);
    if (inp) inp.click();
  };

  window.fanEffHandlePhoto = function(p, idx, input) {
    var file = input.files && input.files[0];
    if (!file || !file.type.startsWith('image/')) return;
    _resizeImg(file, 800, 0.7).then(function(dataURL) {
      var photos = _getPhotoStore(p);
      photos[idx].img = dataURL;
      var emptyEl = document.getElementById(p + 'photoEmpty' + idx);
      var prevEl = document.getElementById(p + 'photoPreview' + idx);
      var imgEl = document.getElementById(p + 'photoImg' + idx);
      if (emptyEl) emptyEl.style.display = 'none';
      if (prevEl) { prevEl.style.display = ''; if (imgEl) imgEl.src = dataURL; }
      input.value = '';
    });
  };

  window.fanEffRemovePhoto = function(p, idx) {
    var photos = _getPhotoStore(p);
    photos[idx].img = null;
    var emptyEl = document.getElementById(p + 'photoEmpty' + idx);
    var prevEl = document.getElementById(p + 'photoPreview' + idx);
    var imgEl = document.getElementById(p + 'photoImg' + idx);
    if (emptyEl) emptyEl.style.display = '';
    if (prevEl) prevEl.style.display = 'none';
    if (imgEl) imgEl.src = '';
  };

  window.fanEffViewPhoto = function(p, idx) {
    var photos = _getPhotoStore(p);
    if (!photos[idx] || !photos[idx].img) return;
    var viewer = document.getElementById('fanefPhotoViewer');
    var vImg = document.getElementById('fanefPhotoViewerImg');
    if (viewer && vImg) { vImg.src = photos[idx].img; viewer.classList.add('active'); }
  };

  function _resizeImg(file, maxSize, quality) {
    return new Promise(function(resolve, reject) {
      var reader = new FileReader();
      reader.onload = function(e) {
        var img = new Image();
        img.onload = function() {
          var w = img.width, h = img.height;
          if (w > maxSize || h > maxSize) {
            if (w > h) { h = Math.round(h * (maxSize / w)); w = maxSize; }
            else { w = Math.round(w * (maxSize / h)); h = maxSize; }
          }
          var canvas = document.createElement('canvas');
          canvas.width = w; canvas.height = h;
          canvas.getContext('2d').drawImage(img, 0, 0, w, h);
          resolve(canvas.toDataURL('image/jpeg', quality));
        };
        img.onerror = reject;
        img.src = e.target.result;
      };
      reader.onerror = reject;
      reader.readAsDataURL(file);
    });
  }

})();

/* ===== Initialize with first equipment ===== */
document.addEventListener('DOMContentLoaded', function() {
  // 프로젝트명 헤더에 표시
  _showProjectLabel();

  // 기본 탭 추가
  window.addUnit('d2Pipe');

  // 프로젝트 데이터가 있으면 localStorage에서 로드
  if (_projectId) {
    setTimeout(function() {
      _loadProjectData();
    }, 100);
  }
});

</script>
<script>window.__STD_TOOL='pipe';</script>
<script>
/* ============================================================
   STD Storage  —  표준 저장 모듈 v1 (전 도구 공통)
   방식: localStorage 우선 + GitHub 동기화(가능 시)
        + beforeunload 백업 + 저장 후 이동(GoMain)
   ============================================================ */
(function(){
  if (window.STD) return;                         // 중복 주입 방지
  var TOOL = window.__STD_TOOL || 'tool';
  function qp(k){ return new URLSearchParams(location.search).get(k) || ''; }
  function pid(){ return qp('projectId') || qp('project') || qp('id') || ''; }
  function pname(){ return qp('projectName') || qp('name') || ''; }
  function lsKey(){ var id=pid(); return 'std_'+TOOL+'_'+(id||'standalone'); }
  function ghPath(){ var id=pid(); return id ? ('data/'+TOOL+'/'+id+'.json') : null; }

  function genericData(){
    var o={__std:true, t:Date.now(), fields:{}};
    document.querySelectorAll('input[id],select[id],textarea[id]').forEach(function(el){
      var ty=(el.type||'').toLowerCase();
      if(ty==='button'||ty==='submit'||ty==='reset'||ty==='file') return;
      o.fields[el.id]=(ty==='checkbox'||ty==='radio') ? el.checked : el.value;
    });
    return o;
  }
  function genericRestore(o){
    if(!o||!o.fields) return;
    Object.keys(o.fields).forEach(function(id){
      var el=document.getElementById(id); if(!el) return;
      var ty=(el.type||'').toLowerCase();
      if(ty==='checkbox'||ty==='radio') el.checked=!!o.fields[id];
      else el.value=o.fields[id];
      try{ el.dispatchEvent(new Event('input',{bubbles:true}));
           el.dispatchEvent(new Event('change',{bubbles:true})); }catch(e){}
    });
  }
  function lsSave(){
    try{ localStorage.setItem(lsKey(), JSON.stringify(genericData())); return true; }
    catch(e){ console.warn('[STD] LS save fail', e); return false; }
  }
  function lsLoad(){
    try{ var r=localStorage.getItem(lsKey()); return r? JSON.parse(r):null; }catch(e){ return null; }
  }
  function ghSync(){
    var p=ghPath();
    if(p && typeof window.ghSaveFile==='function'){
      return Promise.resolve(window.ghSaveFile(p, genericData(), 'STD save '+TOOL+' '+pid()))
        .then(function(){ return true; })
        .catch(function(e){ console.warn('[STD] GH save fail', e); return false; });
    }
    return Promise.resolve(null);                 // GitHub 미사용 페이지
  }
  function toast(msg, type){
    if(typeof window._showToast==='function'){ try{ window._showToast(msg, type||'success'); return; }catch(e){} }
    if(typeof window.showToast==='function'){ try{ window.showToast(msg, type||'success'); return; }catch(e){} }
    var el=document.getElementById('__stdToast');
    if(!el){ el=document.createElement('div'); el.id='__stdToast';
      el.style.cssText='position:fixed;top:20px;left:50%;transform:translateX(-50%);background:#111827;color:#fff;padding:10px 16px;border-radius:6px;font-size:13px;z-index:99999;opacity:0;transition:opacity .2s';
      document.body.appendChild(el); }
    el.textContent=msg; el.style.opacity='1';
    clearTimeout(el.__t); el.__t=setTimeout(function(){ el.style.opacity='0'; }, 1800);
  }

  var dirty=false;
  document.addEventListener('input', function(){ dirty=true; }, true);
  document.addEventListener('change', function(){ dirty=true; }, true);

  function save(pageSaver, opts){
    opts=opts||{};
    lsSave();                                     // 1) 항상 localStorage 백업
    var hasPage=(typeof pageSaver==='function');
    if(hasPage){                                  // 2a) 리치 저장(페이지 고유 LS+GitHub)
      return Promise.resolve().then(pageSaver).then(function(){ dirty=false; return {page:true}; })
        .catch(function(e){ console.warn('[STD] pageSaver fail', e); dirty=false; return {page:false}; });
    }
    return ghSync().then(function(gh){             // 2b) 제네릭 GitHub 동기화(가능 시)
      dirty=false;
      if(!opts.silent) toast(gh===false?'로컬에 저장되었습니다 (클라우드 동기화 실패)':'저장되었습니다.', gh===false?'warn':'success');
      return {gh:gh};
    });
  }
  function load(pageLoader){
    if(typeof pageLoader==='function'){ try{ return pageLoader(); }catch(e){ console.warn('[STD] pageLoader fail', e); } }
    var o=lsLoad(); if(o) genericRestore(o); dirty=false; return o;
  }
  function goMain(pageSaver){
    var url=(typeof window.dashboardUrl!=='undefined' && window.dashboardUrl) ? window.dashboardUrl : '../tool_dashboard.html';
    Promise.resolve(save(pageSaver, {silent:true})).then(function(){ location.href=url; }, function(){ location.href=url; });
  }
  window.addEventListener('beforeunload', function(){ try{ lsSave(); }catch(e){} });

  window.STD={ save:save, load:load, goMain:goMain, lsSave:lsSave, lsLoad:lsLoad,
               genericData:genericData, genericRestore:genericRestore,
               projectId:pid, projectName:pname, key:lsKey, ghPath:ghPath, isDirty:function(){return dirty;} };
})();
</script>
</body>

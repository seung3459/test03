<!DOCTYPE html>
<html lang="ko">
<head>
	<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
	<script src="../../js/supabase-config.js"></script>
	<script src="../../js/auth-guard.js"></script>
	<script src="../../js/himec-supabase-sync.js"></script>
<meta charset="UTF-8">
<meta name="viewport" content="width=1920">
<script>
/* ===== 용도별 프리셋 ===== */
const PRESET = {
  heating:{flow1:300, cp1:1, t1i:80, t1o:60, flow2:350, cp2:1, t2i:50, t2o:68, area:12, qDesign:420, dp1:25, dp2:28},
  dhw:    {flow1:250, cp1:1, t1i:70, t1o:45, flow2:200, cp2:1, t2i:15, t2o:50, area:10, qDesign:380, dp1:22, dp2:30},
  cooling:{flow1:400, cp1:1, t1i:12, t1o:7,  flow2:380, cp2:1, t2i:5,  t2o:11, area:15, qDesign:330, dp1:30, dp2:32}
};
const $=id=>document.getElementById(id);
const num=id=>{const e=$(id); if(!e) return 0; const v=parseFloat(e.value); return isNaN(v)?0:v;};
const fmt=n=>n.toLocaleString('en-US',{maximumFractionDigits:0});
const KCAL_KW=1/860;          /* kcal/h -> kW */
const KCAL_W_TO_SI=1.163;     /* kcal/m2h℃ -> W/m2K */

function applyPreset(t){ const p=PRESET[t]; for(const k in p){ if($(k)) $(k).value=p[k]; } }
function onUseChange(){ applyPreset($("inp-use").value); recalc(); }

function toggleSec(){
  const b=$("tg-bal").checked, t=$("tg-trf").checked;
  $("sec-bal").style.display=b?"":"none";
  $("sec-trf").style.display=t?"":"none";
  $("box-bal").classList.toggle("on",b);
  $("box-trf").classList.toggle("on",t);
  $("mc-q").style.display=b?"":"none";
  $("mc-u").style.display=t?"":"none";
  $("mc-eps").style.display=t?"":"none";
  $("mc-lmtd").style.display=t?"":"none";
  $("mc-none").style.display=(!b&&!t)?"flex":"none";
  $("sec-donut").style.display=b?"":"none";
  $("sec-diag").style.display=(b||t)?"":"none";
  fitAll();
}

function recalc(){
  const A=num("area"), Ud=num("uDesign");
  const m1=num("flow1")*60, cp1=num("cp1")||1, t1i=num("t1i"), t1o=num("t1o");
  const m2=num("flow2")*60, cp2=num("cp2")||1, t2i=num("t2i"), t2o=num("t2o");
  const C1=m1*cp1, C2=m2*cp2;             /* 열용량유량 kcal/h℃ */
  const Qhot=C1*(t1i-t1o);
  const Qcold=C2*(t2o-t2i);
  const Qeff=Qcold;                        /* 유효 열교환량(2차측) */
  const lossRate=Qhot>0?((Qhot-Qcold)/Qhot*100):NaN;

  /* LMTD (향류) */
  const dT1=t1i-t2o, dT2=t1o-t2i;
  let LMTD=NaN;
  if(dT1>0&&dT2>0){ LMTD=(Math.abs(dT1-dT2)<1e-9)?dT1:(dT1-dT2)/Math.log(dT1/dT2); }
  const approach=(dT1>0&&dT2>0)?Math.min(dT1,dT2):NaN;

  /* U (kcal/m2h℃ -> W/m2K) */
  const U_kc=(A>0&&LMTD>0&&Qeff>0)?Qeff/(A*LMTD):NaN;
  const U=isFinite(U_kc)?U_kc*KCAL_W_TO_SI:NaN;

  /* 유효도 ε-NTU */
  const Cmin=Math.min(C1,C2), Cmax=Math.max(C1,C2);
  const Qmax=Cmin*(t1i-t2i);
  const eps=(Qmax>0&&Qeff>0)?(Qeff/Qmax*100):NaN;
  const NTU=(Cmin>0&&isFinite(U_kc))?(U_kc*A/Cmin):NaN;
  const clean=(Ud>0&&isFinite(U))?(U/Ud*100):NaN;

  /* metrics */
  $("m-q").textContent=Qeff>0?(Qeff*KCAL_KW).toFixed(1):'\u2013';
  $("m-u").textContent=isFinite(U)?U.toFixed(0):'\u2013';
  $("m-eps").textContent=isFinite(eps)?eps.toFixed(1):'\u2013';
  $("m-lmtd").textContent=isFinite(LMTD)?LMTD.toFixed(1):'\u2013';

  /* 열수지표 */
  $("v-qhot").textContent=Qhot?fmt(Qhot):'\u2013';
  $("v-qhotk").textContent=Qhot?(Qhot*KCAL_KW).toFixed(1):'\u2013';
  $("v-qcold").textContent=Qcold?fmt(Qcold):'\u2013';
  $("v-qcoldk").textContent=Qcold?(Qcold*KCAL_KW).toFixed(1):'\u2013';
  $("v-loss").textContent=isFinite(lossRate)?lossRate.toFixed(1)+' %':'\u2013';
  $("v-qeff").textContent=Qeff?fmt(Qeff):'\u2013';
  $("v-qeffk").textContent=Qeff?(Qeff*KCAL_KW).toFixed(1):'\u2013';

  /* 전열표 */
  $("v-dt1").textContent=isFinite(dT1)?dT1.toFixed(1):'\u2013';
  $("v-dt2").textContent=isFinite(dT2)?dT2.toFixed(1):'\u2013';
  $("v-appr").textContent=isFinite(approach)?approach.toFixed(1):'\u2013';
  $("v-lmtd").textContent=isFinite(LMTD)?LMTD.toFixed(2):'\u2013';
  $("v-u").textContent=isFinite(U)?U.toFixed(0)+' W/m\u00b2K':'\u2013';
  $("v-ntu").textContent=isFinite(NTU)?NTU.toFixed(2):'\u2013';
  $("v-clean").textContent=isFinite(clean)?clean.toFixed(1)+' %':'\u2013';
  $("v-eps").textContent=isFinite(eps)?eps.toFixed(1)+' %':'\u2013';

  /* residual */
  if(isFinite(lossRate)){
    const ok=Math.abs(lossRate)<=5;
    $("residual").innerHTML=`열수지 잔차(미확인손실) = (Q&#x2095;&minus;Q&#x1d04;)/Q&#x2095; = <b>${lossRate.toFixed(1)}%</b>. `+
      (ok?`&plusmn;5% 이내이면 1차&middot;2차 측정이 일관됨(KS B 6362 상호검증).`
         :`\u26a0 &plusmn;5% 초과 \u2014 유량&middot;온도 측정 또는 단열손실 재검토 필요.`);
  }else{
    $("residual").innerHTML=`\u26a0 온도차(&Delta;T&#8321;,&Delta;T&#8322;)가 0 이하이면 LMTD&middot;U 계산 불가. 1차측이 2차측보다 고온인지, 입출구 온도를 확인하세요.`;
  }

  drawDonut(Qhot,Qcold);
  diagnose({type:$("inp-type").value,eps,lossRate,approach,clean,Ud,U,dp1:num("dp1"),dp2:num("dp2"),LMTD});
  fitAll();
}

function fitCenter(){
  /* 오토사이즈 제거: 셀 패딩은 CSS 고정값(11px) 사용 */
  const card=document.querySelector('#center-panel .calc-card');
  if(!card) return;
  card.querySelectorAll('.calc-table td, .calc-table th').forEach(td=>{
    td.style.paddingTop=''; td.style.paddingBottom='';
  });
}

/* ===== 좌/우 패널 높이 자동 채움 (하단 점선까지 표·박스 높이 확장) ===== */
function fitLeft(){
  /* 오토사이즈 제거: 셀 패딩은 CSS 고정값(11px) 사용 */
  const panel=document.querySelector('#left-panel'); if(!panel) return;
  panel.querySelectorAll('.info-table td, .info-table th').forEach(c=>{
    c.style.paddingTop=''; c.style.paddingBottom='';
  });
}
function fitRight(){
  const panel=document.querySelector('#right-panel'); if(!panel) return;
  const rows=[...panel.querySelectorAll('.metric-card, .diag .d')].filter(el=>el.offsetParent!==null);
  if(!rows.length) return;
  rows.forEach(el=>{ el.style.paddingTop=''; el.style.paddingBottom=''; });
  requestAnimationFrame(()=>{
    const pTop=panel.getBoundingClientRect().top;
    let cb=pTop;
    panel.querySelectorAll(':scope > *').forEach(el=>{ if(el.offsetParent===null) return;
      const b=el.getBoundingClientRect().bottom; if(b>cb) cb=b; });
    const free=panel.clientHeight-(cb-pTop);
    let pad=8+free/rows.length/2;
    if(pad<2) pad=2; if(pad>40) pad=40;
    pad=Math.floor(pad*10)/10;
    rows.forEach(el=>{ const isMc=el.classList.contains('metric-card'); if(isMc){ el.style.paddingTop='2px'; el.style.paddingBottom='2px'; } else { el.style.paddingTop='6px'; el.style.paddingBottom='6px'; } });
  });
}
function fitAll(){ fitCenter(); fitRight(); }  /* fitLeft 제거: 좌측 패널 오토사이즈 비활성 */

function drawDonut(Qhot,Qcold){
  /* ===== Tool-12 차트형식(게이지형 도넛): 전체 원=100%, 열회수율만큼 색상 채움 / 나머지는 연회색 트랙 ===== */
  const recov=(Qhot>0)?(Qcold/Qhot*100):NaN;            /* 열회수율 = 2차흡열 / 1차방열 */
  const qcoldKW=Math.max(Qcold,0)*KCAL_KW;
  const lossKW=Math.max(Qhot-Qcold,0)*KCAL_KW;
  const eff=isFinite(recov)?Math.max(0,Math.min(100,recov)):0;
  const cx=60,cy=60,r=54,R=Math.PI/180, col="#00838f", track="#e6e9ec";
  let svg=`<circle cx="${cx}" cy="${cy}" r="${r}" fill="${track}"/>`;
  const ang=eff/100*360;
  if(ang>=359.99){
    svg+=`<circle cx="${cx}" cy="${cy}" r="${r}" fill="${col}"/>`;
  }else if(ang>0.01){
    const a=-90, a2=a+ang;
    const x1=cx+r*Math.cos(a*R),y1=cy+r*Math.sin(a*R);
    const x2=cx+r*Math.cos(a2*R),y2=cy+r*Math.sin(a2*R);
    const large=ang>180?1:0;
    svg+=`<path d="M${cx} ${cy} L${x1} ${y1} A${r} ${r} 0 ${large} 1 ${x2} ${y2} Z" fill="${col}"/>`;
  }
  /* 중앙 % 라벨: 안쪽 흰 원(r=36) 내부에만 표시 - 넘칠 때만 자동 축소하여 청록 링 침범 방지 */
  const pctLabel = isFinite(recov) ? recov.toFixed(1)+'%' : '-';
  const HOLE_W = 58;                              /* 안쪽 흰 원 내부 가용 폭(지름 72 - 여백) */
  let pctFS = 20;                                 /* Tool-12 기본 글자 크기 유지 */
  let pctTL = '';
  const approxW = pctLabel.length * pctFS * 0.56; /* 굵은 숫자 대략 폭 추정 */
  if(approxW > HOLE_W){                           /* 넘칠 때만 축소 + 폭 고정 */
    pctFS = +(pctFS * HOLE_W / approxW).toFixed(2);
    pctTL = ` textLength="${HOLE_W}" lengthAdjust="spacingAndGlyphs"`;
  }
  svg+=`<circle cx="60" cy="60" r="36" fill="#fff"/>
    <text x="60" y="50" text-anchor="middle" font-size="4.6" fill="#888">\uc5f4\ud68c\uc218\uc728</text>
    <text x="60" y="72" text-anchor="middle" font-size="${pctFS}" font-weight="800" fill="${col}"${pctTL}>${pctLabel}</text>`;
  $("donut").innerHTML=svg;
  /* 범례: 유효 회수열(채움) / 열손실(미회수) — Tool-12 색상 규격(#00838f / #ff8c00) */
  let lg=`<div class="li"><span class="sw" style="background:${col}"></span>\uc720\ud6a8 \ud68c\uc218\uc5f4(2\ucc28\ud761\uc5f4)<span class="lv">${qcoldKW.toFixed(1)} kW</span></div>`
        +`<div class="li"><span class="sw" style="background:#ff8c00;opacity:.55"></span>\uc5f4\uc190\uc2e4(\ubbf8\ud68c\uc218)<span class="lv">${lossKW.toFixed(1)} kW</span></div>`;
  $("legend").innerHTML=lg;
}

function diagnose(o){
  const D=[];
  /* 열수지 일관성 */
  if(isFinite(o.lossRate)){
    const al=Math.abs(o.lossRate);
    if(al<=5) D.push(["ok","열수지","양호","손실률 "+o.lossRate.toFixed(1)+"% \u2014 1·2차 측정 일관.","출처: KS B 6362 상호검증"]);
    else if(al<=10) D.push(["warn","열수지","주의","손실률 "+o.lossRate.toFixed(1)+"% \u2014 유량·온도 재확인.","출처: ASME PTC 12.5"]);
    else D.push(["bad","열수지","불일치","손실률 "+o.lossRate.toFixed(1)+"% \u2014 측정오차·단열불량 의심.","출처: ASME PTC 12.5"]);
  }
  /* 유효도 */
  if(isFinite(o.eps)){
    if(o.eps>=80) D.push(["ok","유효도","우수","&epsilon; "+o.eps.toFixed(1)+"% \u2014 우수, 현 운전 유지.","출처: AHRI 400 / TEMA"]);
    else if(o.eps>=65) D.push(["warn","유효도","보통","&epsilon; "+o.eps.toFixed(1)+"% \u2014 유량·오염 점검.","출처: \u03b5-NTU 벤치마크"]);
    else D.push(["bad","유효도","저조","&epsilon; "+o.eps.toFixed(1)+"% \u2014 전열저하, 세정·정비.","출처: TEMA 오염 기준"]);
  }
  /* 접근온도 */
  if(isFinite(o.approach)){
    if(o.approach<=5) D.push(["ok","접근온도","양호","Approach "+o.approach.toFixed(1)+"\u2103 \u2014 근접 양호.","출처: 판형 HX 설계기준"]);
    else if(o.approach<=10) D.push(["warn","접근온도","다소 큼","Approach "+o.approach.toFixed(1)+"\u2103 \u2014 전열면 점검 권장.","출처: 판형 HX 설계기준"]);
    else D.push(["bad","접근온도","과대","Approach "+o.approach.toFixed(1)+"\u2103 \u2014 면적부족·오염 의심.","출처: TEMA"]);
  }
  /* 청결도(오염) */
  if(isFinite(o.clean)){
    if(o.clean>=90) D.push(["ok","청결도","양호","U/U&#x209B; "+o.clean.toFixed(0)+"% \u2014 설계 전열성능 유지.","출처: TEMA 오염계수"]);
    else if(o.clean>=75) D.push(["warn","청결도","오염진행","U/U&#x209B; "+o.clean.toFixed(0)+"% \u2014 스케일 진행, 세정 계획.","출처: TEMA 오염계수"]);
    else D.push(["bad","청결도","오염심함","U/U&#x209B; "+o.clean.toFixed(0)+"% \u2014 전열저하 심함, 즉시 세정.","출처: TEMA 오염계수"]);
  }
  /* 차압 */
  const dpMax=Math.max(o.dp1||0,o.dp2||0);
  if(dpMax>0){
    if(dpMax>60) D.push(["bad","차압","과다","최대 &Delta;P "+dpMax.toFixed(0)+"kPa \u2014 막힘/오염, 분해세정 검토.","출처: 판형 HX 운전기준"]);
    else if(dpMax>40) D.push(["warn","차압","상승","최대 &Delta;P "+dpMax.toFixed(0)+"kPa \u2014 유로 오염 진행 가능.","출처: 판형 HX 운전기준"]);
    else D.push(["ok","차압","정상","최대 &Delta;P "+dpMax.toFixed(0)+"kPa \u2014 유로 정상.","출처: 판형 HX 운전기준"]);
  }
  $("diag").innerHTML=D.map(d=>`<div class="d ${d[0]}"><div class="dhead">${d[1]} : <span class="dstat">${d[2]}</span></div><div class="dbody">${d[3]}<span class="dsrc" onclick="showSrcPopup('${d[1]}','${d[0]}')" title="클릭하면 판정 기준 요약 보기">${d[4]}</span></div></div>`).join("");
}

function buildUStdOptions(keepSel){
  const type=$("inp-type").value;
  const prev=$("uStd").value;
  const matched=STD_U.filter(s=>s.t===type);
  const use=matched.length?matched:STD_U;
  // 짧은 라벨(유체조합만) — 한 줄을 넘기지 않도록

  if(keepSel && [...$("uStd").options].some(o=>o.value===prev)) $("uStd").value=prev;
}
/* 표준값 적용: 입력칸을 표준값으로 채우고 표준상태(청록) 표시 */
function applyUStd(){
  const idx=parseInt($("uStd").value); const s=STD_U[idx]; if(!s) return;
  $("uDesign").value=s.val;

function onUEdit(){
  const idx=parseInt($("uStd").value); const s=STD_U[idx];

  const edited = raw==="" ? false : (!s || isNaN(v) ? true : (v!==s.val));

let tabCount=1, activeTab=1, nextTabId=2;
const FIELD_IDS=['inp-name','inp-type','inp-use','inp-note','area','uDesign','qDesign',

const equipStore={};
function snapshot(){ const o={}; FIELD_IDS.forEach(id=>{const e=$(id); if(e) o[id]=e.value;}); return o; }

function switchTab(id){
  if(id===activeTab) return;

function addTab(){
  saveCurrentTab(); updateTabName();
  const id=nextTabId++; tabCount++;
  equipStore[id]=Object.assign({'inp-name':'HX-'+String(tabCount).padStart(2,'0'),'inp-type':'plate','inp-use':'heating','inp-note':'정격부하'},PRESET.heating);

  document.querySelectorAll('.tab:not(.add)').forEach(t=>t.classList.remove('active'));
  btn.classList.add('active'); activeTab=id; loadTab(id); updateTabName(); recalc();
}
function removeTab(id){
  const tabs=document.querySelectorAll('.tab:not(.add)');
  if(tabs.length<=1){ alert('최소 1개의 장비는 유지해야 합니다.'); return; }
  const b=$("tab-"+id); const nm=b?b.textContent.replace('\u2715','').trim():'장비';
  if(!confirm('"'+nm+'" 장비를 삭제하시겠습니까?')) return;
  if(b) b.remove(); delete equipStore[id];
  if(activeTab===id){ const r=document.querySelectorAll('.tab:not(.add)')[0]; const fid=parseInt(r.id.replace('tab-','')); r.classList.add('active'); activeTab=fid; loadTab(fid); recalc(); }
}

<script>
/* === HIMEC 공통 헤더 기능 (Save / Export / Main) === */
(function(){
  function fields(){ return Array.prototype.slice.call(document.querySelectorAll('input, select, textarea')); }
  function fkey(el,i){ return el.id ? ('#'+el.id) : ('@'+i); }
  function storeKey(){ return 'HIMEC_SAVE::' + (location.pathname || document.title || 'tool') + '::' + (new URLSearchParams(location.search).get('projectId') || 'default'); }

  function himecSave(){
    try{
      var data={};
      fields().forEach(function(el,i){
        var k=fkey(el,i);
        if(el.type==='checkbox'||el.type==='radio'){ data[k]={t:'chk', v:el.checked}; }
        else { data[k]={t:'val', v:el.value}; }
      });
      localStorage.setItem(storeKey(), JSON.stringify(data));
      alert('현재 화면의 입력값이 저장되었습니다.');
    }catch(e){ alert('저장 중 오류가 발생했습니다: '+e.message); }
  }

  function himecRestore(){
    try{
      var raw=localStorage.getItem(storeKey()); if(!raw) return;
      var data=JSON.parse(raw);
      fields().forEach(function(el,i){
        var rec=data[fkey(el,i)]; if(!rec) return;
        if(rec.t==='chk'){ el.checked=!!rec.v; el.dispatchEvent(new Event('change',{bubbles:true})); }
        else { el.value=rec.v; el.dispatchEvent(new Event('input',{bubbles:true})); el.dispatchEvent(new Event('change',{bubbles:true})); }
      });
    }catch(e){}
  }

  function closeMenu(){ var m=document.getElementById('himecExportMenu'); if(m) m.parentNode.removeChild(m); document.removeEventListener('click', outside, true); }
  function outside(e){ var m=document.getElementById('himecExportMenu'); if(m && !m.contains(e.target)) closeMenu(); }

  function himecExport(btn){
    if(document.getElementById('himecExportMenu')){ closeMenu(); return; }
    var m=document.createElement('div'); m.className='himec-menu'; m.id='himecExportMenu';
    m.innerHTML =
      '<button data-x="pdf"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>PDF로 저장</button>'+
      '<button data-x="xls"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="2"/><line x1="9" y1="3" x2="9" y2="21"/><line x1="3" y1="9" x2="21" y2="9"/></svg>Excel로 내보내기</button>';
    document.body.appendChild(m);
    var r=btn.getBoundingClientRect();
    var left=window.scrollX+r.right-m.offsetWidth; if(left<6) left=6;
    m.style.top=(window.scrollY+r.bottom+6)+'px';
    m.style.left=left+'px';
    m.addEventListener('click', function(e){
      var t=e.target.closest('button'); if(!t) return;
      var x=t.getAttribute('data-x'); closeMenu();
      if(x==='pdf') himecPDF(); else himecExcel();
    });
    setTimeout(function(){ document.addEventListener('click', outside, true); }, 0);
  }

  function himecPDF(){
    /* 화면 비율 그대로 인쇄 → 브라우저 인쇄 대화상자에서 'PDF로 저장' 선택 */
    window.print();
  }
  function himecExcel(){
    alert('Excel 내보내기는 추후 별도 양식으로 제공될 예정입니다.');
  }

  function himecMain(){
    location.href = '../tool_dashboard.html';
  }

  window.himecSave=himecSave;
  window.himecExport=himecExport;
  window.himecMain=himecMain;

  if(document.readyState==='loading'){
    window.addEventListener('DOMContentLoaded', function(){ setTimeout(himecRestore, 60); });
  } else { setTimeout(himecRestore, 60); }
})();
</script>
<script>
/* === 센터 뷰 전환(운전 성능 <-> 현장 사진) + 사진 등록/촬영 === */
(function(){
  var PHOTO_LABELS = [
    "사진 1 (예: 장비 외관)",
    "사진 2 (예: 명판 / 사양)",
    "사진 3 (예: 흡입/입구측)",
    "사진 4 (예: 토출/출구측)",
    "사진 5 (예: 계측기 / 게이지)",
    "사진 6 (예: 제어반 / 기타)"
  ];

  /* === 사진: 탭별 저장 (탭마다 독립 보관) === */
  var photoStore = {};   /* key(탭 식별자) -> [{cap,img}, ...] */
  var slotRefs   = [];   /* 사진 슬롯 DOM 참조 */
  var lastKey    = null;

  function activeTabKey(){
    var el = document.querySelector('.tab.active');
    if(el && el.id) return el.id;
    var tabs = document.querySelectorAll('.tab:not(.add)');
    for(var i=0;i<tabs.length;i++){ if(tabs[i].classList.contains('active')) return 'tabpos-'+i; }
    return 'tab-default';
  }

  function ensureRec(key){
    if(!photoStore[key]){
      var arr = [];
      for(var i=0;i<PHOTO_LABELS.length;i++){ arr.push({ cap:null, img:'' }); }
      photoStore[key] = arr;
    }
    return photoStore[key];
  }

  function loadPhotosForTab(){
    var grid = document.getElementById('photoGrid');
    if(!grid || !grid.dataset.built) return;
    var key = activeTabKey();
    lastKey = key;
    var rec = ensureRec(key);
    for(var i=0;i<slotRefs.length;i++){
      var s = slotRefs[i], r = rec[i];
      s.cap.value = (r && r.cap != null) ? r.cap : PHOTO_LABELS[i];
      var old = s.drop.querySelector('img');
      if(old) old.remove();
      if(r && r.img){
        var img = document.createElement('img');
        img.src = r.img;
        s.drop.appendChild(img);
        s.drop.classList.add('has-img');
      } else {
        s.drop.classList.remove('has-img');
      }
      s.input.value = '';
    }
  }
  window.loadPhotosForTab = loadPhotosForTab;

  /* 탭 전환/추가/삭제 자동 감지 → 해당 탭 사진 로드 */
  function watchTabs(){
    var anchor = document.querySelector('.tab.add') || document.querySelector('.tab');
    var bar = anchor ? anchor.parentNode : document.body;
    try{
      var mo = new MutationObserver(function(){
        if(activeTabKey() !== lastKey) loadPhotosForTab();
      });
      mo.observe(bar, { childList:true, subtree:true, attributes:true, attributeFilter:['class'] });
    }catch(e){}
  }
  if(document.readyState === 'loading') document.addEventListener('DOMContentLoaded', watchTabs);
  else watchTabs();

  function buildPhotoGrid(){
    var grid = document.getElementById('photoGrid');
    if(!grid || grid.dataset.built) return;
    grid.dataset.built = "1";
    slotRefs = [];
    for(var i=0;i<PHOTO_LABELS.length;i++){
      (function(idx){
        var slot = document.createElement('div');
        slot.className = 'photo-slot';

        var cap = document.createElement('input');
        cap.type = 'text';
        cap.className = 'photo-cap';
        cap.title = '제목을 클릭하여 편집하세요';
        cap.placeholder = PHOTO_LABELS[idx];
        cap.value = PHOTO_LABELS[idx];
        cap.addEventListener('input', function(){
          ensureRec(activeTabKey())[idx].cap = cap.value;
        });
        /* 입력창 클릭이 사진 촬영/선택으로 전파되지 않도록 차단 */
        cap.addEventListener('click', function(e){ e.stopPropagation(); });

        var drop = document.createElement('div');
        drop.className = 'photo-drop';
        drop.innerHTML =
          '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"/><circle cx="12" cy="13" r="4"/></svg>' +
          '<div class="pd-title">사진 ' + (idx+1) + '</div>' +
          '<div class="pd-sub">클릭하여 촬영 / 선택</div>';

        var input = document.createElement('input');
        input.type = 'file';
        input.accept = 'image/*';
        input.setAttribute('capture','environment');
        input.style.display = 'none';

        var del = document.createElement('button');
        del.type = 'button';
        del.className = 'photo-del';
        del.title = '사진 삭제';
        del.innerHTML = '&times;';

        drop.appendChild(input);
        drop.appendChild(del);

        drop.addEventListener('click', function(e){
          if(e.target === del) return;
          input.click();
        });

        input.addEventListener('change', function(){
          var f = input.files && input.files[0];
          if(!f) return;
          var r = new FileReader();
          r.onload = function(ev){
            var old = drop.querySelector('img');
            if(old) old.remove();
            var img = document.createElement('img');
            img.src = ev.target.result;
            drop.appendChild(img);
            drop.classList.add('has-img');
            ensureRec(activeTabKey())[idx].img = ev.target.result;
          };
          r.readAsDataURL(f);
        });

        del.addEventListener('click', function(e){
          e.stopPropagation();
          var img = drop.querySelector('img');
          if(img) img.remove();
          drop.classList.remove('has-img');
          input.value = '';
          ensureRec(activeTabKey())[idx].img = '';
        });

        slot.appendChild(cap);
        slot.appendChild(drop);
        grid.appendChild(slot);
        slotRefs[idx] = { cap:cap, drop:drop, input:input, del:del };
      })(i);
    }
    loadPhotosForTab();
  }

  window.switchCenterView = function(view){
    var perf  = document.getElementById('perfView');
    var photo = document.getElementById('photoView');
    var title = document.getElementById('centerTitle');
    var bDoc  = document.getElementById('ciDoc');
    var bCam  = document.getElementById('ciCam');
    if(!perf || !photo) return;

    if(view === 'photo'){
      buildPhotoGrid();
      perf.style.display  = 'none';
      photo.style.display = 'flex';
      if(title) title.innerHTML = '&#9632; 현장 사진';
      bDoc.classList.remove('active');
      bCam.classList.add('active');
    } else {
      photo.style.display = 'none';
      perf.style.display  = 'flex';
      if(title) title.innerHTML = '&#9632; 열교환 성능 분석표';
      bCam.classList.remove('active');
      bDoc.classList.add('active');
      /* 숨김 상태에서 캔버스 크기가 0이 되므로 다시 그린다 */
      if(typeof recalc === 'function'){ try{ recalc(); }catch(e){} }
    }
  };
})();
</script>
</body>
</html>

// ====== 필드 잠금/해제 함수 ======
function lockInputFields(regionName, year) {
  const regionSel = document.getElementById('region');
  const yearSel = document.getElementById('yearSelect');

  // 지역 매핑 시도
  let regionMatched = false;
  for (let i = 0; i < regionSel.options.length; i++) {
    if (regionSel.options[i].value === regionName) {
      regionSel.selectedIndex = i;
      regionMatched = true;
      break;
    }
  }
  // 매칭 안 되면 custom option 추가
  if (!regionMatched && regionName) {
    const opt = document.createElement('option');
    opt.value = regionName;
    opt.textContent = regionName + ' (CSV)';
    opt.setAttribute('data-stn', '000');
    opt.setAttribute('data-csv-added', 'true');
    regionSel.appendChild(opt);
    regionSel.value = regionName;
  }

  // 연도 매핑 시도
  let yearMatched = false;
  if (year) {
    for (let i = 0; i < yearSel.options.length; i++) {
      if (yearSel.options[i].value === String(year)) {
        yearSel.selectedIndex = i;
        yearMatched = true;
        break;
      }
    }
    if (!yearMatched) {
      const opt = document.createElement('option');
      opt.value = String(year);
      opt.textContent = year + '년';
      opt.setAttribute('data-csv-added', 'true');
      yearSel.appendChild(opt);
      yearSel.value = String(year);
    }
  }

  // disabled 처리
  regionSel.disabled = true;
  yearSel.disabled = true;

  // 뱃지 표시
  addLockedBadge('region', 'CSV');
  addLockedBadge('yearSelect', 'CSV');
}

function unlockInputFields() {
  const regionSel = document.getElementById('region');
  const yearSel = document.getElementById('yearSelect');

  regionSel.disabled = false;
  yearSel.disabled = false;

  // CSV로 추가된 custom option 제거
  regionSel.querySelectorAll('[data-csv-added]').forEach(o => o.remove());
  yearSel.querySelectorAll('[data-csv-added]').forEach(o => o.remove());

  // 뱃지 제거
  removeLockedBadge('region');
  removeLockedBadge('yearSelect');
}

function addLockedBadge(selectId, text) {
  const badgeId = selectId + '_lockBadge';
  if (document.getElementById(badgeId)) return;
  const badge = document.createElement('span');
  badge.id = badgeId;
  badge.className = 'upload-locked-badge';
  badge.textContent = text;
  const label = document.getElementById(selectId).closest('.field-group').querySelector('label');
  label.appendChild(badge);
}

function removeLockedBadge(selectId) {
  const badgeId = selectId + '_lockBadge';
  const badge = document.getElementById(badgeId);
  if (badge) badge.remove();
}

// ====== DAILY TEMPERATURE GENERATION ======
function generateDailyTemps(monthlyAvgs, year) {
  const isLeap = year % 4 === 0 && (year % 100 !== 0 || year % 400 === 0);
  const days = [31, isLeap ? 29 : 28, 31, 30, 31, 30, 31, 31, 30, 31, 30, 31];
  const daily = [];
  for (let m = 0; m < 12; m++) {
    const avg = monthlyAvgs[m];
    const nextAvg = monthlyAvgs[(m + 1) % 12];
    const prevAvg = monthlyAvgs[(m + 11) % 12];
    for (let d = 0; d < days[m]; d++) {
      const progress = d / days[m];
      const trend = avg + (nextAvg - avg) * progress * 0.3 + (avg - prevAvg) * (1 - progress) * 0.1;
      const seed = Math.sin((m + 1) * 1000 + (d + 1) * 37) * 10000;
      const noise = (seed - Math.floor(seed) - 0.5) * 4;
      const temp = Math.round((trend + noise) * 10) / 10;
      daily.push({
        month: m, day: d + 1,
        date: `${year}-${String(m+1).padStart(2,'0')}-${String(d+1).padStart(2,'0')}`,
        temp: temp
      });
    }
  }
  return daily;
}

// ====== CALCULATE ======
function calculate() {
  const region = document.getElementById('region').value;
  const hddBase = parseFloat(document.getElementById('hddBase').value);
  const cddBase = parseFloat(document.getElementById('cddBase').value);
  const yearVal = document.getElementById('yearSelect').value;

  if (isNaN(hddBase) || isNaN(cddBase)) return;

  let dailyData;
  if (apiDailyData && apiDailyData.length > 0) {
    dailyData = apiDailyData;
  } else {
    const baseTemps = climateData[region];
    if (!baseTemps) return;
    let monthlyAvgs;
    if (yearVal === 'climate') {
      monthlyAvgs = [...baseTemps];
    } else {
      const adj = yearAdjust[yearVal] || new Array(12).fill(0);
      monthlyAvgs = baseTemps.map((t, i) => Math.round((t + adj[i]) * 10) / 10);
    }
    const year = yearVal === 'climate' ? 2024 : parseInt(yearVal);
    dailyData = generateDailyTemps(monthlyAvgs, year);
  }

  let totalHDD = 0, totalCDD = 0;
  const monthlyResults = Array.from({length: 12}, () => ({
    hdd: 0, cdd: 0, avgTemp: 0, days: 0, minTemp: 999, maxTemp: -999
  }));

  dailyData.forEach(d => {
    const hdd = Math.max(hddBase - d.temp, 0);
    const cdd = Math.max(d.temp - cddBase, 0);
    d.hdd = Math.round(hdd * 10) / 10;
    d.cdd = Math.round(cdd * 10) / 10;
    totalHDD += hdd;
    totalCDD += cdd;
    const mr = monthlyResults[d.month];
    mr.hdd += hdd;
    mr.cdd += cdd;
    mr.avgTemp += d.temp;
    mr.days++;
    mr.minTemp = Math.min(mr.minTemp, d.temp);
    mr.maxTemp = Math.max(mr.maxTemp, d.temp);
  });

  monthlyResults.forEach(mr => {
    mr.avgTemp = mr.days > 0 ? Math.round(mr.avgTemp / mr.days * 10) / 10 : 0;
    mr.hdd = Math.round(mr.hdd * 10) / 10;
    mr.cdd = Math.round(mr.cdd * 10) / 10;
  });

  totalHDD = Math.round(totalHDD * 10) / 10;
  totalCDD = Math.round(totalCDD * 10) / 10;
  const avgTemp = Math.round(dailyData.reduce((s, d) => s + d.temp, 0) / dailyData.length * 10) / 10;

  const yearLabel = yearVal === 'climate' ? '평년' : yearVal + '년';

  // Update metric cards
  document.getElementById('mv-hdd').textContent = totalHDD.toLocaleString();
  document.querySelector('.type-hdd .m-label').textContent = `연간 난방도일 (HDD) · 기준 ${hddBase}℃`;
  document.getElementById('mv-cdd').textContent = totalCDD.toLocaleString();
  document.querySelector('.type-cdd .m-label').textContent = `연간 냉방도일 (CDD) · 기준 ${cddBase}℃`;
  document.getElementById('mv-avg').textContent = avgTemp + '°C';
  document.getElementById('ml-avg').textContent = `${region} ${yearLabel} 연평균 기온`;
  document.getElementById('mv-total').textContent = (totalHDD + totalCDD).toLocaleString();

  renderCharts(monthlyResults, region, yearLabel, hddBase, cddBase);
  renderMonthlyTable(monthlyResults, totalHDD, totalCDD, avgTemp);

  /* 마지막 계산 결과를 전역 변수에 저장 (JSON 내보내기용) */
  lastCalcResult = {
    region: region,
    year: yearLabel,
    hddBase: hddBase,
    cddBase: cddBase,
    totalHDD: totalHDD,
    totalCDD: totalCDD,
    avgTemp: avgTemp,
    monthly: monthlyResults.map(function(m, i){
      return { month: (i+1)+'월', avgTemp: m.avgTemp, hdd: m.hdd, cdd: m.cdd, minTemp: m.minTemp, maxTemp: m.maxTemp, days: m.days };
    })
  };
}

// ====== API FETCH ======
async function fetchFromAPI() {
  const apiKey = document.getElementById('apiKey').value.trim();
  if (!apiKey) { alert('API 인증키를 입력해주세요.'); return; }

  const region = document.getElementById('region');
  const stn = region.options[region.selectedIndex].getAttribute('data-stn');
  const startDate = document.getElementById('apiStart').value.replace(/-/g, '');
  const endDate = document.getElementById('apiEnd').value.replace(/-/g, '');

  const status = document.getElementById('apiStatus');
  status.innerHTML = '<span class="hdd-spinner"></span> 데이터를 불러오는 중...';

  try {
    const url = `https://apihub.kma.go.kr/api/typ01/url/kma_sfcdd3.php?tm1=${startDate}&tm2=${endDate}&stn=${stn}&help=0&authKey=${apiKey}`;
    const res = await fetch(url);
    const text = await res.text();

    if (text.includes('ERROR') || text.includes('error') || text.length < 50) {
      status.innerHTML = 'API 호출 실패: 인증키 또는 파라미터를 확인해주세요.';
      return;
    }

    const lines = text.trim().split('\n').filter(l => l && !l.startsWith('#'));
    const dailyData = [];

    lines.forEach(line => {
      const parts = line.trim().split(/\s+/);
      if (parts.length >= 12) {
        const dateStr = parts[0];
        const avgTemp = parseFloat(parts[10]);
        if (!isNaN(avgTemp) && dateStr.length === 8) {
          const y = dateStr.substring(0, 4);
          const m = parseInt(dateStr.substring(4, 6)) - 1;
          const d = parseInt(dateStr.substring(6, 8));
          dailyData.push({
            month: m, day: d,
            date: `${y}-${dateStr.substring(4,6)}-${dateStr.substring(6,8)}`,
            temp: avgTemp
          });
        }
      }
    });

    if (dailyData.length > 0) {
      apiDailyData = dailyData;
      status.innerHTML = `${dailyData.length}일 분의 데이터를 성공적으로 불러왔습니다!`;
      calculate();
    } else {
      status.innerHTML = '데이터 파싱에 실패했습니다. API 응답 형식이 예상과 다릅니다.';
    }
  } catch (err) {
    status.innerHTML = '네트워크 오류: ' + err.message;
  }
}

// ====== CSV UPLOAD HANDLERS ======
function handleCsvDrop(e) {
  e.preventDefault();
  e.currentTarget.style.borderColor = '#d1d5db';
  e.currentTarget.style.background = '';
  const files = e.dataTransfer.files;
  if (files.length > 0 && files[0].name.endsWith('.csv')) {
    processCsvFile(files[0]);
  } else {
    document.getElementById('csvStatus').innerHTML = '<span style="color:#dc2626;">CSV 파일만 업로드 가능합니다.</span>';
  }
}

function handleCsvFileSelect(e) {
  const files = e.target.files;
  if (files.length > 0) {
    processCsvFile(files[0]);
  }
}

function removeCsvFile() {
  document.getElementById('csvFileInput').value = '';
  document.getElementById('csvFileInfo').style.display = 'none';
  document.getElementById('csvStatus').innerHTML = '';
  apiDailyData = null;
  unlockInputFields();
  calculate();
}

function processCsvFile(file) {
  const reader = new FileReader();
  reader.onload = function(e) {
    let text = e.target.result;
    // Try to handle encoding
    parseCsvData(text, file.name);
  };
  // Try UTF-8 first, then EUC-KR
  reader.readAsText(file, 'EUC-KR');
}

function parseCsvData(text, fileName) {
  const status = document.getElementById('csvStatus');
  const lines = text.split('\n');

  // ① 메타정보에서 지역명과 기간 추출
  let csvRegion = '';
  let csvYear = '';
  let csvStartYear = '';
  let csvEndYear = '';

  for (let i = 0; i < Math.min(lines.length, 10); i++) {
    const line = lines[i].trim();
    // 지역/지점 : 서울
    if (line.includes('지역/지점')) {
      const match = line.match(/지역\/지점\s*:\s*(.+)/);
      if (match) {
        csvRegion = match[1].trim();
      }
    }
    // 기간 : 20250101~20251231
    if (line.includes('기간')) {
      const match = line.match(/기간\s*:\s*(\d{4})/);
      if (match) {
        csvStartYear = match[1];
      }
      const match2 = line.match(/~(\d{4})/);
      if (match2) {
        csvEndYear = match2[1];
      }
      csvYear = csvStartYear || csvEndYear;
    }
  }

  // ② 헤더 행 찾기 & 데이터 파싱
  let headerIdx = -1;
  let avgTempCol = -1;

  for (let i = 0; i < lines.length; i++) {
    const line = lines[i].trim();
    if (line.includes('날짜') && line.includes('평균기온')) {
      headerIdx = i;
      const cols = line.split(',');
      for (let c = 0; c < cols.length; c++) {
        if (cols[c].includes('평균기온')) {
          avgTempCol = c;
          break;
        }
      }
      break;
    }
  }

  if (headerIdx === -1 || avgTempCol === -1) {
    status.innerHTML = '<span style="color:#dc2626;">CSV 형식을 인식할 수 없습니다. "날짜"와 "평균기온" 컬럼이 필요합니다.</span>';
    return;
  }

  const dailyData = [];
  for (let i = headerIdx + 1; i < lines.length; i++) {
    const line = lines[i].trim();
    if (!line) continue;
    const cols = line.split(',');
    if (cols.length <= avgTempCol) continue;

    const dateStr = cols[0].trim();
    const avgTemp = parseFloat(cols[avgTempCol].trim());

    // 날짜 파싱 (YYYY-MM-DD)
    const dateMatch = dateStr.match(/(\d{4})-(\d{2})-(\d{2})/);
    if (dateMatch && !isNaN(avgTemp)) {
      const y = parseInt(dateMatch[1]);
      const m = parseInt(dateMatch[2]) - 1;
      const d = parseInt(dateMatch[3]);
      dailyData.push({
        month: m,
        day: d,
        date: `${dateMatch[1]}-${dateMatch[2]}-${dateMatch[3]}`,
        temp: avgTemp
      });
    }
  }

  if (dailyData.length === 0) {
    status.innerHTML = '<span style="color:#dc2626;">유효한 온도 데이터를 찾을 수 없습니다.</span>';
    return;
  }

  // ③ 연도를 데이터에서도 확인 (메타에 없을 경우)
  if (!csvYear && dailyData.length > 0) {
    csvYear = dailyData[0].date.substring(0, 4);
  }

  // ④ 데이터 적용
  apiDailyData = dailyData;

  // ⑤ Input Data 필드 자동 설정 & 잠금
  lockInputFields(csvRegion, csvYear);

  // ⑥ UI 업데이트
  document.getElementById('csvFileInfo').style.display = 'block';
  document.getElementById('csvFileName').textContent = fileName + ' (' + dailyData.length + '일)';
  status.innerHTML = '<span style="color:#059669;">' + csvRegion + ' / ' + csvYear + '년 · ' + dailyData.length + '일 데이터 로드 완료</span>';

  // ⑦ 계산 실행
  calculate();
}

// ====== 저장 / 내보내기 / 메인 ======
const STORE_KEY = 'HIMEC_SAVE::hdd_cdd::' + (new URLSearchParams(location.search).get('projectId') || 'default');

function himecSave(){
  try {
    /* 모든 입력 필드 값을 수집 */
    var fieldData = {};
    var els = document.querySelectorAll('input, select, textarea');
    els.forEach(function(el, i){
      var k = el.id ? ('#' + el.id) : ('@' + i);
      if(el.type === 'checkbox' || el.type === 'radio'){
        fieldData[k] = { t:'chk', v: el.checked };
      } else {
        fieldData[k] = { t:'val', v: el.value };
      }
    });
    localStorage.setItem(STORE_KEY, JSON.stringify({ fields: fieldData, lastCalc: lastCalcResult }));
    alert('현재 화면의 입력값이 저장되었습니다.');
  } catch(e){
    alert('저장 실패: ' + e.message);
  }
}

function loadSaved(){
  try {
    var raw = localStorage.getItem(STORE_KEY);
    if(!raw) return false;
    var data = JSON.parse(raw);
    if(!data.fields) return false;
    var els = document.querySelectorAll('input, select, textarea');
    els.forEach(function(el, i){
      var k = el.id ? ('#' + el.id) : ('@' + i);
      var rec = data.fields[k];
      if(!rec) return;
      if(rec.t === 'chk'){
        el.checked = !!rec.v;
        el.dispatchEvent(new Event('change', {bubbles:true}));
      } else {
        el.value = rec.v;
        el.dispatchEvent(new Event('input', {bubbles:true}));
        el.dispatchEvent(new Event('change', {bubbles:true}));
      }
    });
    if(data.lastCalc) lastCalcResult = data.lastCalc;
    return true;
  } catch(e){}
  return false;
}

function himecMain(){
  location.href = '../tool_dashboard.html';
}

window.himecSave = himecSave;
window.himecMain = himecMain;

// ====== AUTO CALCULATE ON LOAD ======
window.addEventListener('load', function(){
  loadSaved();
  setTimeout(function(){ calculate(); }, 200);
});
</script>


<script>
/* === HIMEC 헤더 내보내기 (Tool-201 드롭다운 디자인 유지) === */
(function(){
  function closeMenu(){ var m=document.getElementById('himecExportMenu'); if(m) m.parentNode.removeChild(m); document.removeEventListener('click', outside, true); }
  function outside(e){ var m=document.getElementById('himecExportMenu'); if(m && !m.contains(e.target)) closeMenu(); }

  function himecExport(btn){
    if(document.getElementById('himecExportMenu')){ closeMenu(); return; }
    var m=document.createElement('div'); m.className='himec-menu'; m.id='himecExportMenu';
    m.innerHTML =
      '<button data-x="pdf"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>PDF로 저장</button>'+
      '<button data-x="json"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="2"/><line x1="9" y1="3" x2="9" y2="21"/><line x1="3" y1="9" x2="21" y2="9"/></svg>JSON 내보내기</button>';
    document.body.appendChild(m);
    var r=btn.getBoundingClientRect();
    var left=window.scrollX+r.right-m.offsetWidth; if(left<6) left=6;
    m.style.top=(window.scrollY+r.bottom+6)+'px';
    m.style.left=left+'px';
    m.addEventListener('click', function(e){
      var t=e.target.closest('button'); if(!t) return;
      var x=t.getAttribute('data-x'); closeMenu();
      if(x==='pdf') window.print();
      else {
        try {
          if(!lastCalcResult){ alert('내보내기 할 데이터가 없습니다. 먼저 계산을 실행해주세요.'); return; }
          var b=new Blob([JSON.stringify(lastCalcResult, null, 2)], {type:'application/json'});
          var a=document.createElement('a');
          a.href=URL.createObjectURL(b);
          a.download='HDD_CDD_분석.json';
          a.click();
        } catch(err){ alert('내보내기 오류: '+err.message); }
      }
    });
    setTimeout(function(){ document.addEventListener('click', outside, true); }, 0);
  }
  window.himecExport=himecExport;
})();
</script>

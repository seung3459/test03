<script>
function drawRadarChart(V){
  const canvas=document.getElementById('radarCanvas'); if(!canvas) return;
  const wrapper=canvas.parentElement; const dpr=window.devicePixelRatio||1;
  canvas.width=wrapper.clientWidth*dpr; canvas.height=wrapper.clientHeight*dpr;
  canvas.style.width=wrapper.clientWidth+'px'; canvas.style.height=wrapper.clientHeight+'px';
  const ctx=canvas.getContext('2d'); ctx.scale(dpr,dpr);
  const w=wrapper.clientWidth,h=wrapper.clientHeight,cx=w/2,cy=h/2,radius=Math.min(w,h)*0.35;
  ctx.clearRect(0,0,w,h); ctx.fillStyle='#fff'; ctx.fillRect(0,0,w,h);
  const labels=['유량','압력','온도','유속']; const numAxes=4;
  const angleStep=(Math.PI*2)/numAxes; const startAngle=-Math.PI/2; const maxVal=180;
  const stData=[V.ST.flowR,V.ST.pressR,V.ST.tempR,V.ST.velDR];
  const wtData=[V.WT.flowR,V.WT.pressR,V.WT.tempR,V.WT.velDR];
  const rings=[40,80,100,120,160];
  rings.forEach(rv=>{ const r=(rv/maxVal)*radius; ctx.beginPath();
    for(let i=0;i<=numAxes;i++){ const a=startAngle+i*angleStep; const x=cx+r*Math.cos(a),y=cy+r*Math.sin(a);
      if(i===0)ctx.moveTo(x,y); else ctx.lineTo(x,y);} ctx.closePath();
    ctx.strokeStyle=rv===100?'#999':'#ddd'; ctx.lineWidth=rv===100?1.5:0.5;
    if(rv===100){ctx.setLineDash([4,3]);ctx.stroke();ctx.setLineDash([]);}else ctx.stroke(); });
  for(let i=0;i<numAxes;i++){ const a=startAngle+i*angleStep; ctx.beginPath(); ctx.moveTo(cx,cy);
    ctx.lineTo(cx+radius*1.1*Math.cos(a),cy+radius*1.1*Math.sin(a)); ctx.strokeStyle='#bbb'; ctx.lineWidth=0.8; ctx.stroke(); }
  ctx.font='10px "Noto Sans KR",sans-serif'; ctx.fillStyle='#999'; ctx.textAlign='left'; ctx.textBaseline='bottom';
  rings.forEach(rv=>{ const r=(rv/maxVal)*radius; ctx.fillText(rv+'%',cx+4,cy-r-2); });
  /* 설계 기준 다각형(100%) */
  ctx.beginPath();
  for(let i=0;i<numAxes;i++){ const a=startAngle+i*angleStep; const r=(100/maxVal)*radius;
    const x=cx+r*Math.cos(a),y=cy+r*Math.sin(a); if(i===0)ctx.moveTo(x,y); else ctx.lineTo(x,y); }
  ctx.closePath(); ctx.fillStyle='rgba(200,200,200,0.2)'; ctx.fill();
  ctx.strokeStyle='#999'; ctx.lineWidth=1.5; ctx.setLineDash([4,3]); ctx.stroke(); ctx.setLineDash([]);
  function poly(data,fill,stroke){
    ctx.beginPath();
    for(let i=0;i<numAxes;i++){ const a=startAngle+i*angleStep; const val=Math.min(data[i],maxVal); const r=(val/maxVal)*radius;
      const x=cx+r*Math.cos(a),y=cy+r*Math.sin(a); if(i===0)ctx.moveTo(x,y); else ctx.lineTo(x,y); }
    ctx.closePath(); ctx.fillStyle=fill; ctx.fill(); ctx.strokeStyle=stroke; ctx.lineWidth=2; ctx.stroke();
    for(let i=0;i<numAxes;i++){ const a=startAngle+i*angleStep; const val=Math.min(data[i],maxVal); const r=(val/maxVal)*radius;
      const x=cx+r*Math.cos(a),y=cy+r*Math.sin(a); ctx.beginPath(); ctx.arc(x,y,4,0,Math.PI*2);
      ctx.fillStyle=stroke; ctx.fill(); ctx.strokeStyle='#fff'; ctx.lineWidth=2; ctx.stroke(); }
  }
  if(selectedFan==='ST'||selectedFan==='BOTH') poly(stData,'rgba(0,131,143,0.15)','#00838f');
  if(selectedFan==='WT'||selectedFan==='BOTH') poly(wtData,'rgba(232,93,36,0.12)','#e85d24');
  ctx.textAlign='center'; ctx.textBaseline='middle';
  for(let i=0;i<numAxes;i++){ const a=startAngle+i*angleStep; const lr=radius*1.25;
    ctx.font='12px "Noto Sans KR",sans-serif'; ctx.fillStyle='#333';
    ctx.fillText(labels[i],cx+lr*Math.cos(a),cy+lr*Math.sin(a)); }
}
</script>

const equipStore={};
function initStore(){ equipStore[1]={}; FIELD_IDS.forEach(id=>{ var el=$(id); equipStore[1][id]=el?el.value.replace(/,/g,''):(DEFAULT_VALUES[id]||''); }); }
function saveCurrentTab(){ if(!equipStore[activeTab])equipStore[activeTab]={}; FIELD_IDS.forEach(id=>{ var el=$(id); if(el)equipStore[activeTab][id]=el.value.replace(/,/g,''); }); }
function loadTab(tabId){ var data=equipStore[tabId]||EMPTY_VALUES; FIELD_IDS.forEach(id=>{ var el=$(id); if(el){ el.value=data[id]||''; el.placeholder=(!data[id])?'입력하세요':''; if(NUMERIC_IDS.indexOf(id)>=0)applyCommaFormat(el); } }); var us=$('inp-use'); if(us && !us.value) us.value='ST'; }
function updateTabName(){ var name=$('inp-name').value||'헤더', no=$('inp-no').value||('#'+activeTab); var tb=$('tab-'+activeTab);
  if(tb){ var cb=tb.querySelector('.tab-close'); tb.textContent=name+' '+no; if(cb)tb.appendChild(cb); } }
function switchTab(tabId){ if(tabId===activeTab)return; saveCurrentTab(); updateTabName();
  document.querySelectorAll('.tab:not(.add)').forEach(t=>t.classList.remove('active'));
  var t=$('tab-'+tabId); if(t)t.classList.add('active'); activeTab=tabId; loadTab(tabId); recalc(); }
function addTab(){ saveCurrentTab(); updateTabName(); var newId=nextTabId++; tabCount++;
  equipStore[newId]={}; FIELD_IDS.forEach(id=>{ equipStore[newId][id]=''; });
  var btn=document.createElement('button'); btn.className='tab'; btn.id='tab-'+newId; btn.textContent='헤더 #'+tabCount;
  btn.onclick=function(){ switchTab(newId); };
  var cs=document.createElement('span'); cs.className='tab-close'; cs.innerHTML='&#10005;';
  cs.onclick=function(e){ e.stopPropagation(); removeTab(newId); }; btn.appendChild(cs);
  var bar=document.querySelector('.tab-bar'); bar.insertBefore(btn, bar.lastElementChild);
  document.querySelectorAll('.tab:not(.add)').forEach(t=>t.classList.remove('active'));
  btn.classList.add('active'); activeTab=newId; loadTab(newId); recalc(); }
function removeTab(tabId){ var tabs=document.querySelectorAll('.tab:not(.add)');
  if(tabs.length<=1){ alert('최소 1개의 헤더는 유지해야 합니다.'); return; }
  var tb=$('tab-'+tabId); var nm=tb?tb.textContent.replace('\u2715','').trim():'헤더';
  if(!confirm('"'+nm+'" 헤더를 삭제하시겠습니까?'))return;
  if(tb)tb.remove(); delete equipStore[tabId];
  if(activeTab===tabId){ var rem=document.querySelectorAll('.tab:not(.add)');
    if(rem.length>0){ var f=rem[0]; var fid=parseInt(f.id.replace('tab-','')); f.classList.add('active'); activeTab=fid; loadTab(fid); recalc(); } } }

window.addEventListener('DOMContentLoaded', function(){
  initStore();
  ['inp-name','inp-no'].forEach(id=>{ var el=$(id); if(el)el.addEventListener('input', updateTabName); });
  NUMERIC_IDS.forEach(function(id){ var el=$(id); if(el&&!el.readOnly){
    el.addEventListener('blur', function(){ applyCommaFormat(this); });
    el.addEventListener('focus', function(){ this.value=this.value.replace(/,/g,''); }); } });
  recalc(); formatAllNumericFields();
});
window.addEventListener('resize', function(){ recalc(); });
</script>

<script>
/* === HIMEC 공통 헤더 기능 (Save / Export / Main) === */
(function(){
  function fields(){ return Array.prototype.slice.call(document.querySelectorAll('input, select, textarea')); }
  function fkey(el,i){ return el.id?('#'+el.id):('@'+i); }
  function storeKey(){ return 'HIMEC_SAVE::'+(location.pathname||document.title||'tool'); }
  function himecSave(){ try{ var data={}; fields().forEach(function(el,i){ var k=fkey(el,i);
    if(el.type==='checkbox'||el.type==='radio'){ data[k]={t:'chk',v:el.checked}; } else { data[k]={t:'val',v:el.value}; } });
    localStorage.setItem(storeKey(), JSON.stringify(data)); alert('현재 화면의 입력값이 저장되었습니다.');
    }catch(e){ alert('저장 중 오류가 발생했습니다: '+e.message); } }
  function himecRestore(){ try{ var raw=localStorage.getItem(storeKey()); if(!raw)return; var data=JSON.parse(raw);
    fields().forEach(function(el,i){ var rec=data[fkey(el,i)]; if(!rec)return;
      if(rec.t==='chk'){ el.checked=!!rec.v; el.dispatchEvent(new Event('change',{bubbles:true})); }
      else { el.value=rec.v; el.dispatchEvent(new Event('input',{bubbles:true})); el.dispatchEvent(new Event('change',{bubbles:true})); } });
    }catch(e){} }
  function closeMenu(){ var m=document.getElementById('himecExportMenu'); if(m)m.parentNode.removeChild(m); document.removeEventListener('click', outside, true); }
  function outside(e){ var m=document.getElementById('himecExportMenu'); if(m&&!m.contains(e.target))closeMenu(); }
  function himecExport(btn){ if(document.getElementById('himecExportMenu')){ closeMenu(); return; }
    var m=document.createElement('div'); m.className='himec-menu'; m.id='himecExportMenu';
    m.innerHTML='<button data-x="pdf"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>PDF로 저장</button>'+
      '<button data-x="xls"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="2"/><line x1="9" y1="3" x2="9" y2="21"/><line x1="3" y1="9" x2="21" y2="9"/></svg>Excel로 내보내기</button>';
    document.body.appendChild(m); var r=btn.getBoundingClientRect(); var left=window.scrollX+r.right-m.offsetWidth; if(left<6)left=6;
    m.style.top=(window.scrollY+r.bottom+6)+'px'; m.style.left=left+'px';
    m.addEventListener('click', function(e){ var t=e.target.closest('button'); if(!t)return; var x=t.getAttribute('data-x'); closeMenu(); if(x==='pdf')himecPDF(); else himecExcel(); });
    setTimeout(function(){ document.addEventListener('click', outside, true); }, 0); }
  function himecPDF(){ window.print(); }
  function himecExcel(){ alert('Excel 내보내기는 추후 별도 양식으로 제공될 예정입니다.'); }
  function himecMain(){
    location.href = '../tool_dashboard.html';
  }
  window.himecSave=himecSave; window.himecExport=himecExport; window.himecMain=himecMain;
  if(document.readyState==='loading'){ window.addEventListener('DOMContentLoaded', function(){ setTimeout(himecRestore,60); }); }
  else { setTimeout(himecRestore,60); }
})();
</script>

<script>
/* === URL 파라미터에서 프로젝트명 파싱 → 헤더에 표시 === */
(function parseUrlParams() {
    var params = new URLSearchParams(window.location.search);
    var projectId   = params.get('projectId')   || null;
    var projectName = params.get('projectName') || null;

    /* 프로젝트명을 헤더 #project-name span에 삽입 */
    var nameEl = document.getElementById('project-name');
    if (projectName && nameEl) {
        nameEl.textContent = projectName;
        /* 브라우저 탭 제목에도 반영 */
        document.title = projectName + ' - Steam/Water Header Performance Analysis';
    }
})();
</script>

<script>
/* 방향 전환/리사이즈 시 레이더 캔버스 재드로 */
(function(){
  function poke(){ try{ window.dispatchEvent(new Event('resize')); }catch(e){} }
  function pokeAll(){ poke(); requestAnimationFrame(poke); setTimeout(poke,120); setTimeout(poke,400); }
  window.addEventListener('load', pokeAll);
  window.addEventListener('orientationchange', pokeAll);
  if(window.matchMedia){ try{ window.matchMedia('(orientation: portrait)').addEventListener('change', pokeAll); }
    catch(e){ try{ window.matchMedia('(orientation: portrait)').addListener(pokeAll); }catch(_){} } }
  if('ResizeObserver' in window){ var ro=new ResizeObserver(function(){ pokeAll(); });
    function obs(){ ['#chartWrapper','.chart-wrap'].forEach(function(sel){ document.querySelectorAll(sel).forEach(function(el){ try{ ro.observe(el); }catch(e){} }); }); }
    if(document.readyState!=='loading')obs(); else document.addEventListener('DOMContentLoaded',obs); }
})();
</script>

<!-- 출처/판정 기준 팝업 (Tool-201 동일) -->
<div class="src-modal-mask" id="srcModalMask" onclick="if(event.target===this)closeSrcPopup()">
  <div class="src-modal">
    <div class="sm-head"><h3 id="srcModalTitle">판정 기준</h3><button class="sm-close" onclick="closeSrcPopup()">&times;</button></div>
    <div class="sm-body" id="srcModalBody"></div>
  </div>
</div>
<script>
/* === 센터 뷰 전환(운전 성능 <-> 현장 사진) + 사진 등록/촬영 === */
(function(){
  var PHOTO_LABELS = [
    "사진 1 (예: 장비 외관)",
    "사진 2 (예: 명판 / 사양)",
    "사진 3 (예: 흡입/입구측)",
    "사진 4 (예: 토출/출구측)",
    "사진 5 (예: 계측기 / 게이지)",
    "사진 6 (예: 제어반 / 기타)"
  ];

  /* === 사진: 탭별 저장 (탭마다 독립 보관) === */
  var photoStore = {};   /* key(탭 식별자) -> [{cap,img}, ...] */
  var slotRefs   = [];   /* 사진 슬롯 DOM 참조 */
  var lastKey    = null;

  function activeTabKey(){
    var el = document.querySelector('.tab.active');
    if(el && el.id) return el.id;
    var tabs = document.querySelectorAll('.tab:not(.add)');
    for(var i=0;i<tabs.length;i++){ if(tabs[i].classList.contains('active')) return 'tabpos-'+i; }
    return 'tab-default';
  }

  function ensureRec(key){
    if(!photoStore[key]){
      var arr = [];
      for(var i=0;i<PHOTO_LABELS.length;i++){ arr.push({ cap:null, img:'' }); }
      photoStore[key] = arr;
    }
    return photoStore[key];
  }

  function loadPhotosForTab(){
    var grid = document.getElementById('photoGrid');
    if(!grid || !grid.dataset.built) return;
    var key = activeTabKey();
    lastKey = key;
    var rec = ensureRec(key);
    for(var i=0;i<slotRefs.length;i++){
      var s = slotRefs[i], r = rec[i];
      s.cap.value = (r && r.cap != null) ? r.cap : PHOTO_LABELS[i];
      var old = s.drop.querySelector('img');
      if(old) old.remove();
      if(r && r.img){
        var img = document.createElement('img');
        img.src = r.img;
        s.drop.appendChild(img);
        s.drop.classList.add('has-img');
      } else {
        s.drop.classList.remove('has-img');
      }
      s.input.value = '';
    }
  }
  window.loadPhotosForTab = loadPhotosForTab;

  /* 탭 전환/추가/삭제 자동 감지 → 해당 탭 사진 로드 */
  function watchTabs(){
    var anchor = document.querySelector('.tab.add') || document.querySelector('.tab');
    var bar = anchor ? anchor.parentNode : document.body;
    try{
      var mo = new MutationObserver(function(){
        if(activeTabKey() !== lastKey) loadPhotosForTab();
      });
      mo.observe(bar, { childList:true, subtree:true, attributes:true, attributeFilter:['class'] });
    }catch(e){}
  }
  if(document.readyState === 'loading') document.addEventListener('DOMContentLoaded', watchTabs);
  else watchTabs();

  function buildPhotoGrid(){
    var grid = document.getElementById('photoGrid');
    if(!grid || grid.dataset.built) return;
    grid.dataset.built = "1";
    slotRefs = [];
    for(var i=0;i<PHOTO_LABELS.length;i++){
      (function(idx){
        var slot = document.createElement('div');
        slot.className = 'photo-slot';

        var cap = document.createElement('input');
        cap.type = 'text';
        cap.className = 'photo-cap';
        cap.title = '제목을 클릭하여 편집하세요';
        cap.placeholder = PHOTO_LABELS[idx];
        cap.value = PHOTO_LABELS[idx];
        cap.addEventListener('input', function(){
          ensureRec(activeTabKey())[idx].cap = cap.value;
        });
        /* 입력창 클릭이 사진 촬영/선택으로 전파되지 않도록 차단 */
        cap.addEventListener('click', function(e){ e.stopPropagation(); });

        var drop = document.createElement('div');
        drop.className = 'photo-drop';
        drop.innerHTML =
          '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"/><circle cx="12" cy="13" r="4"/></svg>' +
          '<div class="pd-title">사진 ' + (idx+1) + '</div>' +
          '<div class="pd-sub">클릭하여 촬영 / 선택</div>';

        var input = document.createElement('input');
        input.type = 'file';
        input.accept = 'image/*';
        input.setAttribute('capture','environment');
        input.style.display = 'none';

        var del = document.createElement('button');
        del.type = 'button';
        del.className = 'photo-del';
        del.title = '사진 삭제';
        del.innerHTML = '&times;';

        drop.appendChild(input);
        drop.appendChild(del);

        drop.addEventListener('click', function(e){
          if(e.target === del) return;
          input.click();
        });

        input.addEventListener('change', function(){
          var f = input.files && input.files[0];
          if(!f) return;
          var r = new FileReader();
          r.onload = function(ev){
            var old = drop.querySelector('img');
            if(old) old.remove();
            var img = document.createElement('img');
            img.src = ev.target.result;
            drop.appendChild(img);
            drop.classList.add('has-img');
            ensureRec(activeTabKey())[idx].img = ev.target.result;
          };
          r.readAsDataURL(f);
        });

        del.addEventListener('click', function(e){
          e.stopPropagation();
          var img = drop.querySelector('img');
          if(img) img.remove();
          drop.classList.remove('has-img');
          input.value = '';
          ensureRec(activeTabKey())[idx].img = '';
        });

        slot.appendChild(cap);
        slot.appendChild(drop);
        grid.appendChild(slot);
        slotRefs[idx] = { cap:cap, drop:drop, input:input, del:del };
      })(i);
    }
    loadPhotosForTab();
  }

  window.switchCenterView = function(view){
    var perf  = document.getElementById('perfView');
    var photo = document.getElementById('photoView');
    var title = document.getElementById('centerTitle');
    var bDoc  = document.getElementById('ciDoc');
    var bCam  = document.getElementById('ciCam');
    if(!perf || !photo) return;

    if(view === 'photo'){
      buildPhotoGrid();
      perf.style.display  = 'none';
      photo.style.display = 'flex';
      if(title) title.innerHTML = '&#9632; 현장 사진';
      bDoc.classList.remove('active');
      bCam.classList.add('active');
    } else {
      photo.style.display = 'none';
      perf.style.display  = 'flex';
      if(title) title.innerHTML = '&#9632; 운전 성능 분석표';
      bCam.classList.remove('active');
      bDoc.classList.add('active');
      /* 숨김 상태에서 캔버스 크기가 0이 되므로 다시 그린다 */
      if(typeof recalc === 'function'){ try{ recalc(); }catch(e){} }
    }
  };
})();
</script>

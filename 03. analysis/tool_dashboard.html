<!DOCTYPE html>
<html lang="ko">
<head>
  <!-- HIMEC Supabase Sync (저장소 계층 전용 / UI·로직 무변경) -->
  <!-- <script src="/js/supabase-config.js"></script> (로컬 테스트: 로그인/동기화 비활성) -->
  <!-- ▼ 로그인 가드 + 로그아웃 (설정 파일보다 뒤, sync보다 앞) -->
  <!-- <script src="/js/auth-guard.js"></script> (로컬 테스트: 로그인 게이트 비활성) -->
  <!-- <script src="/js/himec-supabase-sync.js"></script> (로컬 테스트: 클라우드 동기화 비활성) -->
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>HIMEC - Project Dashboard</title>
  <style>
/* ========== RESET & BASE ========== */
*{
  box-sizing:border-box;
  font-family:'Noto Sans KR',sans-serif;
}

/* ========== PAGE SYSTEM ========== */
.page{display:none;}
.page.active{display:block;}

/* ========== INTRO PAGE (1pg.png Design) ========== */
.intro-page{position:fixed;inset:0;background:#fff;z-index:1;}
.intro-page.active{display:flex;align-items:center;justify-content:center;}
.intro-split{display:flex;align-items:center;gap:40px;max-width:960px;width:100%;padding:30px;animation:introFadeIn .8s ease-out;}
@keyframes introFadeIn{from{opacity:0;transform:translateY(20px);}to{opacity:1;transform:translateY(0);}}

/* ── 메인 타이틀: 좌측 → 우측 등장 ── */
@keyframes slideInFromLeft {
  0%   { opacity: 0; transform: translateX(-80px); }
  100% { opacity: 1; transform: translateX(0); }
}

.intro-main-title {
  opacity: 0;
  animation: slideInFromLeft 1.0s ease-out forwards;
  animation-delay: 1.0s;
}

/* 좌측: 브랜딩 이미지 */
.intro-left{flex:0 0 280px;display:flex;align-items:center;justify-content:center;}
.intro-brand-img{width:100%;max-width:280px;height:auto;display:block;border-radius:4px;}
.intro-brand-fallback{width:280px;height:280px;display:flex;flex-direction:column;align-items:center;justify-content:center;background:#f5f5f5;border-radius:4px;}

/* 우측: 시스템 정보 */
.intro-right{flex:1;min-width:0;}
.intro-main-title{font-size:30px;font-weight:500;font-family:'Noto Sans KR','Noto Sans KR',sans-serif;color:#333;margin:0 0 24px;line-height:1.3;letter-spacing:-.5px;white-space:nowrap;}
.intro-main-sub{font-size:16px;color:#00838f;margin:0 0 46px;font-weight:400;text-align:center;}

/* 프로세스 플로우 */
.intro-flow{display:flex;align-items:center;justify-content:center;gap:10px;margin-bottom:30px;}
.intro-flow-step{position:relative;padding:28px 32px;border-radius:12px;font-size:20px;font-weight:400;cursor:pointer;border:none;transition:all .2s;font-family:inherit;min-width:170px;text-align:center;overflow:hidden;}
.flow-btn-arrow{position:absolute;left:0;bottom:12px;width:38px;height:18px;pointer-events:none;}
.flow-btn-arrow::before{content:'';position:absolute;left:0;top:50%;transform:translateY(-50%);width:24px;height:3px;background:#fff;border-radius:1px;}
.flow-btn-arrow::after{content:'';position:absolute;left:18px;top:50%;transform:translateY(-50%);width:0;height:0;border-top:7px solid transparent;border-bottom:7px solid transparent;border-left:10px solid #fff;}
.step-proposal{background:#d5dde3;color:#5a6a72;}
.step-proposal:hover{background:#c5cfd7;color:#3a4a52;transform:translateY(-2px);box-shadow:0 4px 12px rgba(0,0,0,.12);}
.step-estimate{background:#7faab9;color:#5a5554;}
.step-estimate:hover{background:#3a6c7a;color:#fff;transform:translateY(-2px);box-shadow:0 4px 12px rgba(74,124,138,.35);}
.step-project{background:#00838f;color:#fff;}
.step-project:hover{background:#0f3a4a;transform:translateY(-2px);box-shadow:0 4px 12px rgba(26,74,92,.4);}
.intro-slogan{font-size:12px;color:#888;margin:0;font-weight:400;text-align:center;}

/* 반응형 */
@media(max-width:720px){
.intro-split{flex-direction:column;gap:24px;text-align:center;}
.intro-left{flex:none;width:200px;}
.intro-brand-img{max-width:200px;}
.intro-brand-fallback{width:200px;height:200px;}
.intro-flow{justify-content:center;flex-wrap:wrap;}
.intro-main-title{font-size:18px;}
}

/* ========== PROJECT DASHBOARD HEADER ========== */
.pj-dash-header{background:#fff;border-bottom:1px solid #e0e0e0;padding:18px 30px 14px;}
.pj-dash-header-inner{max-width:1100px;margin:0 auto;display:flex;justify-content:space-between;align-items:center;}
.pj-dash-header-left{flex:1;}
.pj-dash-header-title{font-size:24px;font-weight:700;color:#333;margin:0;letter-spacing:-.3px;}
.pj-dash-header-sub{font-size:12px;color:#999;margin:3px 0 0;font-weight:400;}
.ico-btn{width:36px;height:30px;border:1px solid #dde1e6;background:#fff;border-radius:6px;cursor:pointer;display:inline-flex;align-items:center;justify-content:center;color:#3d4f5c;padding:0;transition:all .15s;flex-shrink:0;}
.ico-btn:hover{background:#f4f5f7;border-color:#546a7b;}

/* ========== PROJECT LIST PAGE (Timeline) ========== */
.projects-page{min-height:100vh;padding:0;background:#ffffff;animation:fadeIn .4s ease-out;}
@keyframes fadeIn{from{opacity:0;}to{opacity:1;}}
.projects-container{max-width:1100px;margin:0 auto;padding:30px 20px;}
.projects-header{display:flex;justify-content:space-between;align-items:flex-end;margin-bottom:28px;flex-wrap:wrap;gap:14px;}
.back-btn{background:none;border:1.5px solid #cbd5e1;color:#475569;padding:8px 16px;border-radius:10px;font-size:13px;font-weight:600;cursor:pointer;margin-bottom:14px;transition:all .15s;}
.back-btn:hover{background:#fff;border-color:#94a3b8;color:#1e293b;}
.projects-title{font-size:28px;font-weight:800;color:#1f2937;margin:0 0 6px 0;}
.projects-subtitle{font-size:10px;color:#888;}
.add-project-btn{background:#00838f;color:#fff;border:none;padding:8px 10px;border-radius:8px;font-size:13px;font-weight:700;cursor:pointer;box-shadow:0 4px 12px rgba(232,93,36,.25);transition:all .2s;white-space:nowrap;}
.add-project-btn:hover{transform:translateY(-2px);box-shadow:0 8px 20px rgba(232,93,36,.35);background:#d14e1a;}

/* Timeline container */
.projects-timeline{position:relative;padding:0 0 0 0;}

/* Year group */
.tl-year-group{margin-bottom:30px;position:relative;}

/* Year header */
.tl-year-header{display:flex;align-items:center;gap:12px;cursor:pointer;padding:4px 0;user-select:none;margin-bottom:6px;}
.tl-year-left{display:flex;align-items:center;gap:10px;}
.tl-year-label{font-size:22px;font-weight:800;color:#00838f;letter-spacing:-.5px;}
.tl-year-dot{width:12px;height:12px;border-radius:50%;border:2.5px solid #bbb;background:#fff;flex-shrink:0;}
.tl-year-toggle{font-size:11px;color:#aaa;margin-left:2px;transition:transform .2s;}
.tl-year-header:hover .tl-year-label{color:#d14e1a;}
.tl-year-header:hover .tl-year-dot{border-color:#e85d24;}

/* Year content (project list) */
.tl-year-content{position:relative;margin-left:50px;padding-left:24px;border-left:2px solid #ddd;}

/* Project row */
.tl-project-row{display:flex;align-items:center;justify-content:space-between;padding:12px 18px;margin-bottom:4px;background:#fff;border:none;border-bottom:1px solid #eee;cursor:pointer;transition:all .15s;gap:12px;}
.tl-project-row:last-child{border-bottom:1px solid #eee;}
.tl-project-row:hover{background:#f8f8f8;}
.tl-project-row.tl-active{background:#f0f7ff;border-left:3px solid #1a4b8c;}

/* Project name */
.tl-project-name{font-size:12px;font-weight:600;color:#333;flex:1;display:flex;align-items:center;gap:8px;}
.tl-project-name::after{content:' →';opacity:0;transition:all .15s;margin-left:2px;color:#999;}
.tl-project-row:hover .tl-project-name::after{opacity:1;margin-left:6px;}

/* Action buttons */
.tl-project-actions{display:flex;gap:6px;flex-shrink:0;}
.tl-action-edit{background:#fff;color:#555;border:1px solid #ddd;border-radius:4px;padding:5px 14px;font-size:10px;font-weight:600;cursor:pointer;transition:all .15s;}
.tl-action-edit:hover{background:#f0f0f0;border-color:#bbb;color:#333;}
.tl-action-delete{background:#dc2626;color:#fff;border:none;border-radius:4px;padding:5px 14px;font-size:10px;font-weight:700;cursor:pointer;transition:all .15s;}
.tl-action-delete:hover{background:#b91c1c;transform:scale(1.03);}

/* Empty state */
.projects-empty-state{padding:60px 20px;text-align:center;color:#94a3b8;font-size:14px;background:#fff;border-radius:12px;border:1px dashed #ddd;}

/* Active badge */
.active-badge{display:inline-block;background:#1a4b8c;color:#fff;font-size:10px;font-weight:700;padding:2px 8px;border-radius:999px;margin-left:4px;animation:pulse 2s infinite;}
.readonly-badge{display:inline-block;color:#9ca3af;font-size:14px;padding:6px 10px;}
@keyframes pulse{0%,100%{opacity:1;}50%{opacity:.6;}}

/* Bottom info */
.projects-info-bottom{margin-top:28px;text-align:right;font-size:10px;color:#999;}

/* ========== APP WRAPPER ========== */
.app-wrapper{max-width:1280px;margin:0 auto;background:#fff;min-height:100vh;}

/* ========== HEADER (목업 디자인) ========== */
.himec-header{display:flex;justify-content:space-between;align-items:center;padding:20px 30px 16px;background:#fff;border-bottom:1px solid #e0e0e0;}
.header-title{font-size:26px;font-weight:700;color:#333;margin:0;letter-spacing:-.5px;}
.header-subtitle{font-size:13px;color:#999;margin:4px 0 0;font-weight:400;}
.header-right{display:flex;align-items:center;gap:12px;}
/* home-btn removed - replaced with pj-back-btn */

/* ========== NAV TABS (목업 스타일) ========== */
.nav-tabs{display:flex;align-items:center;padding:0 30px;background:#fff;border-bottom:2px solid #e0e0e0;gap:8px;flex-wrap:wrap;}
.nav-tab{padding:14px 24px;font-size:14px;font-weight:600;color:#999;background:none;border:none;cursor:pointer;transition:all .15s;position:relative;white-space:nowrap;}
.nav-tab:hover{color:#555;}
.nav-tab.active{color:#fff;background:#00838f;border-radius:6px 6px 0 0;}
.nav-actions{margin-left:auto;display:flex;gap:8px;padding:8px 0;}
.action-btn{padding:8px 18px;border:none;border-radius:6px;font-size:10px;font-weight:700;cursor:pointer;transition:all .15s;}
.action-btn.save-btn{background:#e85d24;color:#fff;}
.action-btn.save-btn:hover{background:#d14e1a;}
.action-btn.filetrans-btn{background:#e85d24;color:#fff;}
.action-btn.filetrans-btn:hover{background:#d14e1a;}

/* ========== TAB PANELS ========== */
.tab-panel{display:none;padding:0 30px 24px 30px;}
.tab-panel.active{display:block;}

/* ========== PROJECT OVERVIEW (메인페이지_01) ========== */
.overview-layout{display:grid;grid-template-columns:1fr 1.4fr;gap:30px;align-items:stretch;}
@media(max-width:900px){.overview-layout{grid-template-columns:1fr;}}
.overview-photo-area{position:relative;background:#f0f0f0;border-radius:12px;padding:16px;display:flex;flex-direction:column;align-items:center;justify-content:center;margin-top:50px;}

.overview-photo-box{width:100%;flex:1;min-height:280px;background:#e8e8e8;border-radius:8px;overflow:hidden;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .15s;border:2px dashed #ccc;}
.overview-photo-box:hover{border-color:#1a4b8c;background:#f5f8ff;}
.overview-photo-box img{width:100%;height:100%;object-fit:cover;}
.overview-photo-empty{display:flex;flex-direction:column;align-items:center;gap:6px;color:#999;}
.overview-photo-empty .cam-icon{font-size:40px;opacity:.6;}
.overview-photo-empty .cam-text{font-size:13px;font-weight:700;color:#888;}
.overview-photo-empty .cam-sub{font-size:11px;color:#bbb;}
.overview-photo-label{margin-top:16px;font-size:22px;font-weight:700;color:#555;letter-spacing:2px;}

.overview-info{padding-top:8px;}
.overview-project-title{display:flex;align-items:baseline;justify-content:space-between;margin-bottom:20px;}
.overview-title-left{display:flex;align-items:baseline;gap:8px;}
.project-name-display{font-size:26px;font-weight:700;color:#008b8b;}

.overview-start-date{font-size:14px;color:#555;display:flex;align-items:center;gap:8px;white-space:nowrap;}
.overview-start-date input{padding:6px 10px;border:none;border-bottom:1px dotted #999;font-size:14px;background:transparent;color:#333;}
.overview-fields{display:flex;flex-direction:column;gap:14px;}
.ov-field{display:flex;align-items:center;gap:8px;}
.ov-field label{min-width:170px;font-size:14px;color:#555;flex-shrink:0;}
.ov-field input{flex:1;padding:8px 0;border:none;border-bottom:1px dotted #ccc;font-size:14px;background:transparent;transition:border-color .15s;}
.ov-field input:focus{outline:none;border-bottom-color:#1a4b8c;}
.ov-field-full{display:flex;flex-direction:column;gap:8px;margin-top:4px;}
.ov-field-full label{font-size:14px;color:#555;}
.ov-field-full textarea{width:100%;padding:12px;border:1px solid #e0e0e0;border-radius:8px;font-size:14px;font-family:inherit;resize:vertical;background:#fafafa;transition:border-color .15s;}
.ov-field-full textarea:focus{outline:none;border-color:#1a4b8c;}

/* ========== HVAC DIAGRAM TAB ========== */
.hvac-placeholder{padding:30px;}
.hvac-upload-area{width:100%;min-height:300px;border:2px dashed #ccc;border-radius:12px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:8px;cursor:pointer;color:#999;transition:all .15s;}
.hvac-upload-area:hover{border-color:#1a4b8c;background:#f5f8ff;}
.hvac-upload-area .cam-icon{font-size:48px;opacity:.5;}
.hvac-upload-area .cam-text{font-size:16px;font-weight:700;}
.hvac-upload-area .cam-sub{font-size:12px;color:#bbb;}

/* ========== 1ST DIAGNOSIS (서브페이지_02 디자인) ========== */
.diag-description{padding:10px 30px;background:#f9f9f9;border-left:none;border-bottom:1px solid #e0e0e0;border-top:none;font-size:10px;color:#777;line-height:1.6;margin:-0px -30px 20px -30px;}

/* 설비 카테고리 탭 */
.equip-tabs{display:grid;grid-template-columns:repeat(5,1fr);gap:0;border-bottom:none;margin-bottom:0;}
.equip-tab{padding:16px 10px;text-align:center;font-size:15px;font-weight:600;color:#666;background:#f5f5f5;border:none;border-right:1px solid #e0e0e0;border-bottom:2px solid transparent;cursor:pointer;transition:all .2s;white-space:nowrap;}
.equip-tab:last-child{border-right:none;}
.equip-tab:hover{color:#00838f;background:#f0fafa;}
.equip-tab.active{color:#00838f;background:#fff;font-weight:700;border-bottom:2px solid #00838f;}
@media(max-width:600px){.equip-tabs{grid-template-columns:repeat(3,1fr);}.equip-tab{font-size:12px;padding:10px 6px;}}

/* 서브 탭 (Cooling / Heating / Cooling Tower 등) */
.sub-tabs{display:flex;gap:0;margin:0;padding:0;background:#f5f5f5;border-bottom:1px solid #e0e0e0;}
.sub-tab{padding:12px 28px;font-size:13px;font-weight:600;color:#999;background:none;border:none;border-bottom:2px solid transparent;cursor:pointer;transition:all .15s;white-space:nowrap;}
.sub-tab:hover{color:#555;}
.sub-tab.active{color:#00838f;border-bottom-color:#00838f;font-weight:700;}

/* Diagnosis Summary 헤더 */
.diag-summary-header{display:flex;justify-content:space-between;align-items:center;padding:16px 20px;flex-wrap:wrap;gap:10px;}
.diag-summary-title{font-size:18px;font-weight:700;color:#333;margin:0;display:flex;align-items:center;gap:8px;}
.diag-summary-actions{display:flex;gap:8px;align-items:center;}
.equip-add-btn{padding:8px 18px;background:#43a047;color:#fff;border:none;border-radius:6px;font-size:10px;font-weight:700;cursor:pointer;transition:all .15s;}
.equip-add-btn:hover{background:#2e7d32;color:#fff;}

/* Exp & Col 토글 버튼 */
.exp-col-btn{background:#e85d24;color:#fff;border:none;padding:8px 18px;border-radius:6px;font-size:10px;font-weight:700;cursor:pointer;transition:all .2s;white-space:nowrap;}
.exp-col-btn:hover{background:#d14e1a;transform:translateY(-1px);box-shadow:0 4px 12px rgba(232,93,36,.3);}
.exp-col-btn.toggled{background:#1a4b8c;}
.exp-col-btn.toggled:hover{background:#143d73;box-shadow:0 4px 12px rgba(26,75,140,.3);}

/* Summary wrap */
.summary-wrap{padding:0 20px 16px;}

/* ========== PLACEHOLDER ========== */
.placeholder-content{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:80px 20px;text-align:center;color:#999;}
.placeholder-content .placeholder-icon{font-size:64px;margin-bottom:16px;opacity:.5;}
.placeholder-content h3{font-size:20px;color:#555;margin:0 0 8px;}
.placeholder-content p{font-size:14px;}

/* ========== RESULT TAB ========== */
.result-actions{margin-bottom:20px;display:flex;gap:8px;flex-wrap:wrap;}

/* ========== CARDS (기존 유지 + 목업 톤 조정) ========== */
.card{background:#fff;border-radius:4px;overflow:hidden;margin:0 20px 12px;box-shadow:0 1px 4px rgba(0,0,0,.08);border:1px solid #e0e0e0;position:relative;transition:box-shadow .2s;}
.card:hover{box-shadow:0 4px 16px rgba(0,0,0,.1);}
.card.highlight{box-shadow:0 0 0 3px #1a4b8c,0 4px 16px rgba(26,75,140,.25);}
.card-header{display:flex;align-items:center;gap:14px;padding:14px 20px;cursor:pointer;user-select:none;background:#4a4a4a;color:#fff;transition:background .15s;}
.card-header:hover{background:#3d3d3d;}
.card-header .header-icon{display:none;}
.card-header .header-title{flex:1;font-size:12px;font-weight:700;display:flex;flex-direction:column;gap:3px;color:#fff;}
.card-header .header-sub{font-size:12px;font-weight:600;color:rgba(255,255,255,.85);display:flex;gap:10px;flex-wrap:wrap;align-items:center;}
.card-header .header-grade{display:inline-flex;align-items:center;gap:4px;padding:3px 12px;border-radius:4px;font-weight:800;font-size:14px;background:rgba(255,255,255,.12);border:1px solid rgba(255,255,255,.25);margin-left:auto;}
.card-header .header-grade .grade-label{color:rgba(255,255,255,.7);font-size:11px;font-weight:600;}
.card-header .header-grade .grade-value{font-size:12px;font-weight:900;}
.card-header .header-grade .grade-value.g-A{color:#4dd0e1;}
.card-header .header-grade .grade-value.g-B{color:#ffb74d;}
.card-header .header-grade .grade-value.g-C{color:#ef5350;}
.card-header .header-grade .grade-value.g-empty{color:rgba(255,255,255,.4);}
.card-header .header-grade .grade-rec{font-size:11px;font-weight:600;color:#ffcdd2;margin-left:6px;white-space:nowrap;}
.card-header .arrow{flex-shrink:0;font-size:14px;transition:transform .25s;color:rgba(255,255,255,.6);}
.card.expanded .card-header .arrow{transform:rotate(180deg);}
.card-header .delete-btn{position:static;background:#e53935;color:#fff;border:none;border-radius:4px;padding:6px 14px;font-size:10px;font-weight:700;cursor:pointer;margin-left:8px;}
.card-header .delete-btn:hover{background:#c62828;}
.card-content{max-height:0;overflow:hidden;transition:max-height .3s ease-out;}
.card.expanded .card-content{max-height:20000px;transition:max-height .5s ease-in;}
.card-body{background:#fff;padding:18px;}

/* ========== STATUS CHIPS ========== */
.status-chip{display:inline-flex;align-items:center;gap:4px;padding:2px 8px;border-radius:999px;font-size:11px;font-weight:700;}
.chip-use{background:#10b981;color:#fff;}
.chip-fail{background:#ef4444;color:#fff;}
.chip-unused{background:#9ca3af;color:#fff;}
.chip-grade{background:rgba(255,255,255,.15);color:#fff;border:1px solid rgba(255,255,255,.3);font-weight:800;}
.status-text{font-size:12px;font-weight:700;}
.status-text.st-use{color:#10b981;}
.status-text.st-fail{color:#ef4444;}
.status-text.st-unused{color:#6b7280;}
.status-text.st-empty{color:#9ca3af;}

/* ========== FORM FIELDS ========== */
.btn{background:#1a4b8c;color:#fff;border:none;padding:10px 16px;margin:5px 0;border-radius:10px;font-weight:bold;cursor:pointer;}
input[type="text"],input[type="number"]{width:100%;padding:10px;border-radius:8px;border:1px solid #d1d5db;font-size:14px;margin-top:4px;box-sizing:border-box;}
pre{background:#0f172a;color:#e5e7eb;padding:12px;border-radius:10px;font-size:12px;overflow:auto;}

.section-title{font-size:12px;font-weight:700;color:#374151;margin:18px 0 10px;padding-bottom:6px;border-bottom:2px solid #e5e7eb;display:flex;align-items:center;gap:6px;}
.section-title:first-child{margin-top:0;}

.grid{display:grid;gap:12px;}
.grid-3{grid-template-columns:repeat(3,1fr);}
.grid-2{grid-template-columns:repeat(2,1fr);}
@media(max-width:900px){.grid-3{grid-template-columns:repeat(2,1fr);}}
@media(max-width:560px){.grid-3,.grid-2{grid-template-columns:1fr;}}

.field{display:flex;flex-direction:column;gap:4px;}
.field > label{font-size:12px;font-weight:600;color:#6b7280;margin:0;}
.field .input-wrap{position:relative;}

.btn-primary{background:linear-gradient(135deg,#1a4b8c,#2563eb);color:#fff;border:none;padding:11px 24px;border-radius:10px;font-size:14px;font-weight:700;cursor:pointer;transition:all .15s;font-family:inherit;box-shadow:0 4px 12px rgba(26,75,140,.3);}

<script>
// =============================================
// Project Dashboard - 카테고리 & Tool 기반
// =============================================

// ===== 분석 Tool 카테고리 정의 =====
const CATEGORY_TOOLS = [

    ]
  },
  {

    tools: [
      { id: 'pumpef', name: '✔ 펌프 성능 분석', url: 'tools/Tool-401. Pump Efficiency.html' }
    ]
  },
  {
    category: '위생',
    tools: [
		{ id: 'water-saving-fixtures', name: '✔ 절수형 위생기구', url: 'tools/Tool-501. Water-saving plumbing fixtures.html' },
		{ id: 'rainwater-reuse', name: '✔ 우수재이용 경제성 분석', url: 'tools/Tool-502. Rainwater Reuse.html' }
	]
  },
  {
    category: '배관',
    tools: [
		{ id: 'pipe-diameter', name: '✔ 배관경 선정', url: 'tools/Tool-601. Pipe diameter selection.html' },
		{ id: 'pipe-thickness', name: '✔ 배관 두께 측정', url: 'tools/Tool-602. Pipe 2nd diagnosis.html' }		
    ]
  },
  {
    category: '기타',
    tools: [
		{ id: 'project-tracker', name: '✔ 프로젝트 트래커', url: 'tools/Tool-701. Project Tracker.html' },
		{ id: 'lcc', name: '✔ LCC 분석', url: 'tools/Tool-702. LCC.html' }
    ]
  }
];

// ===== 프로젝트 저장소 =====
// 구조: { toolId: [ {id, name, year}, ... ] }
let toolProjects = {};

// 모달용 현재 toolId
let modalToolId = null;

// GitHub 저장 경로
const _PROJECTS_PATH = 'data/dashboard/projects.json';

// ===== 유틸리티 =====
function escapeHtml(str) {
  if (!str) return '';
  return String(str)
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;');
}

function generateId() {
  return 'pj_' + Date.now() + '_' + Math.random().toString(36).substr(2, 5);
}

// =============================================
// 데이터 로드 / 저장
// =============================================

/**
 * GitHub에서 프로젝트 목록을 로드한다.
 * 실패 시 localStorage 폴백.
 *
 * 핵심: ghGetFile()은 { content, sha } 를 반환하므로
 *       실제 데이터는 반드시 result.content 로 꺼내야 한다.
 */
async function loadProjects() {
  // 1) Supabase에서 로드 시도 (tool_runs registry)
  try {
    if (window.HIMEC_SYNC && HIMEC_SYNC.isEnabled()) {
      const reg = await HIMEC_SYNC.loadToolRegistry();
      if (reg && typeof reg === 'object') {
        toolProjects = reg;
        console.log('[loadProjects] Supabase 로드 성공 — tool 수:', Object.keys(toolProjects).length);
        try {
          localStorage.setItem('himec_tool_projects', JSON.stringify(toolProjects));
        } catch (e) { /* 무시 */ }
        return;
      }
    }
  } catch (e) {
    console.warn('[loadProjects] Supabase 로드 실패, localStorage 폴백:', e);
  }

  // 2) 폴백: localStorage
  try {
    const saved = localStorage.getItem('himec_tool_projects');
    if (saved) {
      const parsed = JSON.parse(saved);
      if (parsed && typeof parsed === 'object' && !Array.isArray(parsed)) {
        toolProjects = parsed;
        console.log('[loadProjects] localStorage 로드 성공');
        return;
      }
    }
  } catch (e) {
    console.warn('[loadProjects] localStorage 로드 실패:', e);
  }

  // 3) 둘 다 실패하면 빈 객체 유지
  toolProjects = {};
  console.log('[loadProjects] 저장된 프로젝트 없음 — 빈 상태');
}

/**
 * 프로젝트 데이터를 저장한다.
 * localStorage(항상) + GitHub(시도)
 */
async function saveProjects() {
  // 1) localStorage 백업 (항상 먼저)
  try {
    localStorage.setItem('himec_tool_projects', JSON.stringify(toolProjects));
  } catch (e) {
    console.warn('[saveProjects] localStorage 저장 실패:', e);
  }

  // 2) Supabase 동기화: 위 localStorage 저장 시 어댑터가 tool_runs 로 자동 미러링.
  //    (기존 GitHub 저장 경로 대체 — 별도 호출 불필요)
  console.log('[saveProjects] 로컬 저장 완료 — Supabase 자동 동기화');
}

// =============================================
// 모달 (프로젝트 등록)
// =============================================

function openModal(toolId, toolName, event) {
  if (event) event.stopPropagation();
  modalToolId = toolId;

  const overlay = document.getElementById('projectModal');
  const toolNameEl = document.getElementById('modalToolName');
  const nameInput = document.getElementById('modalPjName');
  const yearInput = document.getElementById('modalPjYear');

  toolNameEl.textContent = toolName;
  nameInput.value = '';
  yearInput.value = new Date().getFullYear();

  overlay.classList.add('active');
  setTimeout(() => nameInput.focus(), 100);
}

function closeModal(event) {
  if (event && event.target !== event.currentTarget) return;
  const overlay = document.getElementById('projectModal');
  overlay.classList.remove('active');
  modalToolId = null;
}

async function confirmAddProject() {
  if (!modalToolId) return;

  const nameInput = document.getElementById('modalPjName');
  const yearInput = document.getElementById('modalPjYear');
  const name = nameInput.value.trim();
  const year = yearInput.value.trim();

  if (!name) {
    alert('프로젝트명을 입력해주세요.');
    nameInput.focus();
    return;
  }
  if (!year) {
    alert('연도를 입력해주세요.');
    yearInput.focus();
    return;
  }

  // 메모리에 추가
  if (!toolProjects[modalToolId]) {
    toolProjects[modalToolId] = [];
  }
  toolProjects[modalToolId].push({
    id: generateId(),
    name: name,
    year: year
  });

  // 저장 → UI 갱신
  showLoading('저장 중...');
  try {
    await saveProjects();
    showToast('프로젝트가 등록되었습니다.');
  } catch (e) {
    console.error('[confirmAddProject] 저장 오류:', e);
    showToast('저장 중 오류가 발생했습니다.');
  } finally {
    hideLoading();
  }

  closeModal();
  renderDashboard();
}

async function deleteProject(toolId, projectId, event) {
  if (event) event.stopPropagation();
  if (!confirm('프로젝트를 삭제하시겠습니까?')) return;

  if (toolProjects[toolId]) {
    toolProjects[toolId] = toolProjects[toolId].filter(p => p.id !== projectId);

    // 빈 배열이면 키 자체를 제거 (깔끔하게)
    if (toolProjects[toolId].length === 0) {
      delete toolProjects[toolId];
    }
  }

  showLoading('삭제 중...');
  try {
    await saveProjects();
    showToast('프로젝트가 삭제되었습니다.');
  } catch (e) {
    console.error('[deleteProject] 저장 오류:', e);
  } finally {
    hideLoading();
  }

  renderDashboard();
}

// =============================================
// Tool 페이지 이동
// =============================================

function openTool(toolId, toolUrl, projectId, projectName) {
  if (!toolUrl) {
    alert('해당 Tool은 아직 준비 중입니다.');
    return;
  }
  const params = new URLSearchParams({
    projectId: projectId,
    projectName: projectName
  });
  window.location.href = toolUrl + '?' + params.toString();
}

// =============================================
// 키보드 이벤트 (모달)
// =============================================

document.addEventListener('keydown', function(e) {
  const overlay = document.getElementById('projectModal');
  if (!overlay || !overlay.classList.contains('active')) return;

  if (e.key === 'Enter') {
    e.preventDefault();
    confirmAddProject();
  } else if (e.key === 'Escape') {
    closeModal();
  }
});

// =============================================
// 대시보드 렌더링
// =============================================

function renderDashboard() {
  const container = document.getElementById('projectsTimelineBody');
  if (!container) return;

  let html = '';

  CATEGORY_TOOLS.forEach(cat => {
    html += `
      <div class="tl-year-group">
        <div class="tl-year-header">
          <div class="tl-year-left">
            <span class="tl-year-label">${escapeHtml(cat.category)}</span>
            <span class="tl-year-dot"></span>
          </div>
        </div>
        <div class="tl-year-content">
    `;

    if (cat.tools.length === 0) {
      html += `<div class="tl-empty-message">등록된 분석 Tool이 없습니다.</div>`;
    } else {
      cat.tools.forEach(tool => {
        const projects = toolProjects[tool.id] || [];

        html += `
          <div class="tl-tool-block">
            <div class="tl-project-row">
              <div class="tl-project-name">
                ${escapeHtml(tool.name)}
              </div>
              <div class="tl-project-actions">
                <button class="btn-add-project edit-only" onclick="openModal('${tool.id}', '${escapeHtml(tool.name)}', event)">+ 프로젝트 등록</button>
              </div>
            </div>
        `;

        // 등록된 프로젝트 목록
        if (projects.length > 0) {
          html += `<div class="pj-list">`;
          projects.forEach((p, idx) => {
            const no = String(idx + 1).padStart(2, '0');
            html += `
              <div class="pj-item" onclick="openTool('${tool.id}', '${tool.url || ''}', '${p.id}', '${escapeHtml(p.name)}')">
                <span class="pj-item-no">${no}</span>
                <span class="pj-item-name">${escapeHtml(p.name)}</span>
                <span class="pj-item-year">${escapeHtml(p.year)}</span>
                <button class="pj-item-delete edit-only" onclick="deleteProject('${tool.id}', '${p.id}', event)" title="삭제">✕</button>
              </div>
            `;
          });
          html += `</div>`;
        }

        html += `</div>`; // .tl-tool-block
      });
    }

    html += `
        </div>
      </div>
    `;
  });

  container.innerHTML = html;
}

// =============================================
// showToast / showLoading 폴백
// (auth.js보다 먼저 로드될 경우 대비)
// =============================================

if (typeof showToast === 'undefined') {
  window.showToast = function(msg) {
    const t = document.getElementById('toast');
    if (!t) { console.log('[Toast]', msg); return; }
    t.textContent = msg;
    t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), 2500);
  };
}
if (typeof showLoading === 'undefined') {
  window.showLoading = function(text) {
    const el = document.getElementById('loadingOverlay');
    if (el) {
      document.getElementById('loadingText').textContent = text || '처리 중...';
      el.classList.add('active');
    }
  };
}
if (typeof hideLoading === 'undefined') {
  window.hideLoading = function() {
    const el = document.getElementById('loadingOverlay');
    if (el) el.classList.remove('active');
  };
}

// =============================================
// 초기화
// =============================================

document.addEventListener('DOMContentLoaded', async function() {
  // 1. 인증 (auth.js)
  if (typeof initAuth === 'function') {
    await initAuth();
  }

  // 2. 로컬 모드: 항상 편집 가능

  // 3. 프로젝트 로드 & 렌더링
  showLoading('프로젝트 불러오는 중...');
  try {
    await loadProjects();
  } catch (e) {
    console.error('[init] 프로젝트 로드 오류:', e);
  } finally {
    hideLoading();
  }

  renderDashboard();
});
</script>

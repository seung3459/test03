<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login Page</title>

  <!-- ▼ Supabase 라이브러리 + 공용 설정(URL·키가 들어있는 기존 파일) 불러오기 -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="/js/supabase-config.js"></script>

  <style>
    :root {
      /* COLORS */
      --white: #e9e9e9;
      --gray: #333;
      --blue: #0367a6;
      --lightblue: #008997;

      /* RADII */
      --button-radius: 0.7rem;

      /* SIZES */
      --max-width: 758px;
      --max-height: 420px;

      /* FONT */
      --font-family: 'Pretendard', 'Noto Sans KR', -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;

      font-size: 14px;
    }

    /* 모든 요소에 폰트 상속 적용 */
    *, *::before, *::after {
      font-family: inherit;
    }

    body {
      align-items: center;
      background-color: #ffffff;
      display: grid;
      height: 100vh;
      place-items: center;
      margin: 0;
      padding: 0;
      font-family: var(--font-family);
    }

    .form__title {
      font-weight: 300;
      margin: 0;
      margin-bottom: 1.25rem;
    }

    .link {
      color: var(--gray);
      font-size: 0.9rem;
      margin: 1.5rem 0;
      text-decoration: none;
    }

    .container {
      background-color: var(--white);
      border-radius: var(--button-radius);
      box-shadow: 0 0.9rem 1.7rem rgba(0, 0, 0, 0.25),
        0 0.7rem 0.7rem rgba(0, 0, 0, 0.22);
      height: var(--max-height);
      max-width: var(--max-width);
      overflow: hidden;
      position: relative;
      width: 100%;
    }

    .container__form {
      height: 100%;
      position: absolute;
      top: 0;
      transition: all 0.6s ease-in-out;
    }

    .container--signin {
      right: 0;
      left: auto;
      width: 50%;
      z-index: 2;
    }

    .container__overlay {
      height: 100%;
      left: 0;
      overflow: hidden;
      position: absolute;
      top: 0;
      width: 50%;
      z-index: 100;
    }

    .overlay {
      background-color: #fff;
      height: 100%;
      width: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .btn {
      background-color: #00838f;
      background-image: #00838f;
      border-radius: 20px;
      border: none;
      color: var(--white);
      cursor: pointer;
      font-size: 0.8rem;
      font-weight: bold;
      letter-spacing: 0.1rem;
      padding: 0.9rem 4rem;
      text-transform: uppercase;
      transition: transform 80ms ease-in;
    }

    .form > .btn {
      margin-top: 1.5rem;
    }

    .btn:active {
      transform: scale(0.95);
    }

    .btn:focus {
      outline: none;
    }

    .btn:disabled {
      opacity: 0.6;
      cursor: not-allowed;
    }

    .form {
      background-color: var(--white);
      display: flex;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      padding: 0 3rem;
      height: 100%;
      text-align: center;
    }

    .input {
      background-color: #fff;
      border: none;
      padding: 0.9rem 0.9rem;
      margin: 0.5rem 0;
      width: 100%;
    }

    /* 오버레이 이미지 스타일 */
    .overlay__image {
      max-width: 80%;
      max-height: 80%;
      object-fit: contain;
    }

    /* ▼ 오류 메시지 스타일 */
    .error-msg {
      color: #d32f2f;
      font-size: 0.85rem;
      min-height: 1.1rem;
      margin: 0.4rem 0 0;
      font-weight: 500;
    }
  </style>
</head>
<body>
  <div class="container">
    <!-- Sign In -->
    <div class="container__form container--signin">
      <form action="#" class="form" id="form2">
        <h2 class="form__title">Sign In</h2>
        <input type="text" placeholder="ID" class="input" id="loginId" autocomplete="username" />
        <input type="password" placeholder="PW" class="input" id="loginPw" autocomplete="current-password" />
        <a href="#" class="link">Forgot your password?</a>
        <button class="btn" type="submit" id="loginBtn">Sign In</button>
        <!-- ▼ 오류 메시지가 여기에 표시됩니다 -->
        <p class="error-msg" id="errorMsg"></p>
      </form>
    </div>

    <!-- Overlay -->
    <div class="container__overlay">
      <div class="overlay">
        <!-- login.png, login.jpg, login.img 등 login.* 파일 사용 -->
        <img src="./img/login.png" alt="Logo" class="overlay__image" />
      </div>
    </div>
  </div>

  <script>
    /* =========================================================
       URL·키는 /js/supabase-config.js 에 있는 값을 그대로 사용합니다.
       (여기에 따로 적을 필요 없음)
    ========================================================= */
    const cfg = window.HIMEC_SUPABASE_CONFIG || {};
    const supabaseClient = window.supabase.createClient(cfg.SUPABASE_URL, cfg.SUPABASE_ANON_KEY);

    const form = document.getElementById("form2");
    const idInput = document.getElementById("loginId");
    const pwInput = document.getElementById("loginPw");
    const errorMsg = document.getElementById("errorMsg");
    const loginBtn = document.getElementById("loginBtn");

    // 이미 로그인된 상태면 바로 메인으로 보내기
    supabaseClient.auth.getSession().then(({ data }) => {
      if (data.session) {
        window.location.replace("/main.html");
      }
    });

    form.addEventListener("submit", async (e) => {
      e.preventDefault();
      errorMsg.textContent = "";

      const idValue = idInput.value.trim();
      const pwValue = pwInput.value;

      if (!idValue || !pwValue) {
        errorMsg.textContent = "ID 및 PW 오류입니다";
        return;
      }

      /* ----------------------------------------------------------------
         ID(예: "himec")로 로그인하는 방식.
         사용자가 입력한 ID 뒤에 아래 도메인을 자동으로 붙여서
         Supabase에는 "himec@himec.app" 형태로 전달합니다.
         (사용자는 이메일을 볼 필요도, 입력할 필요도 없습니다.)
         → Supabase에 계정을 만들 때 이메일을 "ID@himec.app" 형식으로 등록하세요.
      ---------------------------------------------------------------- */
      const ID_DOMAIN = "@himec.app";   // 원하면 도메인만 바꾸세요 (예: "@himec.co.kr")

      let email = idValue;
      if (idValue.indexOf("@") === -1) {  // 이미 @가 있으면(이메일이면) 그대로 사용
        email = idValue + ID_DOMAIN;
      }

      loginBtn.disabled = true;
      loginBtn.textContent = "확인 중...";

      const { data, error } = await supabaseClient.auth.signInWithPassword({
        email: email,
        password: pwValue,
      });

      loginBtn.disabled = false;
      loginBtn.textContent = "Sign In";

      if (error || !data.session) {
        // 로그인 실패
        errorMsg.textContent = "ID 및 PW 오류입니다";
        pwInput.value = "";
        return;
      }

      // 로그인 성공 → 메인 페이지로 이동
      window.location.replace("/main.html");
    });
  </script>
</body>
</html>

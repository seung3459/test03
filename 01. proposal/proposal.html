<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>HIMEC - Mechanical Facility Aging Diagnosis System</title>
    <style>
/* ========================= Reset & Base ========================= */
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'Noto Sans KR',sans-serif;background:#f8f9fa;color:#222;font-size:14px;min-height:100vh;display:flex;flex-direction:column;}

@keyframes fadeIn{from{opacity:0;transform:translateY(6px);}to{opacity:1;transform:translateY(0);}}

/* ========== AUTH STATUS (header) ========== */
.auth-status{display:flex;align-items:center;gap:8px;font-size:12px;color:#555;}
.auth-login-btn{background:linear-gradient(135deg,#10b981,#059669) !important;color:#fff !important;border:none !important;padding:8px 14px !important;border-radius:10px !important;font-size:12px !important;font-weight:700 !important;cursor:pointer;box-shadow:0 4px 12px rgba(16,185,129,.3);}

/* ========== LOGIN MODAL (dashboard 동일) ========== */
.login-modal{max-width:420px;}
.modal-body{padding:20px;}
.form-label{font-size:13px;font-weight:700;color:#1f2937;display:flex;align-items:center;gap:6px;}
.form-label .required{color:#dc2626;font-size:14px;font-weight:900;}
.form-input{padding:12px 14px;border:1.5px solid #e5e7eb;border-radius:10px;font-size:14px;background:#f9fafb;transition:all .15s;font-family:inherit;width:100%;box-sizing:border-box;}
.form-input:focus{outline:none;border-color:#1a4b8c;background:#fff;box-shadow:0 0 0 3px rgba(26,75,140,.12);}
.token-error{background:#fee2e2;color:#dc2626;padding:10px 14px;border-radius:10px;font-size:13px;font-weight:600;margin-top:12px;border:1px solid #fecaca;animation:shake .4s ease-in-out;}
@keyframes shake{0%,100%{transform:translateX(0);}25%{transform:translateX(-5px);}75%{transform:translateX(5px);}}
.btn-primary{background:linear-gradient(135deg,#1a4b8c,#2563eb);color:#fff;border:none;padding:11px 24px;border-radius:10px;font-size:14px;font-weight:700;cursor:pointer;transition:all .15s;font-family:inherit;box-shadow:0 4px 12px rgba(26,75,140,.3);}
.btn-primary:hover{transform:translateY(-1px);box-shadow:0 6px 18px rgba(26,75,140,.4);}

/* ========== PROJECT DASHBOARD HEADER ========== */
.pj-dash-header{background:#fff;border-bottom:1px solid #e0e0e0;padding:18px 30px 14px;}
.pj-dash-header-inner{max-width:1100px;margin:0 auto;display:flex;justify-content:space-between;align-items:center;}
.pj-dash-header-left{flex:1;}
.pj-dash-header-title{font-size:24px;font-weight:700;color:#333;margin:0;letter-spacing:-.3px;}
.pj-dash-header-sub{font-size:12px;color:#999;margin:3px 0 0;font-weight:400;}
.pj-dash-header-right{display:flex;align-items:center;gap:12px;flex-shrink:0;}
.pj-back-btn{background:#fff;border:1px solid #ccc;color:#777;padding:4px 10px;border-radius:6px;font-size:11px;font-weight:600;cursor:pointer;transition:all .15s;font-family:inherit;flex-shrink:0;}
.pj-back-btn:hover{background:#f5f5f5;border-color:#999;color:#333;}

/* ========================= Page Layout ========================= */
.projects-page{display:flex;flex-direction:column;flex:1;}
.page{padding:0;animation:fadeIn .4s ease-out;display:flex;flex-direction:column;flex:1;}
.main{flex:1;width:100%;max-width:1100px;margin:0 auto;padding:30px 20px;}
.page-title{font-size:28px;font-weight:800;color:#1f2937;margin:0 0 6px 0;}
.page-description{font-size:10px;color:#888;margin-bottom:28px;}

/* ========================= Project Section ========================= */
.section{margin-bottom:30px;}
.section-row-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;flex-wrap:wrap;gap:14px;}

.section-title{
    display:flex;align-items:center;gap:10px;
    font-size:22px;font-weight:800;color:#00838f;
    letter-spacing:-.5px;margin-bottom:0;
}
.year-title{
    display:flex;align-items:center;gap:10px;
    font-size:22px;font-weight:800;color:#00838f;
    letter-spacing:-.5px;margin-bottom:6px;
}
.dot{
    width:12px;height:12px;border-radius:50%;
    border:2.5px solid #bbb;background:#fff;
    display:inline-block;flex-shrink:0;
}

.btn-project{
    padding:5px 12px;font-size:11px;font-weight:600;
    color:#1a73e8;background:#e8f0fe;border:none;border-radius:6px;
    cursor:pointer;transition:all .15s;white-space:nowrap;
}
.btn-project:hover{background:#1a73e8;color:#fff;}

.project-container{
    position:relative;padding:0;
    display:flex;flex-direction:column;gap:22px;
}

.year-group{margin-bottom:30px;position:relative;}

.card-list{
    position:relative;margin-left:50px;padding-left:24px;
    border-left:2px solid #ddd;
    display:flex;flex-direction:column;gap:0;
}

.project-card{
    display:flex;align-items:center;justify-content:space-between;
    padding:12px 18px;background:#fff;
    border-bottom:1px solid #eee;
    transition:all .15s;gap:12px;
}
.project-card:hover{background:#f8f8f8;}

.project-card-title{
    font-size:13px;font-weight:600;color:#333;
    flex:1;display:flex;align-items:center;gap:8px;
    min-width:0;
}

/* ========================= Card Action Buttons ========================= */
.project-card-actions{
    display:flex;align-items:center;gap:8px;flex-shrink:0;
}

.project-card-buttons{
    display:flex;align-items:center;gap:6px;flex-shrink:0;
}

.project-card-filename{
    font-size:11px;color:#666;max-width:200px;
    overflow:hidden;text-overflow:ellipsis;white-space:nowrap;
}

.project-card-btn{
    padding:5px 12px;font-size:11px;font-weight:600;
    border:none;border-radius:6px;cursor:pointer;
    transition:all .15s;white-space:nowrap;font-family:inherit;
}

.btn-view{
    color:#1a73e8;background:#e8f0fe;
}
.btn-view:hover{background:#1a73e8;color:#fff;}

.btn-reupload{
    color:#666;background:#f0f0f0;
}
.btn-reupload:hover{background:#ddd;color:#333;}

.btn-upload{
    color:#1a73e8;background:#e8f0fe;
}
.btn-upload:hover{background:#1a73e8;color:#fff;}

.project-card-action{
    padding:5px 14px;font-size:11px;font-weight:600;
    border:none;border-radius:6px;cursor:pointer;
    transition:all .15s;white-space:nowrap;font-family:inherit;
    color:#666;background:#f0f0f0;
}
.project-card-action:hover{
    background:#e0e0e0;color:#333;
}

/* 보기 버튼 */
.project-card-action.view{
    color:#1a73e8;background:#e8f0fe;
}
.project-card-action.view:hover{
    background:#1a73e8;color:#fff;
}

/* 업로드 버튼 */
.project-card-action.upload{
    color:#1a73e8;background:#e8f0fe;
}
.project-card-action.upload:hover{
    background:#1a73e8;color:#fff;
}

.empty-text{
    padding:60px 20px;text-align:center;color:#94a3b8;
    font-size:14px;background:#fff;border-radius:12px;
    border:1px dashed #ddd;
}

/* ========================= Modal ========================= */
.modal-backdrop{
    position:fixed;inset:0;
    background:rgba(0,0,0,0.4);backdrop-filter:blur(4px);
    display:none;align-items:center;justify-content:center;z-index:1000;
}
.modal-backdrop.show,.modal-backdrop.active{display:flex;}

.modal{
    background:#fff;border-radius:12px;
    box-shadow:0 20px 60px rgba(0,0,0,0.15);
    padding:28px 30px;min-width:380px;max-width:460px;
    width:90%;animation:fadeIn .2s ease-out;
}

.modal-header{
    display:flex;align-items:center;justify-content:space-between;
    margin-bottom:6px;
}
.modal-header h2{
    margin:0;font-size:18px;font-weight:700;color:#333;
}
.modal-close{
    border:none;background:transparent;font-size:22px;
    color:#999;cursor:pointer;line-height:1;transition:color .15s;
}
.modal-close:hover{color:#333;}

.modal-sub-text{
    font-size:12px;color:#888;margin-bottom:20px;
}

.form-group{margin-bottom:14px;}
.form-group label{
    display:block;font-size:11px;font-weight:600;
    color:#555;margin-bottom:5px;
}
.form-group input{
    width:100%;padding:9px 12px;
    border:1.5px solid #ddd;border-radius:6px;
    font-size:13px;font-family:inherit;transition:all .2s;
}
.form-group input:focus{
    outline:none;border-color:#1a73e8;
    box-shadow:0 0 0 3px rgba(26,115,232,.12);
}

.modal-actions{
    display:flex;justify-content:flex-end;gap:8px;margin-top:20px;
}

.btn-cancel,.btn-submit{
    padding:8px 20px;border:none;border-radius:6px;
    font-size:12px;font-weight:600;cursor:pointer;
    font-family:inherit;transition:all .15s;
}
.btn-cancel{background:#e8e8e8;color:#666;}
.btn-cancel:hover{background:#d5d5d5;}
.btn-submit{background:#1a73e8;color:#fff;}
.btn-submit:hover{background:#1558b0;}

/* ========================= Upload ========================= */
.upload-info{
    background:#f8f9fa;border-radius:8px;padding:14px 16px;
    margin-bottom:14px;display:flex;flex-direction:column;gap:4px;
    border:1px solid #eee;
}
.upload-info strong{font-size:14px;color:#333;}
.upload-info span{font-size:12px;color:#888;}

.upload-box{
    border:2px dashed #ddd;border-radius:8px;
    padding:24px;text-align:center;background:#fafbfc;
    transition:border-color .15s;
}
.upload-box:hover{border-color:#1a73e8;}
.upload-box input{width:100%;font-size:12px;}
.upload-box p{margin:10px 0 0;font-size:12px;color:#999;}

/* ========================= Viewer Modal ========================= */
.viewer-modal{
    background:#fff;border-radius:12px;
    width:94vw;height:92vh;
    display:flex;flex-direction:column;
    box-shadow:0 20px 60px rgba(0,0,0,0.25);
    animation:fadeIn .2s ease-out;
    overflow:hidden;
}

.viewer-header{
    display:flex;align-items:center;justify-content:space-between;
    padding:14px 20px;border-bottom:1px solid #eee;
    background:#fafbfc;flex-shrink:0;
}

.viewer-title{
    font-size:14px;font-weight:600;color:#333;
    flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;
    margin-right:12px;
}

.viewer-header-right{
    display:flex;align-items:center;gap:10px;flex-shrink:0;
}

.viewer-download-btn{
    padding:6px 14px;font-size:12px;font-weight:600;
    color:#1a73e8;background:#e8f0fe;border:none;border-radius:6px;
    text-decoration:none;cursor:pointer;transition:all .15s;
}
.viewer-download-btn:hover{background:#1a73e8;color:#fff;}

.viewer-close-btn{
    width:32px;height:32px;border:none;background:#f0f0f0;
    color:#666;font-size:16px;cursor:pointer;border-radius:6px;
    display:flex;align-items:center;justify-content:center;
    transition:all .15s;
}
.viewer-close-btn:hover{background:#e0e0e0;color:#333;}

.viewer-body{
    flex:1;overflow:hidden;background:#e8e8e8;
}

.viewer-frame{
    width:100%;height:100%;border:none;
}

/* ========================= Footer ========================= */
.footer{
    background:#ffffff;padding:12px 16px;
    border-top:none;margin-top:auto;flex-shrink:0;
}
.footer-inner{max-width:1100px;margin:0 auto;text-align:center;}
.footer{
    font-size:10px;font-weight:400;color:#e0e0e0;
    display:flex;align-items:center;justify-content:center;
    letter-spacing:0.3px;
}

/* ========================= Responsive ========================= */
@media (max-width:1200px){
    .main{max-width:calc(100% - 40px);}
}
@media (max-width:768px){
    .pj-dash-header{padding:14px 20px 10px;}
    .pj-dash-header-title{font-size:18px;}
    .pj-dash-header-sub{font-size:10px;}
    .main{max-width:calc(100% - 30px);padding:20px 15px;}
    .page-title{font-size:22px;}
    .section-row-header{align-items:flex-start;}
    .modal{min-width:auto;width:calc(100% - 40px);padding:20px;}
    .card-list{margin-left:30px;padding-left:16px;}
    .project-card-filename{max-width:120px;}
    .viewer-modal{width:100vw;height:100vh;border-radius:0;}
}

/* ========================= Loading Overlay ========================= */
.loading-overlay{
    display:none;position:fixed;inset:0;
    background:rgba(0,0,0,0.4);backdrop-filter:blur(4px);
    z-index:3000;align-items:center;justify-content:center;
}
.loading-overlay.active{display:flex;}
.loading-box{
    background:#fff;border-radius:12px;padding:30px 40px;
    text-align:center;box-shadow:0 20px 60px rgba(0,0,0,0.15);
    animation:fadeIn .2s ease-out;
}
.spinner{
    width:36px;height:36px;border:4px solid #e5e7eb;
    border-top-color:#1a73e8;border-radius:50%;
    animation:spin 1s linear infinite;margin:0 auto 14px;
}
@keyframes spin{to{transform:rotate(360deg);}}
.loading-text{font-size:13px;font-weight:600;color:#333;}

/* ========================= Toast ========================= */
.toast{
    position:fixed;bottom:30px;left:50%;
    transform:translateX(-50%) translateY(100px);
    background:#1a73e8;color:#fff;padding:12px 24px;
    border-radius:8px;font-size:13px;font-weight:600;
    box-shadow:0 8px 20px rgba(0,0,0,0.15);
    z-index:4000;opacity:0;transition:all .3s;
    pointer-events:none;max-width:90vw;text-align:center;
}
.toast.show{transform:translateX(-50%) translateY(0);opacity:1;}

/* ========================= 하단 안내 ========================= */
.projects-info-bottom{
    margin-top:28px;text-align:right;font-size:10px;color:#999;
}

/* ========================= Project Card Delete Button ========================= */
.project-card-delete{
    width:22px;height:22px;border:none;background:transparent;
    color:#ccc;font-size:12px;cursor:pointer;border-radius:4px;
    display:flex;align-items:center;justify-content:center;
    transition:all .15s;flex-shrink:0;margin-left:6px;
}
.project-card-delete:hover{background:#fee;color:#e74c3c;}

/* ========================= 인증 가드 ========================= */
body.auth-required .main,
body.auth-required .footer,
body.auth-required .projects-info-bottom{display:none !important;}

/* ========================= 뷰어 모드 (편집 불가) ========================= */
.viewer-mode .edit-only{display:none !important;}

    </style>
</head>

      <div class="pj-dash-header">
        <div class="pj-dash-header-inner">

    <!-- JS — 로컬 전용 (GitHub/Auth 불필요) -->
    <script>
/**
 * proposal_project.js
 * 프로젝트 데이터 관리, 생성, 렌더링 (로컬 전용 — localStorage)
 */

var projects = [];
var selectedProject = null;

var _LS_KEY = 'himec_proposal_projects';
var _LS_FILES_PREFIX = 'himec_proposal_file_';

/* ========================= 데이터 로드 / 저장 ========================= */

function loadProposalProjects() {
    try {
        var saved = localStorage.getItem(_LS_KEY);
        if (saved) {
            var parsed = JSON.parse(saved);
            if (Array.isArray(parsed)) {
                projects = parsed;
                console.log('[loadProposalProjects] 로드 성공 - 프로젝트 수:', projects.length);
                return;
            }
        }
    } catch (e) {
        console.warn('[loadProposalProjects] localStorage 로드 실패:', e);
    }
    projects = [];
    console.log('[loadProposalProjects] 저장된 프로젝트 없음');
}

function saveProposalProjects() {
    try {
        localStorage.setItem(_LS_KEY, JSON.stringify(projects));
        console.log('[saveProposalProjects] 저장 성공');
    } catch (e) {
        console.warn('[saveProposalProjects] localStorage 저장 실패:', e);
        showToast('저장 실패 - 브라우저 저장소 용량을 확인해 주세요.');
    }
}

/* ========================= 프로젝트 생성 ========================= */

function createProjectCard() {
    var name = document.getElementById("projectName").value.trim();
    var year = document.getElementById("projectYear").value.trim();

    if (!name) { alert("프로젝트명을 입력해 주세요."); return; }
    if (!year) { alert("연도를 입력해 주세요."); return; }
    if (year.length !== 4) { alert("연도는 4자리로 입력해 주세요. 예: 2026"); return; }

    var project = {
        id: 'proj_' + Date.now() + '_' + Math.random().toString(36).slice(2, 7),
        name: name,
        year: year,
        file: null,
        filePath: null
    };

    projects.push(project);
    saveProposalProjects();

    showToast('"' + name + '" 프로젝트가 등록되었습니다.');
    renderProjects();
    closeProjectModal();
}

/* ========================= 프로젝트 삭제 ========================= */

function deleteProject(projectId, event) {
    if (event) event.stopPropagation();
    if (!confirm('프로젝트를 삭제하시겠습니까?')) return;

    var idx = projects.findIndex(function (p) { return p.id === projectId; });
    if (idx !== -1) {
        var proj = projects[idx];
        var name = proj.name;

        // 연결된 파일 데이터도 삭제
        if (proj.filePath) {
            try { localStorage.removeItem(_LS_FILES_PREFIX + proj.id); } catch(e) {}
        }

        projects.splice(idx, 1);
        saveProposalProjects();

        showToast('"' + name + '" 프로젝트가 삭제되었습니다.');
        renderProjects();
    }
}

/* ========================= 렌더링 ========================= */

function renderProjects() {
    var container = document.getElementById("projectContainer");
    container.innerHTML = "";

    if (projects.length === 0) {
        container.innerHTML = '<div class="empty-text">등록된 프로젝트가 없습니다.</div>';
        return;
    }

    var groupedProjects = projects.reduce(function (acc, project) {
        if (!acc[project.year]) { acc[project.year] = []; }
        acc[project.year].push(project);
        return acc;
    }, {});

    var sortedYears = Object.keys(groupedProjects).sort(function (a, b) { return b - a; });

    sortedYears.forEach(function (year) {
        var yearGroup = document.createElement("div");
        yearGroup.className = "year-group";

        var yearTitle = document.createElement("div");
        yearTitle.className = "year-title";
        yearTitle.innerHTML = year + ' <span class="dot"></span>';

        var cardList = document.createElement("div");
        cardList.className = "card-list";

        groupedProjects[year].forEach(function (project) {
            var card = document.createElement("div");
            card.className = "project-card";

            // 프로젝트명
            var title = document.createElement("span");
            title.className = "project-card-title";
            title.textContent = project.name;

            // 버튼 그룹
            var btnGroup = document.createElement("div");
            btnGroup.className = "project-card-buttons";

            if (project.file && project.filePath) {
                // 파일 있음: [보기] [재업로드]
                var viewBtn = document.createElement("button");
                viewBtn.className = "project-card-action view";
                viewBtn.textContent = "보기";
                viewBtn.onclick = function(e) {
                    e.stopPropagation();
                    openViewerModal(project);
                };

                var reuploadBtn = document.createElement("button");
                reuploadBtn.className = "project-card-action";
                reuploadBtn.textContent = "재업로드";
                reuploadBtn.onclick = function(e) {
                    e.stopPropagation();
                    openUploadModal(project.id);
                };

                btnGroup.appendChild(viewBtn);
                btnGroup.appendChild(reuploadBtn);
            } else {
                // 파일 없음: [+ 제안서 업로드]
                var uploadBtn = document.createElement("button");
                uploadBtn.className = "project-card-action upload";
                uploadBtn.textContent = "+ 제안서 업로드";
                uploadBtn.onclick = function(e) {
                    e.stopPropagation();
                    openUploadModal(project.id);
                };

                btnGroup.appendChild(uploadBtn);
            }

            // 삭제 버튼
            var deleteBtn = document.createElement("button");
            deleteBtn.className = "project-card-delete";
            deleteBtn.title = "삭제";
            deleteBtn.innerHTML = "&#10005;";
            deleteBtn.onclick = function (e) { deleteProject(project.id, e); };

            card.appendChild(title);
            card.appendChild(btnGroup);
            card.appendChild(deleteBtn);
            cardList.appendChild(card);
        });

        yearGroup.appendChild(yearTitle);
        yearGroup.appendChild(cardList);
        container.appendChild(yearGroup);
    });
}

/* ========================= UI 유틸 ========================= */

function showLoading(msg) {
    var overlay = document.getElementById('loadingOverlay');
    var text = document.getElementById('loadingText');
    if (overlay) {
        if (text) text.textContent = msg || '처리 중...';
        overlay.classList.add('active');
    }
}

function hideLoading() {
    var overlay = document.getElementById('loadingOverlay');
    if (overlay) overlay.classList.remove('active');
}

function showToast(msg) {
    var toast = document.getElementById('toast');
    if (!toast) return;
    toast.textContent = msg;
    toast.classList.add('show');
    setTimeout(function () { toast.classList.remove('show'); }, 2500);
}

/* ========================= 초기화 ========================= */

document.addEventListener('DOMContentLoaded', function () {
    // 로컬 모드: 인증 불필요, 바로 프로젝트 로드
    loadProposalProjects();
    renderProjects();
});

    <script>
/**
 * proposal_modal.js
 * 모달 열기/닫기, 파일 뷰어 모달 (로컬 전용 — localStorage)
 */

/* ========================= 프로젝트 등록 모달 ========================= */

function openProjectModal() {
    document.getElementById("projectModal").classList.add("show");
    document.getElementById("projectName").focus();
}

function closeProjectModal() {
    document.getElementById("projectModal").classList.remove("show");
    document.getElementById("projectName").value = "";
    document.getElementById("projectYear").value = "";
}

/* ========================= 제안서 업로드 모달 ========================= */

function openUploadModal(projectId) {
    selectedProject = projects.find(function (p) { return p.id === projectId; });
    if (!selectedProject) return;

    document.getElementById("selectedProjectName").textContent = selectedProject.name;
    document.getElementById("selectedProjectYear").textContent = selectedProject.year + "\ub144";
    document.getElementById("proposalFile").value = "";
    document.getElementById("uploadModal").classList.add("show");
}

function closeUploadModal() {
    document.getElementById("uploadModal").classList.remove("show");
    selectedProject = null;
}

/* ========================= 파일 뷰어 모달 ========================= */

/**
 * 파일 뷰어 모달 열기 (로컬 전용)
 * - localStorage에서 base64 데이터를 읽어 Blob URL 생성
 * - PDF: iframe에 직접 표시
 * - PPT/Word: 다운로드 안내
 */
function openViewerModal(project) {
    if (!project || !project.filePath) {
        alert('파일 경로 정보가 없습니다.\n[재업로드] 버튼으로 다시 업로드해 주세요.');
        return;
    }

    var fileName = project.file || '';
    var ext = (project.fileExt || fileName.split('.').pop()).toLowerCase();

    // localStorage에서 파일 데이터 읽기
    var stored = localStorage.getItem('himec_proposal_file_' + project.id);
    if (!stored) {
        alert('파일 데이터를 찾을 수 없습니다.\n[재업로드] 버튼으로 다시 업로드해 주세요.');
        return;
    }

    var parsed;
    try { parsed = JSON.parse(stored); } catch(e) {
        alert('파일 데이터가 손상되었습니다.');
        return;
    }

    // base64 → Blob
    var mimeTypes = {
        'pdf': 'application/pdf',
        'doc': 'application/msword',
        'docx': 'application/vnd.openxmlformats-officedocument.wordprocessingml.document',
        'ppt': 'application/vnd.ms-powerpoint',
        'pptx': 'application/vnd.openxmlformats-officedocument.presentationml.presentation'
    };
    var mime = mimeTypes[ext] || 'application/octet-stream';
    var byteChars = atob(parsed.base64);
    var byteArray = new Uint8Array(byteChars.length);
    for (var i = 0; i < byteChars.length; i++) {
        byteArray[i] = byteChars.charCodeAt(i);
    }
    var blob = new Blob([byteArray], { type: mime });
    var blobUrl = URL.createObjectURL(blob);

    // 모달 요소
    var modal = document.getElementById('viewerModal');
    var frame = document.getElementById('viewerFrame');
    var titleEl = document.getElementById('viewerTitle');
    var downloadBtn = document.getElementById('viewerDownload');

    titleEl.textContent = fileName;
    downloadBtn.href = blobUrl;
    downloadBtn.setAttribute('download', fileName);

    if (ext === 'pdf') {
        // PDF: iframe에 직접 표시
        frame.src = '';
        setTimeout(function() { frame.src = blobUrl; }, 50);
    } else {
        // PPT/Word: iframe에서 직접 표시 불가 → 안내 메시지
        frame.src = '';
        frame.srcdoc = '<div style="display:flex;align-items:center;justify-content:center;height:100%;font-family:sans-serif;color:#555;flex-direction:column;gap:12px;">'
            + '<p style="font-size:16px;font-weight:600;">' + fileName + '</p>'
            + '<p style="font-size:13px;color:#888;">이 파일 형식은 브라우저에서 미리보기가 지원되지 않습니다.</p>'
            + '<p style="font-size:13px;color:#888;">상단의 [다운로드] 버튼을 클릭해 주세요.</p>'
            + '</div>';
    }

    modal.classList.add('show');
}

/**
 * 파일 뷰어 모달 닫기
 */
function closeViewerModal() {
    var modal = document.getElementById('viewerModal');
    var frame = document.getElementById('viewerFrame');
    var downloadBtn = document.getElementById('viewerDownload');

    modal.classList.remove('show');

    // Blob URL 해제 (메모리 누수 방지)
    if (downloadBtn.href && downloadBtn.href.startsWith('blob:')) {
        URL.revokeObjectURL(downloadBtn.href);
    }
    frame.src = 'about:blank';
}

/* ========================= 이벤트 리스너 ========================= */

document.getElementById("projectModal").addEventListener("click", function (event) {
    if (event.target === this) closeProjectModal();
});

document.getElementById("uploadModal").addEventListener("click", function (event) {
    if (event.target === this) closeUploadModal();
});

document.getElementById("viewerModal").addEventListener("click", function (event) {
    if (event.target === this) closeViewerModal();
});

document.getElementById("projectYear").addEventListener("keydown", function (event) {
    if (event.key === "Enter") createProjectCard();
});

document.addEventListener("keydown", function (event) {
    if (event.key === "Escape") {
        var viewerModal = document.getElementById('viewerModal');
        if (viewerModal && viewerModal.classList.contains('show')) {
            closeViewerModal();
        }
    }
});

    </script>
    <script>
/**
 * proposal_upload.js
 * 제안서 파일 업로드 처리 (로컬 전용 — localStorage에 base64 저장)
 *
 * ⚠️ localStorage 용량 제한 (보통 5~10MB)
 *    대용량 파일은 저장 실패할 수 있습니다.
 *    나중에 서버/GitHub로 전환 시 이 부분만 교체하면 됩니다.
 */

/**
 * 제안서 업로드 실행
 * 1. FileReader로 Base64 변환
 * 2. localStorage에 저장
 * 3. 프로젝트 데이터에 filePath 저장
 */
async function uploadProposal() {
    var fileInput = document.getElementById("proposalFile");
    var file = fileInput.files[0];

    if (!file) {
        alert("업로드할 제안서 파일을 선택해 주세요.");
        return;
    }

    if (!selectedProject) {
        return;
    }

    // 파일 크기 체크 (localStorage 제한 고려 — 약 4MB 이하 권장)
    if (file.size > 4 * 1024 * 1024) {
        alert("파일 크기가 4MB를 초과합니다.\n로컬 저장소 제한으로 더 작은 파일을 선택해 주세요.\n(서버 연결 시 25MB까지 지원됩니다.)");
        return;
    }

    showLoading('파일 업로드 중...');

    try {
        // 1. FileReader로 Base64 변환
        var base64 = await readFileAsBase64(file);

        // 2. 안전한 파일명 생성
        var ext = file.name.split('.').pop().toLowerCase();
        var safeName = 'proposal_' + Date.now() + '.' + ext;

        // 3. localStorage에 파일 데이터 저장
        var fileData = {
            base64: base64,
            fileName: file.name,
            safeName: safeName,
            ext: ext,
            size: file.size,
            uploadedAt: new Date().toISOString()
        };

        try {
            localStorage.setItem(
                'himec_proposal_file_' + selectedProject.id,
                JSON.stringify(fileData)
            );
        } catch (e) {
            // QuotaExceededError
            alert('저장소 용량이 부족합니다.\n기존 파일을 삭제하거나 더 작은 파일을 선택해 주세요.');
            hideLoading();
            return;
        }

        // 4. 프로젝트 데이터 업데이트
        selectedProject.file = file.name;           // 원본 파일명 (표시용)
        selectedProject.filePath = safeName;         // 저장 경로 식별자
        selectedProject.fileExt = ext;               // 확장자

        // 5. 프로젝트 목록 저장
        saveProposalProjects();
        showToast('제안서가 업로드되었습니다.');

    } catch (e) {
        console.error('[uploadProposal] 업로드 오류:', e);
        showToast('업로드 중 오류가 발생했습니다: ' + e.message);
    } finally {
        hideLoading();
    }

    renderProjects();
    closeUploadModal();
}

/**
 * File → Base64 문자열 변환 (data URI 접두사 제거)
 */
function readFileAsBase64(file) {
    return new Promise(function (resolve, reject) {
        var reader = new FileReader();
        reader.onload = function () {
            // "data:application/pdf;base64,AAAA..." → "AAAA..." 만 추출
            var result = reader.result;
            var base64 = result.split(',')[1];
            resolve(base64);
        };
        reader.onerror = function () {
            reject(new Error('파일 읽기 실패'));
        };
        reader.readAsDataURL(file);
    });
}

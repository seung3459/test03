<!DOCTYPE html>
<html lang="ko">
<head>
	<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
	<script src="../js/supabase-config.js"></script>
	<script src="../js/auth-guard.js"></script>
	<script src="../js/himec-supabase-sync.js"></script>
	<script src="../js/himec-kpi-projects.js"></script>
	<script src="../js/himec-project-delete.js"></script>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HIMEC - Performance Management </title>
<style>
:root{
  --navy:#334155; --navy2:#475569; --teal:#546a7b; --teal-d:#3d4f5c; --teal-l:#eef1f4;
  --orange:#e2683a; --orange-d:#c8552b; --dark:#5b6772;
  --line:#dde1e6; --line2:#e9ecf0; --gray:#f4f5f7; --bg:#edeef1;
  --txt:#2b333b; --mut:#79828c; --green:#2e7d32; --red:#c0392b; --amber:#b7791f;
  --lblue:#eceff3; --llblue:#f5f6f8;
}
*{box-sizing:border-box;}
body{font-family:'Pretendard',-apple-system,'Segoe UI',sans-serif;margin:0;background:var(--bg);color:var(--txt);font-size:11px;line-height:1.45;}
.wrap{max-width:1480px;margin:0 auto;padding:18px;}
.apphdr{display:flex;align-items:flex-end;gap:14px;margin-bottom:4px;}
.brand{font-size:11.5px;color:var(--teal-d);font-weight:800;letter-spacing:.4px;}
h1{font-size:21px;margin:2px 0 2px;color:var(--navy);font-weight:800;letter-spacing:-.3px;}
.sub{color:var(--mut);font-size:12px;margin-bottom:14px;}
.btn{border:1px solid var(--line);background:#fff;color:var(--txt);padding:6px 13px;border-radius:6px;cursor:pointer;font-size:12.5px;font-weight:500;}
.btn:hover{background:var(--gray);}
.btn.pri{background:var(--orange);border-color:var(--orange);color:#fff;}
.btn.pri:hover{background:var(--orange-d);border-color:var(--orange-d);}
.btn.teal{background:var(--teal);border-color:var(--teal);color:#fff;}
.btn.teal:hover{background:var(--teal-d);border-color:var(--teal-d);}
.btn.dark{background:var(--dark);border-color:var(--dark);color:#fff;}
.btn.dark:hover{background:#2a2e32;}
.btn.dang{color:var(--red);border-color:#e0b4ae;}
.btn.dang:hover{background:#fbecea;}
.btn.sm{padding:3px 10px;font-size:11px;}
.tlabel{font-size:11.5px;color:var(--mut);font-weight:800;}
.ysel{padding:6px 9px;border:1px solid var(--line);border-radius:6px;font-weight:700;width:auto;background:#fff;color:var(--txt);font-family:inherit;}
.save-state{font-size:11.5px;color:var(--teal-d);margin-left:auto;font-weight:700;}
.sec{background:#fff;border:1px solid var(--line);border-radius:8px;margin-bottom:16px;overflow:hidden;}
.sec-h{background:#fff;color:#00838f;padding:11px 14px 10px;font-size:14.5px;font-weight:600;display:flex;align-items:center;gap:10px;border-bottom:2px solid var(--teal);}
.sec-h::before{content:'\25A0';color:#00838f;font-size:14px;margin-right:-4px;}
.sec-h .unit{margin-left:auto;font-weight:500;font-size:10px;color:var(--mut);}
.sec-b{padding:14px;overflow-x:auto;}
.grp-h{font-weight:600;color:var(--teal-d);font-size:13px;margin:6px 2px 10px;display:flex;align-items:center;gap:8px;}
.grp-h::before{content:'✓';color:var(--teal);font-size:14px;}
table{border-collapse:collapse;width:100%;font-size:11px;}
th,td{border:1px solid var(--line2);padding:5px 6px;text-align:center;white-space:nowrap;}
tbody tr:nth-child(odd){background:#fff;}
tbody tr:nth-child(even){background:#dcdcdc;}
thead th{background:#a9a9a9;color:#fff;font-weight:500;position:relative;}
.lbl{background:var(--llblue);font-weight:500;color:var(--navy2);}
input,select{font-family:inherit;font-size:11px;border:1px solid transparent;background:transparent;width:100%;text-align:center;padding:2px;border-radius:4px;color:var(--txt);}
input:hover,select:hover{border-color:var(--line2);}
input:focus,select:focus{outline:none;border-color:var(--teal);background:#fff;box-shadow:0 0 0 2px rgba(84,106,123,.20);}
input.txt{text-align:left;}
input.num{text-align:center;}
td.amt{background:#fafbfd;color:#33425a;text-align:center;font-variant-numeric:tabular-nums;}
td.tot{background:#a9a9a9;font-weight:600;text-align:center;font-variant-numeric:tabular-nums;}
.ratio input{color:var(--teal-d);font-weight:500;}
.ratio{position:relative;}
.ratio::after{content:'%';position:absolute;right:3px;top:50%;transform:translateY(-50%);font-size:9px;color:#9aa7b8;pointer-events:none;}
tr.amtrow td{background:#fafbfd;color:#445;text-align:right;font-variant-numeric:tabular-nums;font-size:11px;}
.foot td{background:var(--lblue);font-weight:800;text-align:right;color:var(--navy);font-variant-numeric:tabular-nums;}
.pcard{border:1px solid var(--line);border-radius:8px;margin-bottom:14px;overflow:hidden;}
.pcard-h{background:var(--gray);border-bottom:1px solid var(--line);padding:8px 10px;display:flex;gap:8px;align-items:center;flex-wrap:wrap;}
.pcard-h .no{background:var(--teal);color:#fff;border-radius:5px;padding:3px 9px;font-weight:800;font-size:11.5px;}
.fld{display:flex;align-items:center;gap:5px;}
.fld label{font-size:11px;color:var(--mut);font-weight:500;}
.fld input,.fld select{border:1px solid var(--line2);background:#fff;width:auto;min-width:60px;}
.fld input.nm{min-width:200px;text-align:left;}
.fld span.nm{min-width:120px;max-width:520px;}
.fld select.nm{min-width:160px;max-width:520px;}
.pcard-h-right{margin-left:auto;display:flex;align-items:center;gap:10px;flex:0 0 auto;}
.pcard-h-right .fld:first-of-type{width:160px;justify-content:flex-end;}
.pcard-h-right .fld:first-of-type label{text-align:right;line-height:1.2;}
.fld input.amt2{min-width:100px;text-align:right;}
.badge{font-size:11px;font-weight:800;padding:2px 7px;border-radius:5px;}
.badge.ok{background:#e6f4ea;color:var(--green);}
.badge.warn{background:#fdecdc;color:var(--amber);}
.badge.over{background:#fdecea;color:var(--red);}
.badge.ct{background:var(--teal-l);color:var(--teal-d);}
.badge.unct{background:#f0f0f0;color:#888;}
.badge.mGoal{background:var(--teal-l);color:var(--teal-d);}
.badge.mActual{background:#e7f6ec;color:var(--green);}
.vcell{min-width:100px;}
td.tot,td.vcell{border:none;}
.ckcarry{width:16px!important;min-width:16px!important;height:16px;accent-color:var(--orange);cursor:pointer;padding:0!important;border:none!important;background:transparent;}
.ckdone{width:16px!important;min-width:16px!important;height:16px;accent-color:var(--green);cursor:pointer;padding:0!important;border:none!important;background:transparent;}
.csel{margin-top:3px;border:1px solid var(--amber)!important;background:#fffaf0;color:var(--amber);font-weight:700;font-size:10.5px;width:auto;padding:1px 4px;}
.csub{font-size:9.5px;color:var(--amber);font-weight:700;margin-top:2px;}.csub.rem-ok{color:var(--green);}.csub.rem-warn{color:var(--amber);}
.statpill{display:grid;grid-template-columns:repeat(5,1fr);gap:12px;width:100%;}
.statpill .it{background:transparent;border:none;border-left:3px solid #c9d0d8;border-radius:0;padding:7px 14px 7px 12px;min-width:0;}
.statpill .it .k{font-size:14px;color:#00838f;font-weight:800;}
.statpill .it .v{font-size:20px;font-weight:800;color:var(--navy);font-variant-numeric:tabular-nums;text-align:right;}
.statpill .it .v small{font-size:10px;color:var(--mut);font-weight:500;margin-left:2px;}
.row-del{color:var(--red);cursor:pointer;font-weight:800;border:1px solid #e0b4ae;background:#fff;font-size:13px;line-height:1;padding:2px 8px;border-radius:5px;}
.row-del.nbd{border:none;background:transparent;padding:2px 6px;} .row-del:hover{background:#fbecea;} .row-del.nbd:hover{background:#fbecea;}
.addbar{margin:4px 2px 0;}
.chartbox{border:1px solid var(--line2);border-radius:8px;padding:10px 12px 6px;background:#fff;}
.legend{display:flex;flex-wrap:wrap;gap:6px;margin:2px 2px 10px;justify-content:center;}
.legend .lg{display:inline-flex;align-items:center;gap:5px;border:none;border-radius:6px;
  padding:3px 10px;font-size:11.5px;font-weight:700;cursor:pointer;color:var(--txt);background:transparent;user-select:none;}
.legend .lg .dot{width:11px;height:11px;border-radius:3px;display:inline-block;}
.legend .lg.off{opacity:.4;text-decoration:line-through;}
.cumsel{border:1px solid #a9a9a9!important;background:#a9a9a9;color:#fff;font-weight:700;
  width:auto;min-width:48px;padding:1px 3px;font-size:11px;}
th .cumsel{margin-left:3px;}
.cumsel option{color:#2b333b;background:#fff;}
td.goalin input{color:var(--orange-d);font-weight:600;text-align:right;}
td.cum{background:#c0c0c0;font-weight:600;text-align:right;color:var(--green);font-variant-numeric:tabular-nums;}
td.cumr{background:#c0c0c0;font-weight:600;text-align:center;font-variant-numeric:tabular-nums;}
@media print{.btn,.row-del,.addbar,.csel,.tab-actions{display:none!important;}body{background:#fff;}.page-container{border:none;}}

/* ===== HIMEC 풀폭 레이아웃 / 탭바 액션 (헤더·카피라이트 제거) ===== */
body{background:#f5f5f5;}
.page-container{max-width:none;width:100%;margin:0;background:#fff;min-height:100vh;border-left:none;border-right:none;}
.tabrow{display:flex;align-items:flex-end;justify-content:space-between;background:#fff;border-bottom:1px solid var(--line);gap:10px;}
.tabrow .tab-bar{border-bottom:none;flex:1 1 auto;min-width:0;}
.tab-actions{display:flex;align-items:center;gap:8px;padding:0 20px 6px 6px;position:relative;}
.save-ind{font-size:10.5px;color:var(--mut);font-weight:700;white-space:nowrap;margin-right:2px;}
.ico-btn{width:36px;height:30px;border:1px solid var(--line);background:#fff;border-radius:6px;cursor:pointer;display:inline-flex;align-items:center;justify-content:center;color:var(--teal-d);padding:0;}
.ico-btn:hover{background:var(--gray);border-color:var(--teal);}
.ico-btn svg{width:18px;height:18px;display:block;}
.export-wrap{position:relative;display:inline-flex;}
.export-menu{position:absolute;right:0;top:calc(100% + 5px);background:#fff;border:1px solid var(--line);border-radius:7px;box-shadow:0 6px 18px rgba(0,0,0,.14);display:none;z-index:60;min-width:154px;overflow:hidden;}
.export-menu.open{display:block;}
.export-menu button{display:flex;align-items:center;gap:9px;width:100%;border:none;background:#fff;padding:9px 14px;font-size:12px;font-weight:600;color:var(--txt);cursor:pointer;text-align:left;}
.export-menu button:hover{background:var(--teal-l);}
.export-menu button+button{border-top:1px solid var(--line2);}
.export-menu .xi{font-size:9.5px;font-weight:800;color:#fff;border-radius:4px;padding:2px 0;min-width:36px;text-align:center;}
.xi.xls{background:#1d7044;} .xi.pdf{background:#c0392b;} .xi.jsn{background:#546a7b;} .xi.imp{background:#2c6fb3;}
.tab-bar{display:flex;padding:8px 28px 0;background:#fff;gap:4px;border-bottom:1px solid var(--line);flex-wrap:wrap;}
.tab-bar .tab{padding:7px 22px;border-radius:7px 7px 0 0;font-size:12px;font-weight:500;border:none;background:#bcc6cf;color:#fff;cursor:pointer;position:relative;display:inline-flex;align-items:center;gap:2px;}
.tab-bar .tab .tabx{font-size:12px;font-weight:800;line-height:1;opacity:.65;border-radius:3px;padding:1px 3px;margin-left:5px;}
.tab-bar .tab .tabx:hover{background:rgba(255,255,255,.4);opacity:1;}
.tab-bar .tab:hover{background:#9aa7b2;}
.tab-bar .tab.active{background:var(--teal);}
.page-container .wrap{max-width:none;margin:0;padding:16px 28px 22px;}
.col-btn{background:transparent;color:#546a7b;border:none;border-radius:0;width:22px;height:22px;font-size:12px;cursor:pointer;line-height:1;padding:0;}
.amt-btn{margin-left:5px;background:transparent;border:none;color:var(--mut);font-size:10px;font-weight:400;cursor:pointer;padding:0 2px;line-height:1.3;}

/* ===== 실행예산 팝업 ===== */
.budget-btn{background:#e9ecef;border-color:#ced4da;color:#495057;}
.budget-btn:hover{background:#dee2e6;border-color:#adb5bd;}
.bg-modal{position:fixed;inset:0;background:rgba(20,28,36,.45);z-index:9999;display:flex;align-items:flex-start;justify-content:center;padding:40px 16px;overflow:auto;}
.bg-box{background:#fff;border-radius:10px;width:540px;max-width:100%;box-shadow:0 12px 40px rgba(0,0,0,.25);overflow:hidden;}
.bg-head{background:var(--teal);color:#fff;padding:12px 16px;display:flex;align-items:center;gap:10px;}
.bg-title{font-size:14.5px;font-weight:800;letter-spacing:.3px;}
.bg-x{margin-left:auto;background:transparent;border:none;color:#fff;font-size:20px;cursor:pointer;width:26px;height:26px;line-height:1;border-radius:5px;}
.bg-x:hover{background:rgba(255,255,255,.18);}
.bg-sub{padding:10px 16px 0;color:var(--mut);font-size:11.5px;}
.bg-body{padding:10px 16px 4px;}
.bg-rates{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:12px;}
.bg-rate{display:flex;align-items:center;gap:6px;border:1px solid var(--line);border-radius:6px;padding:6px 8px;background:var(--llblue);}
.bg-rate label{flex:1;font-size:11.5px;color:var(--navy2);font-weight:700;}
.bg-rate .rin{width:56px;text-align:right;border:1px solid var(--line2);background:#fff;border-radius:4px;padding:3px 5px;font-weight:700;color:var(--teal-d);}
.bg-rate .pc{font-size:10px;color:var(--mut);}
table.bgt{border-collapse:collapse;width:100%;font-size:11.5px;}
table.bgt td{border:1px solid var(--line2);padding:6px 9px;}
table.bgt td.k{background:var(--llblue);text-align:left;color:var(--navy2);font-weight:600;white-space:nowrap;}
table.bgt td.v{text-align:right;font-variant-numeric:tabular-nums;color:#2b333b;white-space:nowrap;}
table.bgt tr.hl td{background:#eef3f1;font-weight:600;color:var(--teal-d);}
table.bgt tr.hl2 td{background:#fdf3ec;font-weight:800;color:var(--orange-d);}
.bg-note{font-size:9.5px;color:var(--mut);font-weight:400;margin-left:5px;}
.bg-foot{padding:10px 16px 14px;display:flex;justify-content:flex-end;gap:8px;}
</style>
</head>
<body>
<div class="page-container">
  <span id="hdrTitle" style="display:none"></span>
  <div class="tabrow">
    <div class="tab-bar" id="tabBar"></div>
    <div class="tab-actions">
      <span class="save-ind" id="saveInd">자동저장 대기</span>
      <button class="ico-btn" id="btnMain" title="Main으로 이동" onclick="goMain()">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
      </button>
      <button class="ico-btn" id="btnSave" title="저장 (자동저장 포함)" onclick="doSave()">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"/><polyline points="17 21 17 13 7 13 7 21"/><polyline points="7 3 7 8 15 8"/></svg>
      </button>
      <div class="export-wrap">
        <button class="ico-btn" id="btnExport" title="파일 내보내기 (Excel · PDF · JSON)" onclick="toggleExport(event)">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 8v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8"/><polyline points="3 8 3 4 21 4 21 8"/><line x1="12" y1="12" x2="12" y2="18"/><polyline points="9 15 12 18 15 15"/></svg>
        </button>
        <div class="export-menu" id="exportMenu">
          <button onclick="exportExcel()"><span class="xi xls">XLS</span>Excel 내보내기</button>
          <button onclick="exportPDF()"><span class="xi pdf">PDF</span>PDF 내보내기</button>
          <button onclick="exportJSON();"><span class="xi jsn">JSON</span>JSON 내보내기</button>
          <button onclick="closeExport();document.getElementById('imp').click();"><span class="xi imp">LOAD</span>JSON 불러오기</button>
        </div>
      </div>
    </div>
  </div>
  <div class="wrap">
  <div class="sub">상단 <b>연도 탭</b>에서 연도를 선택하면 해당 연도 데이터가 표시됩니다. 비율은 백분율(%)로 입력하며 금액·집계는 자동 계산됩니다. 변경 내용은 <b>자동 저장</b>되며, 우측 상단 <b>저장</b> 아이콘으로 즉시 저장됩니다. <b>[금액 단위 : 백만원]</b></div>

  <input type="file" id="imp" accept=".json" style="display:none" onchange="importJSON(event)">

  <div class="sec">
    <div class="sec-h"><span id="aggHead">집계표</span><span class="unit">[단위 : 백만원]</span></div>
    <div class="sec-b">
      <div class="statpill" id="kpi" style="margin-bottom:10px;"></div>
      <table id="aggTable"></table>
      <div style="margin-top:12px;font-size:11px;color:var(--mut);">월별 추이 (막대 그래프 · 범례 클릭 시 표시 On/Off)</div>
      <div class="chartbox">
        <div class="legend" id="legend"></div>
        <div id="chart"></div>
      </div>
    </div>
  </div>

  <div class="sec">
    <div class="sec-h"><span id="s1head">수주 예상 &amp; 추적</span><span class="unit">[단위 : 백만원]</span></div>
    <div class="sec-b">
      <table id="s1Table" style="width:100%"></table>
      <div class="addbar" style="display:flex;justify-content:flex-end"><button class="btn sm" onclick="addS1()" style="background:transparent;border-color:transparent;color:var(--orange);font-weight:500;">+Project add</button></div>
    </div>
  </div>

  <div class="sec">
    <div class="sec-h"><span id="s2head">진행 Project</span><span class="unit">[단위 : 백만원]</span></div>
    <div class="sec-b">
      <div class="grp-h">2.1 이월 프로젝트</div>
      <div id="carryWrap"></div>
      <div class="grp-h" style="margin-top:18px;">2.2 신규 프로젝트</div>
      <div id="newWrap"></div>
    </div>
  </div>
  </div><!-- /wrap -->
</div><!-- /page-container -->
<script>

function goMain(){
  window.location.href = '../main.html';
}

const MONTHS=['1월','2월','3월','4월','5월','6월','7월','8월','9월','10월','11월','12월'];
const z12=()=>Array(12).fill(0);
const fmt=n=>{n=Math.round((+n||0)*100)/100;return n.toLocaleString('ko-KR',{maximumFractionDigits:2});};
const pnum=s=>{return Math.round((+(''+s).replace(/[^0-9.\-]/g,'')||0)*100)/100;};
const sum=a=>a.reduce((x,y)=>x+(+y||0),0);
const pctv=v=>{return +((v||0)*100).toFixed(2);};
const pctStr=v=>{return (Math.round((v||0)*1000)/10)+'%';};
const dfmt=n=>{return (Math.round((+n||0)*100)/100)===0?'-':fmt(n);};
const dpctv=v=>{v=+((v||0)*100).toFixed(2);return v===0?'-':v;};

/* ---------- 데이터 구조 빌더 ---------- */
function OO(n,amt,r,p){return{name:n,amt:amt,r:r,p:p,c:false};}
function MD(sales,collect,perf,ps,pc,pp,o1,o2){return{
 sales:sales,collect:collect,perf:perf,psales:ps,pcollect:pc,pperf:pp,
 csales:false,ccollect:false,cperf:false,carry:false,
 o1:o1||OO('외주 1',0,z12(),0),o2:o2||OO('외주 2',0,z12(),0)};}
function blankMode(){return MD(z12(),z12(),z12(),0,0,0);}
function yrBlock(amt){return{amt:amt||0,goal:blankMode(),actual:blankMode()};}

/* ---------- 초기 데이터 (비움) ---------- */
function seed(){return{
  curYear:'2026',curMode:'goal',cumMonth:12,
  years:['2025','2026','2027'],
  s1:{}, carry:[], newp:[],
  aggGoal:{}
};}

const LS_KEY='himec_pm_tool_v23';
let S=seed();
try{const _raw=localStorage.getItem(LS_KEY);if(_raw){const _o=JSON.parse(_raw);if(_o&&typeof _o==='object')S=_o;}}catch(e){}
if(!S.aggGoal)S.aggGoal={};
if(!S.cumMonth)S.cumMonth=12;
S.curMode='goal';

/* ---------- 저장 / 자동저장 (localStorage) ---------- */

function _xCellStyle(el){

  const cl=el.classList,tr=el.closest('tr');

  if(cl.contains('lbl'))s+='background:#f5f6f8;font-weight:bold;color:#475569;';
  if(cl.contains('amt'))s+='background:#fafbfd;text-align:right;color:#33425a;';
  if(cl.contains('tot'))s+='background:#fff7e6;text-align:right;font-weight:bold;';
  if(cl.contains('cum'))s+='background:#eef6ee;text-align:right;font-weight:bold;color:#2e7d32;';
  if(cl.contains('cumr'))s+='background:#fff7e6;text-align:right;font-weight:bold;';
  if(cl.contains('goalin'))s+='text-align:right;color:#c8552b;';
  if(tr&&tr.classList.contains('foot'))s+='background:#eceff3;font-weight:bold;text-align:right;color:#334155;';
  if(tr&&tr.classList.contains('amtrow'))s+='background:#fafbfd;text-align:right;color:#445;';
  return s;
}
function _xClean(node){
  const c=node.cloneNode(true);
  c.querySelectorAll('input').forEach(function(i){const s=document.createElement('span');s.textContent=i.value;i.replaceWith(s);});
  c.querySelectorAll('select').forEach(function(se){const o=se.options[se.selectedIndex];const s=document.createElement('span');s.textContent=o?o.text:'';se.replaceWith(s);});
  c.querySelectorAll('button').forEach(function(b){b.remove();});
  return c;
}
function _xTable(tbl){
  const c=_xClean(tbl);
  c.querySelectorAll('th,td').forEach(function(el){el.setAttribute('style',_xCellStyle(el));el.removeAttribute('class');});
  c.setAttribute('style','border-collapse:collapse;');
  c.removeAttribute('class');
  return c.outerHTML;
}
function _xText(node){const c=_xClean(node);return (c.innerText||c.textContent||'').replace(/\s+/g,' ').trim();}
function _xKpi(kpi){
  let h='<table style="border-collapse:collapse;margin:0 0 6px;"><tr>';
  kpi.querySelectorAll('.it').forEach(function(it){
    const k=it.querySelector('.k'),v=it.querySelector('.v');

    h+='<td style="border:0.5pt solid #d0d4d9;padding:4px 10px;text-align:right;font-weight:bold;">'+(v?_xText(v):'')+'</td>';

}
function _xChart(box){
  const svg=box.querySelector('svg');
  let out='';
  const lg=box.querySelector('.legend');
  if(lg){
    out+='<table style="border-collapse:collapse;margin:6px 0 3px;"><tr>';
    lg.querySelectorAll('.lg').forEach(function(sp){
      const dot=sp.querySelector('.dot');
      const col=dot&&dot.style&&dot.style.background?dot.style.background:'#888888';
      const off=sp.classList.contains('off');
      const nm=(sp.textContent||'').trim();
      out+='<td style="border:0.5pt solid #d0d4d9;padding:2px 4px;background:'+(off?'#eef0f3':col)+';width:14px;"></td>';
      out+='<td style="border:0.5pt solid #d0d4d9;padding:2px 9px 2px 5px;font-weight:bold;color:'+(off?'#9aa3ad':'#33425a')+';">'+nm+(off?' (\uc228\uae40)':'')+'</td>';
    });

  }
  if(svg){
    const s=svg.cloneNode(true);
    const vb=(s.getAttribute('viewBox')||'0 0 920 208').trim().split(/\s+/);
    const w=Math.round(+vb[2]||920),h=Math.round(+vb[3]||208);
    s.setAttribute('width',w);s.setAttribute('height',h);
    s.removeAttribute('style');
    if(!s.getAttribute('xmlns'))s.setAttribute('xmlns','http://www.w3.org/2000/svg');
    const xml='<?xml version="1.0" encoding="UTF-8"?>'+new XMLSerializer().serializeToString(s);
    let uri='';
    try{uri='data:image/svg+xml;base64,'+btoa(unescape(encodeURIComponent(xml)));}
    catch(e){uri='data:image/svg+xml;utf8,'+encodeURIComponent(xml);}
    out+='<table style="border-collapse:collapse;margin:0 0 9px;"><tr><td style="border:0.5pt solid #d0d4d9;padding:8px;background:#ffffff;"><img src="'+uri+'" width="'+w+'" height="'+h+'"/></td></tr></table>';

}

function ensureY(p){if(!p.yd)p.yd={};if(!p.yd[S.curYear])p.yd[S.curYear]=yrBlock(0);const b=p.yd[S.curYear];if(!b.goal)b.goal=blankMode();if(!b.actual)b.actual=blankMode();return b;}

function s1cur(){if(!S.s1[S.curYear])S.s1[S.curYear]=[];return S.s1[S.curYear];}
function ensureAggGoal(){if(!S.aggGoal[S.curYear])S.aggGoal[S.curYear]={su:0,sa:0,co:0,pf:0,ou:0};return S.aggGoal[S.curYear];}
function buildYearSel(){if(!S.years.includes(S.curYear))S.years.push(S.curYear);S.years.sort();
 var _ys=document.getElementById('ySel');if(_ys)_ys.innerHTML=S.years.map(y=>'<option value="'+y+'"'+(y==S.curYear?' selected':'')+'>'+y+'년</option>').join('');

function changeYear(v){S.curYear=v;save();renderAll();}
function delYear(y){
 if(S.years.length<=1){alert('최소 1개의 연도는 남겨야 합니다.');return;}
 if(!confirm(y+'년 탭과 해당 연도 데이터를 삭제할까요?'))return;
 S.years=S.years.filter(x=>x!==y);
 if(S.s1)delete S.s1[y];
 if(S.aggGoal)delete S.aggGoal[y];
 ['carry','newp'].forEach(grp=>{if(S[grp])S[grp].forEach(p=>{if(p.yd)delete p.yd[y];});});
 if(S.curYear===y)S.curYear=S.years[0];
 save();renderAll();
}

/* ---------- 계약된 수주 프로젝트 목록 ---------- */
function prevYear(){return (+S.curYear-1)+'';}
function s1of(year){if(!S.s1[year])S.s1[year]=[];return S.s1[year];}
/* 계약·종료 = 수주가 확정된 프로젝트 (집계·main 연동 대상). 미계약 = 예상 단계 */
function isContracted(st){return st=='계약'||st=='종료';}
function contractListOf(year){const arr=s1of(year);return arr.map((p,idx)=>({idx:idx,name:p.name,fee:+p.fee||0})).filter(x=>isContracted(arr[x.idx].status));}
function contractYearOf(grp){return (grp=='carry')?prevYear():S.curYear;}
function contractList(grp){return contractListOf(contractYearOf(grp));}
function pickProj(grp,i,v){
 const p=S[grp][i];
 if(v===''){save();renderProjs();renderAgg();return;}
 const src=s1of(contractYearOf(grp))[+v];if(!src)return;
 p.name=src.name;
 ensureY(p).amt=Math.round((+src.fee||0));
 save();renderProjs();renderAgg();
}
function projNameSelect(grp,i,p){

 let o='<option value="">'+(grp=='carry'?'(전년 계약 프로젝트 선택)':'(계약 프로젝트 선택)')+'</option>';
 let matched=false;
 list.forEach(x=>{const sel=(x.name===p.name);if(sel)matched=true;o+='<option value="'+x.idx+'"'+(sel?' selected':'')+'>'+esc(x.name)+'</option>';});
 if(p.name&&!matched)o+='<option value="" selected>'+esc(p.name)+' (자동생성)</option>';
 return '<select class="nm" style="width:auto;max-width:520px;text-align:left" onchange="pickProj(\''+grp+'\','+i+',this.value)">'+o+'</select>';
}

/* ---------- 수주(계약) → 2.2 신규 프로젝트 자동 생성/동기화 ---------- */
let _s1idSeq=0;
function newS1Id(){return 's1_'+Date.now().toString(36)+'_'+(++_s1idSeq)+'_'+Math.random().toString(36).slice(2,5);}
function syncNewFromS1(){
 const arr=s1cur();
 /* 수주 행에 안정적 고유 id 부여 */
 arr.forEach(p=>{if(!p._id)p._id=newS1Id();});
 /* 현재 연도에서 계약·종료(수주 확정) 상태인 수주 id 목록 */
 const contractedIds={};
 arr.forEach(p=>{if(isContracted(p.status))contractedIds[p._id]=p;});
 /* 더 이상 수주(계약·종료)가 아니거나 삭제된 수주의 자동 신규카드 제거 (현재 연도 한정) */
 S.newp=S.newp.filter(p=>{
   if(!p._s1auto)return true;
   if(p.year!=S.curYear)return true;
   return !!contractedIds[p._sk];
 });
 /* 현재 연도 자동 신규카드 인덱싱 */
 const existing={};
 S.newp.forEach(p=>{if(p._s1auto&&p.year==S.curYear&&p._sk)existing[p._sk]=p;});
 /* 계약된 수주마다 신규카드 보장 (없으면 생성, 있으면 프로젝트명 동기화) */
 arr.forEach(p=>{
   if(p.status!='계약')return;
   let card=existing[p._id];
   if(!card){
     const blk=yrBlock(Math.round(+p.fee||0));
     card={name:p.name||'',status:'계약',pjt:'',client:'',_s1auto:true,_sk:p._id,year:S.curYear,yd:{[S.curYear]:blk}};
     S.newp.push(card);
     existing[p._id]=card;
   }else{
     card.name=p.name||'';
   }
 });
}
function renderProjs(){
 syncNewFromS1();
 syncCarryovers();
 document.getElementById('carryWrap').innerHTML=visCards('carry');
 document.getElementById('newWrap').innerHTML=visCards('newp');
}
function projBelongs(p){return p.year?(''+p.year===''+S.curYear):true;}
function visCards(grp){let n=0,h='';S[grp].forEach((p,i)=>{if(projBelongs(p))h+=projCard(grp,p,i,++n);});return h;}
function projCard(grp,p,i,n){

function cardShorts(grp,i,md,amt){
 var out=[];
 [['sales','psales'],['collect','pcollect'],['perf','pperf']].forEach(function(kk){
   var a=md[kk[0]]||[],prev=+md[kk[1]]||0,short=1-(prev+sum(a));
   if(short>0.001)out.push(short);
 });
 ['o1','o2'].forEach(function(okey){
   var o=md[okey];if(!o||(+o.amt||0)<=0)return;
   var short=1-((+o.p||0)+sum(o.r||[]));
   if(short>0.001)out.push(short);
 });
 return out;
}

/* ---------- 이월 → 다음연도 자동 생성 ---------- */
function syncCarryovers(){
 /* 자동이월(_auto) 카드에 사용자가 입력한 월별 값/플래그를 보존하기 위해 기존 카드를 키로 보관 */
 const prevAutos={};
 S.carry.forEach(p=>{if(p._auto&&p._k)prevAutos[p._k]=p;});
 S.carry=S.carry.filter(p=>!p._auto);
 const autos=[];
 ['carry','newp'].forEach(grp=>{
   S[grp].forEach((p,pidx)=>{
     if(p._auto||!p.yd)return;
     Object.keys(p.yd).forEach(yr=>{
       const blk=p.yd[yr],g=blk.goal;if(!g)return;
       const o1=g.o1||OO('외주 1',0,z12(),0);
       const o2=g.o2||OO('외주 2',0,z12(),0);
       const carried=g.carry||g.csales||g.ccollect||g.cperf||o1.c||o2.c;
       if(!carried)return;
       const amt=+blk.amt||0;
       const ny=(+yr+1)+'';
       if(!S.years.includes(ny))S.years.push(ny);
       /* 당해년도까지 누계 달성분을 다음연도 전년실적(prev)으로 자동 입력 → 이월 열에 잔여분 자동 표시 */
       const achS=Math.min(1,Math.max(0,(+g.psales||0)+sum(g.sales)));
       const achC=Math.min(1,Math.max(0,(+g.pcollect||0)+sum(g.collect)));
       const achP=Math.min(1,Math.max(0,(+g.pperf||0)+sum(g.perf)));
       const achO1=Math.min(1,Math.max(0,(+o1.p||0)+sum(o1.r)));
       const achO2=Math.min(1,Math.max(0,(+o2.p||0)+sum(o2.r)));
       /* 이전 렌더에서 입력된 자동이월 월별 데이터 복원 (월별 %가 매 렌더마다 초기화되는 문제 해결) */
       const k=grp+':'+pidx+':'+yr;
       const old=prevAutos[k];
       const og=(old&&old.yd&&old.yd[ny])?old.yd[ny].goal:null;
       const cp=a=>(a&&a.length)?a.slice():z12();
       const sSales=og?cp(og.sales):z12();
       const sColl=og?cp(og.collect):z12();
       const sPerf=og?cp(og.perf):z12();
       const oo1r=(og&&og.o1)?cp(og.o1.r):z12();
       const oo2r=(og&&og.o2)?cp(og.o2.r):z12();
       const ng=MD(sSales,sColl,sPerf,achS,achC,achP,
         OO(o1.name,+o1.amt||0,oo1r,achO1),
         OO(o2.name,+o2.amt||0,oo2r,achO2));
       if(og){
         ng.carry=!!og.carry;ng.csales=!!og.csales;ng.ccollect=!!og.ccollect;ng.cperf=!!og.cperf;
         if(og.o1)ng.o1.c=!!og.o1.c;
         if(og.o2)ng.o2.c=!!og.o2.c;
       }
       const nblk=yrBlock(Math.round(amt));
       nblk.goal=ng;
       autos.push({name:(p.name||'(무명)')+' ['+yr+' 이월]',status:'계약',pjt:p.pjt||'',client:p.client||'',_auto:true,_k:k,year:ny,
         yd:{[ny]:nblk}});
     });
   });
 });
 S.carry=S.carry.concat(autos);
 S.years.sort();
}

 [...S.carry,...S.newp].forEach(p=>{const md=modeData(p),a=yAmt(p);

     ou[m]+=(+md.o1.amt||0)*(+md.o1.r[m]||0)+(+md.o2.amt||0)*(+md.o2.r[m]||0);}});

}

/* ================= 실행예산 팝업 (엑셀 '실행 예산 편성' 로직 이식) ================= */
/* 단위변환: 표(백만원) → 실행예산 표시(원). 1백만원 = 1,000,000원 */
var _bgGrp=null,_bgI=null;
var BG_M=1000000;
function bgKey(grp,i){return S.curYear+'.'+grp+'.'+i;}
function bgRates(grp,i){
  if(!UI.budget)UI.budget={};
  var d=UI.budget[bgKey(grp,i)]||{};
  return {dept:(d.dept!=null?+d.dept:0.13),
          gen :(d.gen !=null?+d.gen :0.13),
          profit:(d.profit!=null?+d.profit:0.10),
          exp :(d.exp !=null?+d.exp :0.05)};
}
function setBgRate(grp,i,key,val){
  if(!UI.budget)UI.budget={};
  var k=bgKey(grp,i);
  if(!UI.budget[k])UI.budget[k]={};
  UI.budget[k][key]=(+val||0)/100;
  save();
  renderBudget(grp,i);
}
function calcBudget(grp,i){
  var p=S[grp][i], md=modeData(p), r=bgRates(grp,i);
  var sales=yAmt(p)*BG_M;                 /* 매출액 = 수주금액 목표액 (자동) */
  var out1=(+md.o1.amt||0)*BG_M;          /* 외주비-1 = 외주1 금액 (자동) */
  var out2=(+md.o2.amt||0)*BG_M;          /* 외주비-2 = 외주2 금액 (자동) */
  var exp =sales*r.exp;                    /* 경비 = 매출액 × 경비율 */
  var dept=sales*r.dept;                   /* 부서관리비 = 매출액 × 부서관리비율 */
  var gen =sales*r.gen;                    /* 일반관리비 = 매출액 × 일반관리비율 */
  var profit=sales*r.profit;               /* 이윤(금액) = 매출액 × 이윤율 */
  var labor=sales-out1-out2-exp-dept-gen-profit;  /* 인건비 */
  var direct=labor+out1+out2+exp;          /* 직접원가 */
  var gross=sales-direct;                  /* 매출이익 */
  var totcost=direct+dept+gen;             /* 총실행원가 */
  var opp=sales-totcost;                   /* 영업이익 */
  var oprate=sales?opp/sales:0;            /* 영업이익률 */
  return {name:p.name||'',o1n:md.o1.name,o2n:md.o2.name,r:r,
          sales:sales,labor:labor,out1:out1,out2:out2,exp:exp,direct:direct,
          gross:gross,dept:dept,gen:gen,totcost:totcost,opp:opp,oprate:oprate};
}
var bgWon=function(n){return Math.round(+n||0).toLocaleString('ko-KR');};
function bgPct(v){return (Math.round((v||0)*10000)/100);}
function bgRateBox(grp,i,label,key,val){
  return '<div class="bg-rate"><label>'+label+'</label>'+
         '<input class="rin" value="'+bgPct(val)+'" onchange="setBgRate(\''+grp+'\','+i+',\''+key+'\',this.value)">'+
         '<span class="pc">%</span></div>';
}
function bgRow(k,v,cls,note){
  return '<tr'+(cls?' class="'+cls+'"':'')+'>'+
         '<td class="k">'+k+(note?'<span class="bg-note">'+note+'</span>':'')+'</td>'+
         '<td class="v">'+bgWon(v)+'</td></tr>';
}
function renderBudget(grp,i){
  var b=calcBudget(grp,i);
  var h='';
  h+='<div class="bg-sub">구분 : <b style="color:var(--teal-d)">'+esc(b.name||'(무명)')+'</b> &nbsp;|&nbsp; 단위 : 원</div>';
  h+='<div class="bg-body">';
  h+='<div class="bg-rates">';
  h+=bgRateBox(grp,i,'부서관리비','dept',b.r.dept);
  h+=bgRateBox(grp,i,'일반관리비','gen',b.r.gen);
  h+=bgRateBox(grp,i,'이윤','profit',b.r.profit);
  h+=bgRateBox(grp,i,'경비','exp',b.r.exp);
  h+='</div>';
  h+='<table class="bgt"><tbody>';
  h+=bgRow('매 출 액',b.sales,'hl','자동: 수주금액 목표액');
  h+=bgRow('인 건 비',b.labor,'','');
  h+=bgRow('외 주 비-1'+(b.o1n?' ('+esc(b.o1n)+')':''),b.out1,'','자동: 외주1 금액');
  h+=bgRow('외 주 비-2'+(b.o2n?' ('+esc(b.o2n)+')':''),b.out2,'','자동: 외주2 금액');
  h+=bgRow('경     비',b.exp,'','매출액 × '+bgPct(b.r.exp)+'%');
  h+=bgRow('직접원가',b.direct,'hl','');
  h+=bgRow('매출이익',b.gross,'','');
  h+=bgRow('부서관리비',b.dept,'','매출액 × '+bgPct(b.r.dept)+'%');
  h+=bgRow('일반관리비',b.gen,'','매출액 × '+bgPct(b.r.gen)+'%');
  h+=bgRow('총실행원가',b.totcost,'hl','');
  h+=bgRow('영업이익',b.opp,'hl2','');
  h+='<tr class="hl2"><td class="k">영업이익률</td><td class="v">'+(Math.round(b.oprate*1000)/10)+' %</td></tr>';
  h+='</tbody></table>';
  h+='</div>';
  document.getElementById('budgetBody').innerHTML=h;
}
function openBudget(grp,i){_bgGrp=grp;_bgI=i;renderBudget(grp,i);document.getElementById('budgetModal').style.display='flex';}
function closeBudget(){document.getElementById('budgetModal').style.display='none';_bgGrp=null;_bgI=null;}
document.addEventListener('keydown',function(e){if(e.key==='Escape')closeBudget();});
/* ============================================================================== */

function renderAll(){buildYearSel();syncHead();renderS1();renderProjs();renderAgg();}
renderAll();
</script>
<div id="budgetModal" class="bg-modal" style="display:none" onclick="if(event.target===this)closeBudget()">

    <div class="bg-head"><span class="bg-title">실행 예산 편성 (안)</span><button class="bg-x" onclick="closeBudget()" title="닫기">&times;</button></div>
    <div id="budgetBody"></div>
    <div class="bg-foot"><button class="btn sm" onclick="closeBudget()">닫기</button></div>
  </div>
</div>
